羅浮雲粲粲羅浮雪我昔夢入羅浮天縞衣仙子神飄然緑毛么鳳隔花語别來仿佛三千年子今贈我雲錦箋何以報之瓊瑶篇相思一夜月如練歲寒長見春風面題學釣軒炎祚真人騎赤龍故人傲睨輕王公身披羊裘隱澤中手弄一絲江上風客星夜臨紫極宫釣臺髙並雲臺功復有雲孫千載下讀書豈是煦煦者司征海上六年餘古貌古心知者寡琴江東去水滔滔石上珊瑚明月髙拂衣别我且歸去持竿釣取黃金鼇題杏林别墅圗我聞于使君種杏碧山下它山豈無丹杏花不及家山種來者髙堂中有白髮親看花酌酒娛青春兒今去家二千里作官只飲三衢水三衢水清漣漪年年杏花開滿枝㸃綴五色斑斕衣阿翁䄂有金光草令人服之顔色好别墅春風日日來花落花開長不老秦駐山殺虎歌秦駐山頭祖龍廟月黑天寒聞虎嘯將軍手挽烏角弓平明入山尋虎蹤叢篁秀木鬱重重陰壑慘淡來悲風山靈白晝驅虎出壯士跳踉與之敵雄牙利爪善搏人大劒長鎗俱辟易我今三箭信有神勇氣不讓飛將軍山中一朝除虎害四境掃蕩無妖紛封章奏徹彤庭上聖主聞知頒內賞安得儲公數十人一時蘇息東南民重題涌金門外殺虎歌昔聞堯舜世大禹平水土虎豹犀象驅逺之萬億蒼生皆按堵儲將軍雄且武一朝手挽烏號弓射殺南山白頞虎白頞虎視耽耽朝遊城之北暮遊城之南不有將軍一身膽縱此飛類民何堪豈不聞牛哀七日化為虎獸面不知兄與父縛虎易知人難方今聖德天地寬但願將軍鎮藩翰人不化虎四海皆清安題槐陰書舍天有三台地有三槐云是晉公親手栽三槐如雲復如蓋果應二郎居鼎鼐時當景德祥符間柱石廊廟安如山世澤傳來三百載復有孫子登朝班槐葉陰陰覆書屋不數鄴侯三萬軸繡衣金節玉花驄行部歸看滿庭緑春暉堂前烏夜啼結巢多在青雲枝青雲枝上烏啼處它年留作甘棠樹送憲司知事吳君考績之京江之水清且漣明如鏡直如弦青驄繫著江邊樹繡衣考績朝天去津人伐鼓送樓船十丈雲帆南斗邊鯨波帖帖風不起使君之心有如水激濁揚清振綱紀萬歲千秋報天子送吳司幕秩滿之京歌南薰調素琴人生㑹合無古今古人不愛暮夜金今人豈無古人心河南吳公好孫子修􅐖如漆心如水三年贊畫簡書勞芙蓉幕下清風起調素琴歌南薰南陽宗資今見君江花冥冥江水春百丈牽船登要津鳳凰池上恩波重天官考績承天寵冥鴻萬里决浮雲自古有才當大用題直翁胡重器詩卷直莫如虞帝之琴弦曲莫如任公之釣鉤直弦可彈太古調曲鉤謾掣金鼇頭人心取舍各有道曲鉤何如直弦好在天勿作彎􅋃星在地當為指佞草直翁直翁聽我歌出門紛紛岐路多我願萬斛舟不涉九曲河我願千里足不馳九折坡翁今有子鳴朝珂履道坦坦平不頗董狐之筆如操戈千秋萬古名弗磨翁當餘年養太和子孫世居安樂窩題航為俞叔銘作野水兮幽幽野航兮悠悠動吾行兮浮浮靜吾止兮休休逍遙兮中州浩蕩兮安流憑虛兮天遊沿月兮棹謳彼坳堂之杯兮孰若以芥而為舟噫委身大造兮任吾去留題朱氏椿萱堂吾聞漆園之木八千秋又聞北堂萱草能忘憂朱卿夫婦俱白頭兒也貢入帝王州口傳天語出丹闕馬蹄踏遍閩山月兒心何以報春暉回望飛雲隔吳越左手擘荔枝右手持檳榔它山豈不好不如歸故鄉登朝見天子沐浴承休光龍河雪消春水長願乞還家三釡養入門堂上見椿萱靈柯鋭葉俱無恙讀書椿樹下進酒萱花傍更分白兔所搗之𤣥霜父兮母兮髮蒼蒼金蘭玉樹照庭戶直與竇家五桂同芬芳謝南康張少府惠帶南康少府休官日三徑黃花有佳色寄來束帶水犀文令我腰圍較寬窄烏紗髙帽白苧衣繫來稚子道相宜入手御爐煙氣重知卿來自鳳凰池我亦平生愛疏散可恨與卿相見晚秋來消瘦苦耽詩一日幾回移帶眼湖魚白白湖蟹肥禾黍滿田黃雀飛秋水野航三十里停雲西望思依依集杜少陵詩句一首奉寄雲菴法師台州地闊海溟溟南極老人自有星千崖無人萬壑靜老身古寺風泠泠有時自發鐘磬響芝草琅玕日應長昏黑應須到上頭安得仙人九節杖不見旻公三十年清詩句句盡堪傳陶冶性靈存底物晴窗檢㸃白雲篇題竹雪山房為王御史作繡衣柱史鐵作冠平生愛種青琅玕山中歲晚讀書處積雪滿庭生翠寒常時見竹不見雪竹雪雙清更竒絶氷壺照徹此君心璞玉鐫成此君節平明四望巖壑間矯如羣龍下瑶壇黃陵女兒騎白鳳風裳月佩鳴珊珊恍然張樂洞庭野倒卷銀河向天寫九重閶闔參差開八極空明不知夜是時繡衣朝紫皇下視九㸃煙茫茫㑹當裁作十二琯坐使寒谷回春陽有竹豈不佳有雪亦自好金聲來戶外玉氣出林表昔聞王子猷夜訪戴安道當時有此君相見必傾倒千載回舟興至今猶未了引領仰髙風何由寫懷抱卓哉歲寒姿貞白永相保題李白觀廬山瀑布圗我思仙人乃在南斗之下香爐之峰手招五老白雲裏掀􅐖玉立凌天風不知何年鬼斧鑿破混沌竅絶頂直與銀河通上有奔崖噴壑之飛流下有橫江飲澗之長虹白波九道走東海流轉萬古無終窮仙人詞源亦如此天然秋水生芙蓉開元召入黃金屋揮毫醉寫清􅊭曲鳴鳳不棲阿閣巢青蠅翻汚連城玉金雞放赦夜郎回生死託交鸚鵡杯人間斗酒醉不得此水可滌愁懷開酒星在山頭酒泉在山下便當釀作蒲萄醅不費千金之裘五花馬胡為夢落峨眉亭千年一去不復醒畫中仿佛見顔色屋梁落月秋冥冥聞道騎鯨入瀛海神遊汗漫知何在大鵬借我埀天雲八極三清㑹相待題王仲序墨客詩卷王郎酒酣當墨池五雲飛落天孫機河東美人織不得仿佛八繭吳蠶絲親王召見蓬萊殿天門白日飛龍見中官傳㫖賜奚囊王郎佩服生輝光絳州陳𤣥最奇絶落手麟膠三日香梁園賦客鄒枚老愛爾尊前一傾倒揮毫為寫錦囊歌願爾千年贊王道剪韭亭剪韭復剪韭山園春雨肥昨日韭葉長今朝韭葉稀但令勿傷根日夕生華滋有客過茅屋呼兒剪春緑一箸盤餐惟所須何待髙門行白玉寄言山中人灌畦當及春人間此味良可珍此味不減秋風蓴友人紙帳名卧雲求題白雲劈繭春重重仙人卧雲如卧龍天風吹下太古雪平地幻出瓊瑶宫白雲來來還復去何如一榻留雲住胡蝶莊周兩不知誰能解此雲中趣小鬟折花香滿衣霓裳夜半行雲歸周公夢回日丈五此樂人間今古稀梨花散漫春雲暖一色瑶臺月華滿醉倚仙家十二樓夜寒不上珊瑚鉤飛瓊隔花吹小鳳縞衣驚起羅浮夢溪藤剪霜翻素濤翠禽啼煙紅日髙世間萬事邯鄲道人生不及卧雲好題李仕亷雪溪詩卷五載西江想東越興來欲踏山陰雪眼明見此雪溪圗恍若氷壺貯寒月山中之人不可招千崖萬壑皆瓊瑶長空浩浩絶飛鳥深林何處尋漁樵謫仙有孫有佳趣蓬萊移得三珠樹稍待明年春水生借我綸竿釣魚去題馬文學之惠安教諭鍧鳴鐘考朗鼓司馬先生教南土泉州宛在福州南榕葉如雲荔枝甘一路春山當馬首下馬杯行椰子酒門生出郭候溪傍翠盤鈿合進檳榔蠻雲瘴雨喜無恙襟佩青青趨絳帳送黃將軍分鎮台城渥窪之駒走千里雪花凝寒吹不起將軍仗劒出洪都南來手挽天河水天河直與東海通槫桑虯枝挂彎弓旌旗倒射海底日金鴉夜啼華頂峰彼州之人迎我侯此州之人不可留順風吹帆疾如馬緑水蕩漾芙蓉秋九日黃花一尊酒手把茱茰當楊柳將軍自有榖城書勳業傳家埀不朽謝何徴君惠麻鞋仙人昔上蓬萊宫十年踏遍京塵紅仙人今歸東海曲麻鞋但遺雙白足白足麻鞋白似霜紫苔猶帶落花香世人不識飛鳧舄千里煩君逺寄將昨向滄洲拾瑶草雨過沙乾著來好此中不是若耶溪布襪何愁杜陵老知君已謝鵷鷺班尋真來訪白雲間舊時猿鶴應相識好在南山與北山題李白觀泉圗我所思兮在匡廬錦袍仙人玉不如香爐五老半天上旭日照耀金芙蕖仙人倒披雲錦袍浩氣直壓秋崖髙人間斗酒醉不得手挽銀河翻雪濤一朝召入金鑾殿曽與龍顔醉中見誰知白玉㸃青蠅不顧昭陽忤飛燕紫皇案前五色麟掉頭踏遍名山春若非九天寫下千尺水何以蕩滌胸中塵千年風骨何人畫仿佛屋梁明月夜騎鯨東海若相逢大笑長歌呼白也題芝溪送别圗我聞袁安之子孫何年卜隱芝溪村渭陽舅氏不可作甥乃仗劒登期門芝溪之水清見底中有别情千萬里鳴笳叠鼓送行舟東流有盡情無已芝溪水有雙鯉魚芝溪水有明月珠明珠莫彈山頭雀雙鯉須傳海上書送張河泊還鄉清涼逺在南海隅青鳥銜寄雲中書開緘忍見數行字阿母手封雙淚珠為言十載與兒别復報若翁今永决五月兒從闕下還悵望南雲寸心折水有行舟陸有馬無復升堂拜郎罷七月秋風起布帆兒歸笑指青山下兒今無所願願母夀且康上堂進荔枝下堂食檳榔檳榔可餐荔可擘玉立亭亭兒在側更種長松當墓前慈烏結巢年復年題岐山圗朝望岐山雲夕望岐山雲岐山不可見但見非煙非霧青氤氲上清真人好奇古有山不待夸娥負縮地回天頃刻間蓬萊移得金鼇股吾聞留侯從赤松功成歸老山之中千年復見好孫子出宰况近仙人宫仙人嘯歌碧雲裏采掇金芝餐玉髓也知吏隱亦清流兩年只飲薌溪水只今見畫如見山安得置我靈臺間日日憑髙望雲氣㑹待岐陽鳴鳳還殺虎歌贈葉將軍朝射虎夕射虎吹鳴笳喧疉鼓去年田禾不得收牛羊不敢放壠頭今年禾黍滿郊野猛虎無聲山月秋白髮老翁卧茅屋教兒賣劒買黃犢到城明日謝將軍更向轅門分虎肉漁隱青青蒲葉短臨平湖水滿嫋嫋柳絲長當門繫野航野航穩於馬坐釣青山下魚我兩相忘無人知釣者百年天地一漁蓑流水桃花意若何得魚換酒篷下醉自誦一曲滄浪歌太公釣西周嚴光釣東漢古來豪傑人出處關治亂題山居夏夜讀書圗素月兮流天松風兮奏絃澄夜氣兮泠然寓吾情兮簡編探羲圗兮畫前游吾神兮太古之先送馬貢士題春江送别圗大山小山芙蓉開雲氣逺從天目來東風吹散鳳城雪一夜江水青于苔借問舟行向何處馬卿明日朝天去杏園花滿曲江春幽谷鶯遷上林樹方今玉堂皆巨公手把刀尺青雲中神龍出河龜出洛千載復見明良逢馬卿此行當努力射䇿彤庭期第一龍門奪得錦袍歸先遣雙魚寄消息題春山小景圗老夫愛畫入骨髓偶向髙堂見山水不識何人寫此圗恍然坐我春雲裏大山小山青入天嵐氣暝結香爐煙扁舟夜泊潯陽郭似是當年孟浩然阿翁手持九節杖雙澗流泉玉琴響天風吹帶碧桃花瑶草金芝為誰長南郭先生吾友于招我共讀山中書石田可耕水可釣安得斯人與同調謝杜醫士為葉百戶贈浣花老翁好孫子家住鹽官忠義里幼讀神農黃帝書青年賣藥居城市今夏括蒼葉守中卧病兼旬不能起更醫至再復至三孰辨陰陽明表裏城中杜子有家學分得桑君上池水捷如壯士當敵場百步穿楊誇一矢昔也父母及諸弟倉皇驚怕走折趾今也怡然北堂下笑舞萊衣具甘旨五月歸從白玉京瓊玖安能酬木李觸熱敲門求我歌好雨洗秋涼入髓勗哉杜子須努力積土為山自今始而翁天外如有聞化鶴歸來心亦喜題羅小川山水圗奉和耆山真人詩韻平生愛畫入骨髓出門萬里皆山川周南太史古轍迹愧我白頭非壯年稚川父子有家法何異萬選青銅錢每于江海見遺墨一紙千金人共憐匡廬秀出南斗傍赤日倒射香爐煙金光璧采絢林壑使我一覽神超然天雞喈喈而喔喔火龍蜿蜿而蜒蜒東分蓬萊五鼇股西擘太華三峰蓮乃知意匠奪天巧聲價肻讓它人先瀛洲仙子何翩翩霧閣雲窗常晝眠直疑槫桑與若木根盤暘谷通虞淵耆山真人好事者筆勢倒翻三峽泉安期棗如瓜玉井藕如船何當為我蛻凡骨神游八極齊喬佺題賀節婦卷秦烏啼啞啞少婦在邉姑在家婦從萬里拾夫骨恨身不與夫同歿一兔百逐良可憐形影相依今十年鏡中寧使斷緑髮頭上安可無青天夫入九泉無復見何日登堂見姑面妾無錦字織回文妾無胡笳寫哀怨代妾陳情范子勳放妾還家宋將軍妾年至死何以報願夫再生姑不老題張母徐氏貞節詩由拳城外鴛鴦湖鴛鴦交頸依菰蒲雄歿雌存形影孤矢死不學雙飛鳬良人贈妾明月珠嫁時繫在紅羅襦夫今在地妾有雛賣珠日給堂上姑打門無吏夜索租挑鐙有女寒辟纑女工紡績兒讀書妾死不慙泉下夫題剡溪書屋朝望青山雲夕望剡溪月我思剡溪人欲載剡溪雪笑殺山陰王子猷一時興盡回扁舟早識山中有羊仲放船也作東吳游羊家結屋溪南住正是好山環碧處門前水漲柳花灣釣船一夜髙于樹阿翁看山不下堂兩兒翩翩如鳯凰大兒才力健射䇿登朝行小兒天姿髙十五工文章至今雙髻亭亭削寒玉玉帶蜿蜒走崖谷讀書聲隔碧蘿間夜夜虹光照秋屋翁今歲晚江上歸有約明年尋剡溪野航載山不載雪繫在屋東楊柳枝題金夀堂世間萬物皆可變唯有黃金能百鍊龔家慈母出鄧林貞節可比千黃金黃金善祝慈母壽黃金莫鑄慈母心孝子愛親如愛日百年一刻千金直大書金壽揭髙堂願母與日同其長送戴伯聚還天台戴先生住在龍山之下迂江之湄平生讀書忘渴飢三旬九食寒無衣口掉三寸舌不顧人是非前年别華頂來遊東海涯今年還天台去采黃金芝秋風蕭蕭吹苧衣遙望宫前浮雲飛豈不聞蘇季子六國印百里奚五羖皮人生出處各有時子當還山歌我詩美妾換馬妾重千金軀君愛千里足共憐逸足疾如飛誰念貞妾美如玉妾今出門去無復侍華堂寸心何以報願作青絲韁題具慶堂陳綺席進華觴聽我長歌具慶之髙堂太學儒生忠孝士矯首南雲幾千里堂上雙親八十餘堂下玉立三兄弟東家積得金滿籯何如教子傳一經西家作官金絡馬何如種萱北堂下陳綺席進華觴聽我長歌具慶之髙堂兒在逺道親歸故鄉兒業日以廣親年日以長它年紫誥鸞回紙聖德如天無逺邇請看進士歐陽詹不在親傍親亦喜挽道士有羽人兮在𤣥都白玉為佩青霞裾手掉五色金芙蕖飄然騎雲游紫虛呼吸元氣洪濛初閲盡三洞天皇書江風蕭蕭歲云徂寒月墮澗氷蟾孤玉棺千年葬龍且嗟羽人兮不可呼贈道士我思仙人乃在三神山何年誤落塵網間浪遊江海不歸去碧桃落盡春風閒春風閒瑶草緑來日燕辭巢歸時鶯出谷黃金之闕白玉城手把芙蓉朝太清安得從師入山去醉騎鸞背吹瑶笙贈上清道士天上仙人碧落卿氷弦入手風泠泠一彈山中别鶴操再弄谷口樵歌聲是日同登玉虛閣碧窗片片桃花落恍然坐我鳳麟洲瓊珥瑶環下寥廓師今復上耆山顛洗耳更聽幽澗泉鈞天别有太古調此曲不許人間傳題桂菊雙清圗白帝司秋運金氣空山草木皆淒厲嗟爾桂樹青團團直與佳菊凌霜寒貞姿孤潔同晚歲何異幽人逸士棲巖巒我所思兮淮南之小山白石鑿井金為闌手招八公鍊神丹驂鸞翳鳳遊其間側身西望柴桑里南山悠然當面起處士兮歸來尊有酒兮甘且旨石磊磊兮葛綿綿𤣥豹號林兮長鯨阻川折遺芳兮寄逺歌招隱兮期長年來鶴亭鶴不來雲悠悠十年無書寄揚州仙人五城十二樓玉簫聲斷瓊花秋黃埃四塞不可以久留安得從之上瀛洲鶴不來雲悠悠東檜軒圗悟空塔前雙檜樹化龍已上諸天去犀牛扇子破多時欲覔牛兒無覔處千年公案重于山還我牛兒竟不還檜樹東邊結廬者亦欲置在犀牛間畫史安能知許事此中真有西來意莫論檜東與檜西且復還我犀牛兒題紅梅東方風來吹碧雪羣妃醉踏瑶池月中有仙人萼緑華珠佩霓裳最清絶别來仿佛三千年綵雲夢隔蓬萊天蓬萊宫中花鳥使幾見海水為桑田東家步障霞綃暖不惜千金買池館春歸紅葉玉簫閒月冷海棠銀燭短何如託根王君家不學人間兒女花昨日劉郎笑相贈天台有約飯胡麻還山吟送天台王徴君巍巍乎天台之山四萬八千丈兮聫岡叠障綿亘乎東南神鼇戴山儼不動但見螺髻涌出矗矗青瑶簪三更雞鳴海水赤丹霞紫霧浮晴嵐上方鐘磬落天外白日花飛優鉢曇嗟哉勝境可望不可即兮金堂石室何由探神仙中人王子喬顔如丹砂髮毿毿偶從東海一相見調笑共作煙霞談手持天孫五雲錦氷絲嫋嫋繅吳蠶飄然别我復長往解纓去濯桃花潭天風吹散華頂雪曹娥江水青于藍舵樓晚飯坐天上拂雲鳥翼張髙帆夢天夜飛八翼登天門濯髮明河披素雲玉琯雙回白鸞背珠露泠然濕秋佩泰階煌煌明六符東方白榆長不枯拾得天孫機下石何勞問卜過成都題竹雪山房吾聞王內史種竹在山陰人見此君節不知此君心昔年讀書修竹林積雪擁門三尺深一庭夜月瓊瑶色萬壑天風環佩音我知此君最清絶歲晚相看面如鐵正色比公頭上冠爽氣隨公手中節青驄踏遍江南霜請持玉節朝紫皇裁為鳳凰十二琯坐使寒谷回春陽題望雲圗葉先生住在四萬八千丈之天台霞氣直接東蓬萊天雞三鳴海水赤春風幾度桃花開胡為家山看不足剪得匡廬雲一幅春暉在青天寸草在黃土中有一寸心何以報慈母關西余氏母在堂堂下宜男春日長九華西浙宦游處白玉種此雙兒郎兒今長大過三十寸草春暉報何及豈無魯陽戈為駐西飛烏豈無萬丈繩為挽羲和車春暉在天草在地母子同躋太平世更願傳家好子孫大書特書忠孝門神石有石有石在空坑宋朝文相避元兵單騎脫急無留行石墮空坑如隕星追兵不及相乃生人言此石山之靈天佑信國全忠貞重為告曰石兮石兮爾之生也甚奇怪胡不鍛鍊五色上補青天青嗚呼共工一觸天柱折孟姜一哭長城崩誰謂土石終無情至今鄉人號神石奸雄過之當屏迹義虎有虎有虎在空山孝子夏貴廬其間呼天長號病不起虎銜野鹿活孝子虎也日與孝子親相隨出入三十春孝子起為宋大將專城總督淮西軍將軍一朝思納土虎亦咆哮觸其怒虎死在地魂上天將軍掉尾求生全重為告曰虎兮虎兮爾之生也甚雄偉殺身成仁有如此胡不化為忠義士董狐之筆良可紀萬古千秋照青史題畫露華凝寒玉蟾泣張生手潑金壺汁神鼇戴山海水立白龍噓雲元氣濕毫端妙奪造化功傍人云是米南宫贈爾波斯螺萬斛寫我匡廬看飛瀑題恬淡軒為儲都司作淮之水出自桐柏山千盤萬折流入江河間將軍好文兼好武清似流泉出山下手提長劒鎮雄藩馬前奔走皆貔虎龍驤萬斛出海洋西略月窟東槫桑天弧夜半射天狼鯨波帖帖青鏡光歸看山中恬淡水方寸澄清亦如此方寸澄清亦如此萬歲千秋報天子長安道長安道上花紛紛紅霧漲天飛作塵東里雕甍耀白日西街駿馬嘶青雲長安少年不知老鳳管龍笙春亦好昨日牡丹何處花今朝鸚䳇誰家鳥韶華過眼易消磨楊柳纎腰愁思多不見古來歌舞地夜深風雨泣銅駝題來鶴軒為張僉憲作張君持節洪之都左招洪崖右麻姑仙人騏驥不可馭何以得此當庭除雪作衣裳丹作頂戛然長鳴延素頸夜榻時聞竹下聲午階每弄花間影九重蕩蕩天門開曽侍玉皇香案來乃知君身有仙骨地位清寒霜滿臺只今籠之往何處為言攜向英山去我亦東歸尋故丘結巢願託三珠樹壽友人寄我以中山𤣥兔之秋頴寄君以東海麻姑之錦書仙翁一尺蒼虯鬚昨來海上騎鯨魚翱翔白龍宫簸弄明月珠我欲酌以迎風含露之玉壺仙翁飄然夜回車别來可望不可即緑水蕩漾秋芙蕖絳河彤雲流碧虛仰見南極當天衢星宫之君曳霞裾揮手招我來斯須東方小兒學仙術年年夢想蟠桃實櫂歌聲落蕅花洲今歲玉桃偷不得諸郎一一青瓊枝謝家兄弟田家兒門前紫荆花滿樹數月不見長相思阿翁白頭種丹杏賣杏積榖防年飢諸郎稱觴杏陰裏芙蓉出鼎丹光起豈不聞古來九世張公藝我願仙翁傳百世題禮部郎中安公山行詩卷安使君來自蓬萊東手持絳節凌天風水晶宫中好山色七十二辨青芙蓉樹陰暫繫青驄馬行部咨詢到山野傾筐紫蕨小兒拳出網白魚鮮可鮓浮玉山前一葉舟黃帽隔溪歌櫂謳天上神仙思下土行當獻納鳳池頭題天台山人山水圗天台之山四萬八千丈我昔飛夢登其顛三更雞鳴海水赤白雲萬頃皆瓊田長松如龍倚絶壁飛瀑懸崖練花白仙人邀我飯胡麻洞府髙寒留不得却從天姥踏虹霓獨抱明河秋月歸别來此境不復到空谷夜夜青猿啼丹丘有客持束絹使我玩之神不倦林巒暝色隔煙蘿仿佛當年夢中見故山桃花今有無劉郎何不歸仙都劉郎何不歸仙都莫向人間尋畫圗題二喬玩月圗皎皎天上月照見大江流江流去無已月色滿髙樓喬家二女在舒州憑髙望月樓上頭金波灧灧綺疏夕玉露盈盈羅襪秋自從嫁得英雄壻不知月落誰家去千古山河影在天江水東流年復年題七馬圗為張將軍作七馬來自流沙西二十有八玉鑿蹄時平四海罷征戰華山之陽春草肥一匹齕草兩匹洗刷臨清溪中有兩匹絡青絲奚官傍立不敢騎明當進入天門下一一金鞍蓋黃帕漢家不用千里才只許將軍看畫圗送禢二令弟秉德還南雄迎父買船何之之南雄洞庭木落生秋風大帆中流夾雙櫓南望庾嶺青叢叢禢郎去家五千里白雲日日山頭起浩蕩春暉一寸心深恩較比三湘水湘水有時盡此恩何時忘上堂進甘旨下堂食檳榔檳榔可食魚可膾白髮明年過吳㑹長安橋邊楊柳青馬上看花同一醉題望峽軒巍巍乎紫薇之山兮雙峰並峙乎西東上干織女之銀浦下瞰蛟人之貝宫天雞三唱海日紅雲窗霧閣風玲瓏俞家兄弟構華屋空翠飛落軒楹中堂上有親顔色好長年服食金光草笑傾阿母九霞觴啖以安期玉文棗三年仲子在成均回望天南多白雲每憑海鶴附書至遙見兩峰如見親俞生俞生忠孝者行看赤車馳駟馬前度劉郎未足誇重來還對紫薇花贈太醫院使戴元禮戴先生好神仙朝侍玉皇之香案暮游金華之洞天采藥不上蓬萊船餐青霞鍊丹砂騎雲翱翔太清家九重日月生光華千秋萬年樂無涯禱雨歌贈楊鍊師楊鍊師愛神仙乃在碧海之東偏仙人魏伯陽丹成上青天靈符玉文洞𤣥𤣥鍊師得之寶其傳凝神專氣合自然前年在袁州夏秋大旱不得雨山澤草木生炎煙去年海若犯河伯秋潮漲沙龜坼田今年魃也肆惡如火燒平原萬口嗷嗷不自活命如一髮千鈞懸鍊師不笑亦不言仗劒一呼龍出淵手挽天河注長川雷公電母相後先己巳及辛未一歲禱一雨遂令老稚飽飯歌豐年楊鍊師通神明長身玉立方瞳青公田及私秋有成功不自受歸冥冥靈風吹旗海氣鮏醉騎黃鶴吹瑶笙請以海門山前龍眼千尺浪和我一曲空歌聲代王奉祠贈别友人之京春風吹江春雪晴茶官放船明日行奉祠過我索長句把酒出餞鍾陵城沈郎有母華亭住三載思家不歸去側身東望白雲飛長繞九龍峰頂樹今年報政上京華還種北堂萱草花不學江州白司馬直將哀怨寄琵琶愧我梁園老賔客與爾從來未相識稍待金芽入貢餘紗帽籠頭共煎喫送知縣陳仲信之建昌朝游甘棠堤夕游甘棠堤堤上夜來雨秋風聞馬嘶借問向何處駕言南康去香爐生紫煙五老缺延佇山中瀑布水散為九江流江流二千里還歸東海頭海中有鯉魚好寄平安字手把釣鼇竿時時候書至鐵箭辨鳳凰山下通江門錢王鐵箭今尚存世傳當時有三箭兩箭沈沙俱不見唯留一箭在江頭此箭不隨江水流壯士摩挲撼其鏃根株下貫金鼇足出地曾無一尺髙定知作則捍波濤始豐先生真好辨直指是幢非是箭雨淋日炙四百年孤星煌煌長在天題東山清隱圗南山莫采菊北山莫移文西山食薇終不飽聽我且歌東山之白雲白雲宛在山之下卜得陂坑葬郎罷三年返哺學慈烏千里按圗求駿馬關山漫漫霜露多谷口秋風吹女蘿側身南望不歸去白髮倚門愁奈何東山之圗不盈尺時見山頭白雲白山有荔枝江有魚兒在天涯重相憶只今冠佩登鵷行誰種忘憂當此堂安得仙人縮地訣日日稱觴慈母傍寒食行江南三月梨花雨寒食鄰家哭兒女阿爺戰死長兄存二十年來别鄉土存無信息死無歸胡蝶春風淚滿衣紙錢空挂枯楊樹存者不知埋骨處一百五日年年來天外遊魂何不回北邙山頭生白雲北邙山下多古墳借問誰家埋白骨此中半是洛陽人陌頭夜夜銅駝哭冢上蕭蕭悲宰木家貧無地葬遺骸忍見烏鳶啄人肉白日短短雲無根翁仲百年當墓門花落春風一杯酒幾家寒食見兒孫送丘朝宗還黃岩百年三萬六千日先生行年今半百文章自守一氊寒勳業頻看二毛白我持我酒為君歌四十九年東逝波只今富貴須自致錦衣行晝毋蹉跎我生亦是東方朔往往尊前恣歡謔得錢痛飲即忘形抵掌論交宛如昨呼兒手折薔薇花山瓶瀲灔送流霞處士星當霄漢上異鄉吾土挹光華題雪雀圗老竹生棘間凍禽來上棲山空雪深相因依相因依歲將暮朝陽别有鳳凰雛長在髙岡碧梧樹題三桂堂吾聞戴家三兒翩翩如鴈行家有三桂之髙堂堂中八月風露涼三兒讀書三桂傍黃金月中樹白玉天上郎人言教子有義方東家牡丹好池館何如三樹歲歲凌秋霜題琴軒山髙髙水深深中有太古之徽音姚君手抱緑綺琴揮我彈徹天地心絃中一曲南風調千載無人識其妙水深深山髙髙此樂只許柴桑陶題古木圗蕭蕭疏疏木葉下歷歷落落霜樹髙丹崖寒深老石裂山風吹月清猿號當年畫史筆最好寫得乾坤秋氣老圗中轉手奪天工始信黃金未為寶題氷溪送别氷為溪玉為山芙蓉幕府山水間夫君三載主畫諾云是能詩謝康樂雅懷英英玉在璞清姿皎皎氷出壑玉以比君德氷以清我心笑呼麻姑酒載歌長短吟春雷送雨章江潯一夜水髙三尺深君今報政朝天闕十幅蒲帆挂明月氷溪迢迢東入浙白頭病起難為别因風寄謝鮑參軍氷玉相期保明哲題李將軍九虎圗李將軍家有先世所藏之畫圗圗中大小九於菟一豹馴狎與之俱丹崖翠谷行㩻䧢朝游長林夕負嵎馮婦見之應下車將軍佩以黃金符爪牙捍禦洪崖都願為麒麟與騶虞此圗傳家真不虛贈人入浙老夫暮倚襟江樓青山西來當屋頭白雲洗空涼雨過明月不隨銀漢流槐里弟兄交有道季方更比元方好敲門踏月夜相過玉樹清風滿懷抱笑呼麻姑靑玉漿仰天邀月月在觴須㬰各飲數十月月復挂在天中央伯也尊前重告别明日放舟東入浙我身願為帆上雲我心願作杯中月雲隨帆去不相離月落杯中時見之畫舫西湖載歌舞荷花楊柳總相思老我不歸今四夏近聞湖上多清暇竹雪能臨內史書武唐解寫王維畫故人東老最工詩興繞南枝與北枝若見諸賢煩問訊梁園詞客待多時次凱南清見寄詩韻白雲出山無定姿白雲還山無定期乾坤清氣不常用海內復見湯休詩昨夜大江深幾許彈舌沙中作龍語碧桃紅杏滿湖開仿佛雲間散花女上人正自曹溪歸星斗錯落環璿璣揮毫爛寫懷素草霹靂應手蛟龍飛我今已遂三生夢石上因緣何足論明當載汲洪崖泉煮茶談空共棲遁奉張公子歌戚里張公子古貌又古心面若一尺玉心如百鍊金碧樹陰陰繞茅屋不惜黃金買書讀有時夢到羲皇前河洛圗書看不足白晝呼童掃落花髙閒真似野人家堂上靈椿八千歲綵服裁為五色霞白頭邂逅洪都市令我見之心即喜今人容貌古人心一曲長歌吾老矣余辭老還家作中秋見月歌一章留别張公子我行鍾陵道五見中秋月明月流中天既圎還復缺月圎月缺可奈何今年照見病維摩舉頭見月發大笑白髮較比來時多來時黑髮今盡白玉兔有丹醫不得百年三萬六千朝願照年年好顔色張公子留侯孫臨風共爾傾一樽今古乾坤有清氣此趣勿與它人論明當載月東吳去挂在海門山頂樹唯有相思一寸心夜夜莫忘看月處題時習齊天行九十有萬里日月循環若流水人之為學亦猶爾夜以繼日恆不已譬諸行逺必自邇跬步千里自兹始為以九仞一簣止半途而廢良可恥文江有士復質氏人言是父生是子古來聖賢疾沒齒我其銘之吁老矣斗南老人集卷四
