body:
  text: 斗南老人集卷四明胡奎撰歌行葛洪丹井吾聞句漏仙翁之丹井乃在紫微之陽東山之頂仙翁丹成去不歸但見一泓寒碧涵秋影當年仙翁鍊丹砂呼吸沆瀣餐朝霞陶鎔日月精鍊冶紫河車𤣥液化白雪真胎結黃芽一朝騎龍去翺翔太清家遺此百尺井千古令人嗟轆轤無聲石苔紫子規啼老長松花我來汲井凌絶頂夜半飛出黃金鴉直疑此水接東海上通銀漢之靈槎靈槎迢迢貫明月漢使西回持絳節矯如黃鵠摩晴空何待金丹蛻凡骨酌以丹井水載歌仙人篇永言保之合自然勿因離别損顔色此水可以期長年松雲歌我思仙人乃在玉塵金鼇之兩峰以松為巢雲作宫白雲松下來夭矯如飛龍仙人騎雲與天通朝遊蓬萊暮崆峒東分斷鼇足西擘三芙蓉興來醉潑金壺汁元氣淋漓鬼神泣八窗虛明白日寒萬壑㟏岈翠濤濕昔年曽畫匡廬山置我采藥山之間别來仿佛三十載杏花落盡青春閒昨日相逢卧雲者因之欲訪長松下白雲悠悠江海空瑶草金芝共誰把山中之人招不來琥珀夜光生紫苔天寒茯苓儻可寄與子跨鶴登瑶臺送周應常歸餘杭大滌洞與華陽通中有許郭仙人蹤青山九鎖翠蛟舞明月孤懸天柱峰雷淵子雙青瞳顔如丹砂髮如漆呼吸沆瀣凌空濛手把五色金芙蓉翩然騎雲朝九重天寒猿鶴久相待詔許飛佩還山中太乙真人坐蓮葉銀漢無聲波帖帖滴露軒前夜氣清石函雲冷青瑶笈還山二月春風來玉屏洞口桃花開寄謝山靈儻相許吹笙弄月登蕭臺題敬賜內侍桂巖道人李吉之天香深處手卷吹君玉龍管酌我金螺杯聽我歌天香天香何處來廣寒宫闕髙崔嵬黃金布地瓊作臺吾不知當時老桂樹是誰親手栽但見月圎則榮月缺則摧九十萬里顧兔東西走不息歲歲花從天上開請君花下飲一笑舒君懷百年此興能幾回霓裳歌羽衣舞足踏虹橋上天府天香吹人千萬古願持此香蘇下土題敬賜內侍蘭谷道人蔣怡之詩卷有美人兮山之阿牽白雲兮被女蘿抱鳳凰之緑綺濯氷弦于絳河倚丹崖兮飲山渌采幽芳兮結纕服挹清風于九畹彈廣陵之一曲思美人兮不可招何以報之瑛瓊瑶含奇芬兮承湛露期永好兮同逍遙題敬賜內侍鞠大亨梅花洞天詩卷我聞羅浮古洞天縞衣玉骨皆神仙南枝北枝自冷暖古月今月同清圎開元供奉酒一斗孤山先生詩幾聫青鳥窗閒莫啼夢且容老子弄嬋娟望廬山陰雨不果平生愛寫廬山圗今朝始識廬山面山靈怪我來何遲涌出白雲千萬片千片萬片雲重重咫尺隔斷香爐峰東南五老望不見倐忽下上隨飛龍虎溪三笑今何在惠逺東鄰渺煙靄臨風大叫謫仙人九疊屏前定相待若有人兮山之顛手翻銀河下青天金芝瑶草儻可采我亦跨鶴來林泉寄題萬峰閣為越僧作巍巍乎萬峰之閣兮乃在句踐之國梵王之家不知何年始開闢但見層巒疊嶂涌出無數金蓮花想當大禹疏鑿際神輸鬼運紛如麻銜石走精衛補天驅女媧星聫棋布互參錯奇形詭狀何㠂岈踞者如虎豹蟠者如龍蛇斷者如截肪峭者如削瓜穹然古佛頂螺髻青鬖髿紛若越女鬟一一盤宫鴉又如祗王園中寶樹下諸天幡蓋雜遝相紛拏娑竭珠宫夜光白明月照海皆金沙我聞勝景有如此恨不一往乘飊車上人山中來笑語生煙霞中藏萬峰秀文采摛天葩風流逺接許詢輩佳句往往傳中華昔聞支道林好騎神駿騧歷覽山水窟逸思令人嗟我詩無根蒂政如焦穀芽安得從師極登眺東遊雲門與若耶寄謝山靈勿相拒待我一飯餐胡麻過吕梁洪次韻吕梁自從開闢來中有崩崖轉石之驚雷不知何年鬼斧鑿一水怒觸龍門開故人張帆涉幽險月出船頭金灧灧重瞳霸氣已丘墟百谷安流㑹江漢徐州城外山重重戲馬臺上生悲風古來豪傑俱寂寞但見水光雲影涵冲融還酹波神一杯酒三弄瓊簫吹龍友秋風吹夢過江南總是離亭折楊柳蘆花霜白鴈秪更天雞啼罷東方明櫂郎捩舵唱歌去衆中誰解吳歈聲人生壯志在萬里大鵬簸蕩東溟水蓬萊石上有金鼇手把絲綸共誰理月中桂子廣寒宫殿重重開天妃舞鏡登瑶臺婆娑飛輪上裴回玉龍吐涎雲外來靈鷲峰髙天不老琅玕無光琪樹小赤城洞口如飛沙碧桃藏春不敢花直疑仙人紫霞會靈風吹墮真珠佩猿童踏雲掃空階天雞驚起雙喈喈綵鸞瓏瓏呼不回和嵩嶽行吾聞三十六峰青嶙峋仙翁價重連城珍金堂石室不可到紫芝瑶草長清新自笑青春探靈祕望斷蓬萊五雲氣不是丹丘紫鳳凰按圗空想千年瑞使君看山雙眼青題詩曾寄山之靈吹笙每招王子晉采藥或遇安期生錦袍舊是龍門客不怕山靈夜呵責有時笑接浮丘公有時吹笙坐盤石醉騎黃鵠登天門濯足銀河清絶羣鴻龍玉狗森左右大叫閶闔排青雲紫皇授以瑶臺月照見迎風玉壺雪鶴夢寥寥蕙帳空幡然又與煙霞别黃河一千年一清六龍在天當聖明河陽種得花滿樹誰能解此春風情明當髙附埀雲翼直上榑桑望朝日肯信東方有小兒三偷阿母蟠桃實立春雨中作春雲陰陰春雨作今日迎春出東郭陌上青泥一尺深雨打牛頭濕牛角兒童奔走看春歸拾得春牛頭上泥阿翁大笑向兒道正應春頭種田好呼兒買酒祀田神大字搏泥寫作春田鼠不生野無雀有租納官心即樂題瞻雲軒迢迢東流水悠悠思故里故里日夜思中情無已時中情向誰言白雲在青天青天髙無極相望不踰尺慈烏知返哺越鳥知南巢異鄉非吾土瞻雲徒爾勞客從江上來贈以春蠺絲願織春蠶絲裁為游子衣駕言服春衣婆娑舞庭闈上以介眉壽下以飲春酒紫霞甕歌媧娥補天摶五色化作崑崙一拳石神人巧斫秋水骨玉臼敲丹碎蟾魄東方涌出玻瓈盆九氣凝結回鸞文天吳海若不敢受中含萬斛梨花春瓊液流波散成綺照見落花吹不起醉來大笑醯雞天吸盡長鯨百川水春夜聽何山人彈琴製烏夜啼曲梨花月白春冥冥城烏夜啼當二更白頭老翁識烏語揮弦彈作烏啼聲初彈翩翩飛繞樹再彈啞啞棲不住雌雄引子復回翔下上呼羣自來去髙逼天門清露寒牽牛踏浪銀河乾低翻塞草黃雲晚秦女思家玉關逺聫聫綿綿忽作行恍然無聲風滿堂老翁拂袖入門去海日杲杲生東方瓢巖歌送人之金華髙人愛瓢得瓢趣在山出山皆樂處十年不酌山中泉濩落江湖隨所寓既不學洗耳翁棄之不耐聆松風又不學懸壺老賣藥藏身以為寶朝騎華亭鶴暮踏碧海鯨身披紫綺裘手提力士鐺與瓢傾倒如弟兄興來喚明月大瓢小瓢相與傾大瓢一飲纍千觴小瓢百觴亦不停明珠走盤落咳唾謔浪好似東方生兀然一醉卧花下月落瓢空還復醒春江水緑花冥冥金華芙蓉天上青持瓢若飲雙溪水我亦相從來濯纓張鍊師祈雨歌以贈之蓬萊仙人谷神子夜扣天關與天語玉壇三日走風霆呼雲得雲雨得雨問之此是何人功不歸造化歸太空鹽官令尹恤民者方寸默與天心同我田有秋農有飯但願今年租早辦龍瓢馬上倒天河喜雨作亭功更多過益陽渡别腸刺刺弓弦急展轉車輪不停息正爾天涯憶故鄉一行過鴈煙中沒益陽渡頭白髮翁野店壓酒松花濃上船露坐待明月月色正與家山同人生進寸還退尺塞馬既亡仍復得洛陽年少謫長沙白也曾為夜郎客徐卿徐卿吾故人寒谷偶被陽春恩此時應有還家夢稚子壺觴正候門鵲軒行阿母昔年生子時靈鵲羣飛庭樹枝自從阿母生子後一月一年來上樓人言鵲聲能送喜為報君家得賢子十齡能讀書二十走馬青雲衢三十得官東海隅阿母騎鸞上天去故巢幾度空山雨鵲聲猶繞庭前樹子今逺遊天一方不見白頭在中堂但聞唼唼鳴朝陽唼唼復唼唼風吹庭樹葉葉落枝頭還再生安得母來聞鵲聲碧玉連環歌贈君芙蓉之寶帶佩以碧玉之連環寶帶纒綿合歡意連環宛轉雙虯盤雙虯盤無斷絶團團比似青天月月在青天缺復圎我環長圎不曽缺人生離别當奈何贈爾一曲連環歌送富陽李孝子秦川之水東南流中有孝子一葉之扁舟借問舟行向何處家在嚴陵灘畔住嚴陵灘畔棲鶴村阿母望兒長倚門兒歸上堂母心喜寸草曷報春暉恩兒有青囊舊時術自信他人傳不得得錢欲買氷上魚卜地翻鐫墓前石兒今何所願願老嚴陵灘不願麒麟臥髙冢但願瓦棺葬母山之間千古萬古子母安如山白雲歌白雲在青天浩蕩凌髙風丈夫志四海飄颻無定蹤君從冠冕山中住雲亦無心隨所寓吳山越水接荆揚總是當年棲息處九重蕩蕩天門開一朝乘風朝玉臺故山猿鶴無驚猜從龍作雨還歸來題畫大山小山芙蓉開雲氣逺從天目來山中六月不知暑雙松如龍嘯如雨磯頭水深三尺許水中石子清可數石子可數易見魚髙人把釣心焉如五湖風髙浪如屋何人同唱滄浪曲滄浪曲欵乃歌細雨有笠斜風有蓑吾誰與歸張志和漢武詞通天樓閣排雲開仙掌露寒金作臺八月一日王母降七龍九鳳相裴回手持玉桃獻天子此桃結實三千歲東方小兒忩間笑此兒三偷入瑶島帝欲種核留人間服之可使長朱顔茂陵秋草今何在回首雲霞渺瀛海題望雲圗為越人作湛湛越江水胡不一洗九曲之離腸英英越山雲胡不化為五色之衣裳兒今食祿天一方隔江望雲如太行中流一葦信可航父兮母兮不得將春風紅藥花正好不如階下冝男草堂中之人長壽考此圗端比陳情表題琴月樓白玉可斫明月輪黃金莫鑄知音人子期一去不復見惟有明月長相親有時月到彈琴處月不能言解琴趣琴非有意招月來月亦無心與琴遇我琴寥寥太古音月色皎皎清人心世上知音有如此鑄之何惜千黃金吾聞山東李翰林金尊有月無鳴琴又聞柴桑陶靖節素琴有酒無明月何如有琴有月有濁醪神交千載李與陶遺世獨立何其髙題漁樵問話圗江可漁山可樵山頭白雲手可招出門黃塵浩如海胡不歸來共逍遙何人寫此漁樵子咫尺江山千萬里船繫松根雙石頭山人伐木來相求相求未已還相問問之不答心悠悠子陵何為而辭漢太公何為而歸周買臣何為而晚遇屈原何為而逺遊持我修月斧操君濟川舟天子不知名大臣不見收漁翁向樵還大笑今古同生不同調富貴功名何足論與君盡醉長傾倒題楮衾歌任公子釣鼇龍伯宫爛爛五色雲飛出槫桑東海若天吳失顔色河東美人織不得并刀剪斷紫霞綃八繭吳蠶空自白仙人王子晉騎鶴來人間手卷錦鯨去東入蓬萊山相逢㑹稽楮共聽西窗雨滿牀蝴蝶花片飛夢中笑殺秦川女何人視草白玉堂青綾夜對官燭光豈如蓬萊山人醉眠日丈五獨擁八天溪藤霜築城歌隋有鹽官城漢無鹽官城唐有鹽官城宋無鹽官城荒城蕪沒知何代唯有東流水長在蓬萊清淺半桑田精衛年年塞東海前年無城禦邊烽去年無城機杼空今年長城髙百尺誰其主者陳元龍重門鐵鎖黃金鑰刁斗無聲夜停柝七星挂城明月低萬戶千門慘清角何當四海車書同蒼生樂育康衢中明年開城看歌舞城南城北春花紅題白雲山舍為桑孝子作欲知慈母心磊磊髙山石欲知慈母操青青古巖柏阿母生兒才十年空山别鶴悲離弦兒今讀書母身健績麻夜坐明鐙前父昔生兒願兒好兒心一寸春暉草母在山中父在天結廬長在白雲邊桃花馬吾聞古有穆天子八駿西行日千里何年下浴瑶池泉滿背落花飛不起月氐貢入光明宫天間十二皆春風東方小兒拍手笑曽識崑崙千歲紅白玉鑿蹄金絡腦一點明霞落煙草征南將軍天上來時人稱是真龍媒房星照地春如海㑹見論功朝玉臺舟過采石擬弔謫仙風雨所阻弗遂炮車雲興大風作收帆夜傍沙洲泊春陰遮斷蛾眉亭不見蛾眉鏡中落欲弔開元李謫仙錦袍一去三千年如何古時月不照今人船自從捉月上天去不知月落歸何處月照人間無古今江流不斷天沈沈乾坤清氣古亦少大雅遺音向誰道白也明朝知我來放出蛾眉翠如掃舟中醉歌示同舟友人歌越調唱吳謳南風吹過黃蘆洲前船後船相逐起聫聫翩翩鳥銜尾前船相開後船喜不用愁風更愁水采石有酒江有魚買魚沽酒歌嗚嗚歌嗚嗚擊唾壺人間此樂曽有無題鐵柱觀鬼斧鑿竅開洪濛平地涌出蛟人宫地脈上與星河通一勺活水藏神龍想當鍛鍊昆吾鐵祝融噓煙走列缺穹然一柱閉靈穴萬劫天風吹不折旌陽上天去不還安得化鶴來人間西南地折鎖連環永鎮王國安如山題松竹軒蒼髯丈人偃蹇而瑰奇此君髙節能配之平生共持金石操晚歲不改氷霜姿閩南劉侯好清古天風吹入洪都府半空清籟奏笙竽九夏涼陰覆窗戶吾聞松根生茯苓服之可以延遐齡又聞竹間棲綵鳳一鳴可以開太平劉侯劉侯世所重大才㑹入明堂用不然截作任公之釣竿金鼇一掣滄溟動題徐隱君清樂堂泉泠泠石鑿鑿在山泉清出山濁人生何如在家樂南州髙士不復作北岡有孫甘淡薄卜居長年老丘壑東家買雞雞被縛安識昂昂九霄鶴我來南昌古城郭幾度題詩寄江閣麻姑酒美魚可斫未登公堂同一噱先遣飛廉寄寥廓題義鵲圗柬海有二鵲相逐潮頭飛一鵲忽墮水羽翼何紛披一鵲回旋抉不起唶唶叫羣驚未已須㬰二鵲東南來挾之同入青雲裏嗟爾禽鳥尚同心何况朋類不如禽送羅生之吏部魯陽莫駐西飛日精衛莫填東逝波滄波無情白日短奈此西飛東逝何南昌城東羅孝子捧檄還家二親喜一夜江頭春水髙片帆又逐南風起兒有冝男草種之北堂前兒有崑崙桃介壽三千年朝盤鯉魚白如玉明年兒歸當食祿白日可駐海可填兒心報恩同昊天東汾書舍吾聞天台之山四萬八千丈連岡叠嶂如游龍金鼇屹立東海上東汾更在金鼇東開元謫仙好孫子宦游卜得佳山水讀書聞有宋諸郎遺愛尚傳唐刺史古人不復作悠悠令我思至今東汾月挂在珊瑚枝我來豫章城邂逅龍門客示我東汾之畫圗丹霞翠霧仙凡隔安得與子騎鯨魚拾得東海明月珠試問蓬萊花鳥使弱水清淺今何如題罔極詩卷華蓋山頭白雲起孝子呼天淚如水夢隔庭闈四十年心懷丘隴三千里白日短短雲無根有身莫報罔極恩寒食梨花一杯酒幾家墳上見兒孫兒今食祿司成館俯視長江流不斷長江不斷深復深何如孝子罔極心題樵雲請樵停斧柯聽我樵雲歌問樵住何所乃在山之阿朝樵林下風暮樵谷中雨林風吹我衣谷雨沾我履何如白雲深處棲采樵不離雲東西有手自操修月斧有足能踏登天梯山頭膚寸崇朝起從龍化作天瓢水一洗八極黃埃空隨雲復歸巖壑裏若有人兮被女蘿扳崖度嶺無風波世間萬事浮雲過樵雲樵雲奈爾何贈揭學士孫和仲劒江之水緑於酒夜夜清光射牛斗龍泉太阿飛上天寶氣千年應不朽揭陽孫子玉無瑕云是前朝學士家藏器待時須努力豈無雷煥與張華次韻祈連山頭落日低黃雲萬里天冥迷江南已見雁北向塞上遙聞烏夜啼南北相望春夢杳可憐日月籠中鳥霜髙沙磧劒衣寒月墮穹廬角聲曉憶昨公館春茫茫手援緑綺彈宫商得句共誇何水部知音多識蔡中郎神交有道不可忘至今翰墨留餘香丈夫豈無一掬淚不學兒女情徊徨黃河之水東入海别意更比河流長河中鯉魚有書信時復幸寄瓊瑶章壽容齊鉛花洗空霜倒飛金鴉浴海迎朝曦蓬萊宫中青鳥使銜得玉桃天上歸東海仙翁紫霞㑹碧落回風響環佩伶倫玉琯吹鳳皇夜半九地回初陽羲和緩轡紅線長羣仙年年飛羽觴六甲明年重建子六六周天自今始題餘慶堂請以漢溪水注我流霞觴奉君以瑶池千年之桃實贈君以玉兔萬杵之𤣥霜春風花開餘慶堂鶴髮倒映青銅光阿翁手種兩松樹黛色已見參天長子今宦游天一方膝下思見斑衣裳豈無雙鯉魚路逺不可將但有一寸心直與漢水流湯湯漢水東流入東海餘慶綿綿鎮長在巫山髙巫山髙髙入天峰頭一一相鉤連上有朝雲萬仞之飛鳥下有暮雨三峽之啼猿有美人兮山之顛風裳月佩秋娟娟懸崖歷澗不可見翠霧參差出宫殿須臾吹起大王風朝雲飛散暮雨空依然十二青芙蓉壽友人丹丘仙人頭雪白玉宇髙寒棲不得天目之陽多翠微却跨黃鶴江南歸山田有秫澗有水鹿車同挽青山裏龎公以安遺子孫足迹不踏襄陽市少微之星白煌煌直與南斗相低昂東方小兒骨未鋭玉桃親見三千歲安得左持桃右持觴祝公壽登公堂天台山髙四萬八千丈願公與山同久長芝原為富春馮孝子作大樹將軍之子孫何年葬父靈山根仙翁騎鶴去不返但見紫芝燁燁生靈原叢叢一抔土上天應念兒心苦千年石室發幽光得見靈芝如見父人言服之可長年安得靈魄登飛仙芝生在地父在天鶴歸夜夜山之顛題桂林榮遇圗白髮劉郎江右住髙堂大字書榮遇借問何因得此名向人指㸃門前樹年年八月金粟開云是仙翁親手栽異本定從天上得清芬應自月中來只今繫馬長安道夢想故園秋色好匡廬青壓九江深翻笑淮南小山小草木之生關盛衰百年培植當清時寄謝子孫毋剪伐青雲留取最髙枝金谷園金谷園中春蕩蕩四十里圍紅步障萬斛明珠換緑珠纎歌半落青雲上刀擊珊瑚碎玉飛當時豪俠世所稀撞鐘考鼓夜復晝二十四友相追隨一朝喋血河陽市繁華總逐東流去鸚䳇明朝錯喚人梨花滿地愁如雨王子喬天上迢迢白玉京仙人吹笙學鳳鳴七月七日緱氏山身騎白鶴來人間遨遊青天去不還王子喬好神仙呼吸日月凌雲煙吹笙學鳴鳳遨遊太清天翩然跨鶴來緱山七月七日遊其間空歌一曲綵雲外長謝時人去不還相逢狹斜行相逢狹斜路借問遊何處男兒不戀家西上長安去大車轔轔朝出關小車已沒雲中山安得兩輪生四角逺遊不及還家樂送人之京夜聞秋雨聲