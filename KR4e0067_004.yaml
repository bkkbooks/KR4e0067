見月夜夜長圎莫教闕聽沈童子彈琴歌沈童子玉雪顔年十四彈猗蘭手持三尺鳳凰尾南忩一拂南風起明珠落落走瑛盤碧澗泠泠寫秋水近傳一曲度關山變徵移商頃刻間落盡桐花三日雨令人側耳竟忘還燕中老人歌桐花半落南忩雨三尺枯桐瘦蛟語燕山老人雪滿顛尊前相見說當年向人解唱清平調玉碎崑崙鳳凰叫一聲飛空過綵雲此曲不許人間聞爾當更為歌一闋贈示西湖歌明月題李生環玉軒李公子來自西崑崙于闐河中白石子何年移植蒼山根碧雲四合不見日入忩空翠凉紛紛得非伶倫氏采之貢軒轅軒轅臺上調六琯吹得鳳凰五采相騰騫鳳凰城中鳳之穴結巢下啄青琅玕李公子何翩翩伯也如圭璋如璠璵何不披腹排天閽森然玉筍聫朝班不然借我截為任公之釣竿一掣海水金鼇翻明年二月春水渾我當拿舟扣卿門香風堂上振環佩春雨階前羅子孫卿當贈我青瑶琨何以報之雲錦文卿家令弟未相見寄謝此君須㑹面鵲巢行贈博溪姚氏姚家溪南有髙樹雙鵲飛來復飛去年年結巢生好雛雛大還來故巢住主翁朝出見鵲飛主翁暮歸見雛棲鵲聲日報主家喜主翁不惜髙樹枝樹大枝髙鵲巢在驟雨顛風終不改送黃千戶還台州衛天台山髙入天此地自古多神仙穀城黃公好孫子豹略龍韜有如此朝餐赤城之紫霞夕飲丹池之玉醴今年分守鹽官城天風嫋嫋吹華旌星河萬里入東海島嶼不聞刁斗聲方秋復上天台去即是桃花舊時路華頂峰頭月正圎依然挂在珊瑚樹鹽官父老紛如雲出城走送黃將軍鳴笳叠鼓動離思一路好山相送迎唱吳歌勸吳酒十里一亭五里一堠天台山髙入南斗將軍之名同不朽題蘇武還鄉圗北風何烈烈孤臣持漢節蕭蕭匹馬鳴灑淚河梁别李陵臺北望關山十九年中一日還歸拜茂陵松柏下鄉人驚見鬢毛斑漢兵萬里窮沙漠遣使和戎慙衛霍留得千年太史書中郎將在麒麟閣送百戶張文勝之台州時營造城門張將軍乃是留侯之子孫妙年壯氣凌青雲而翁奮迹龍虎衛從戎萬里天南去將軍世祿襲竒勳分鎮夫差射潮處身騎駿馬白雪毛手提三尺昆吾刀天吳海若不敢動馮夷伐鼓回秋濤海昌城頭鳴夜柝海閶門是將軍作我識平生一片心露寫金盤氷出壑昨日城門開將軍躍馬來今言出門去駕言上天台天台山髙四萬八千丈明月挂在瓊臺上回光還照海昌城夜夜東西兩相望題沅陵朱指揮蒲萄瓜圗上有天厯之印博望昔使西南夷蒲萄瓜實何離離傳來中國數千載天厯畫師曾寫之沅陵將軍好事者此圗本自蒼梧野大宛分種及燉煌何異按圗求駿馬吾聞蒲萄可釀酒瓜瓞能延年方今王化被八埏將軍將軍今張騫送彭仕貞歸漣川省親岸芷兮汀蘭風蕭蕭兮露漙漙彼美人兮于焉盤桓山川悠悠兮路漫漫嗟鴻鴈兮隔雲端又歌曰汀蘭兮岸芷風蕭蕭兮露瀰瀰彼美人兮于焉棲止山川迢迢兮路千里嗟鴻鴈兮隔雲水送張皋百戶之京張將軍真丈夫矯如沖霄决雲之快鵠捷如追風掣電之神駒昔年倚劒醫無閭披甲上馬擒單于論功分鎮東海隅紫氣直貫蛟人居前年手把金僕姑白日射殺三於菟去年捕賊黃道湖緑林豪客一掃無張將軍才且武奏鳴笳喧叠鼓杏花團雪風雨晴東風夾道吹髙旌我徒我旅馬前拜共愛將軍如父兄長安道上聽馬聲願留將軍再守鹽官城禱雨有感去年六月天不雨農家到處憂禾黍縣公一念格天心三尺甘霖蘇下土今年不雨夏徂秋縣公惻怛農心憂西潭朝乞白龍水東井暮檄烏龍湫四山雲興龍出穴一夜滂沱洗炎熱縣公有祿民有租喜雨亭成碑可揭使天雨玉復雨珠飢不可食寒不襦我今歌詠豐年屢大書特書不一書夢遊廬山歌我有紫霞想夢遊匡廬峰仙人凌絶頂手掉金芙蓉芙蓉亭亭九天上叠嶂騰騰涌波浪五色雲中白鹿鳴三更海底金雞唱懸崖瀑布從天來匹練倒界青天開髙人似是陸修靜邀我石磴行莓苔九江秀色可攬結欲跨長鯨捉明月望斷蓬萊青鳥書琪花落盡無人折飛身上挹香爐煙坐我九叠屏風前翻然拜手招五老一笑倣佛三千年松風泠泠吹夢覺鶴背髙寒露花落早知此境隔塵凡只合棲神向丘壑何人寫此江上山雲山與我心俱閒明當㑹碾飊輪去長謝時人竟不還長平箭頭歌戰長平四十萬人同日坑古苔蝕血銅花青千年金簳摧白翎空遺黃金鏃不射秦時鹿西出咸陽門哀哀鬼夜哭題羅浮仙人便面圗我有齊紈之扇面大如青天之玉盤中畫羅浮古仙子風裳月佩如飛鸞十月江南花信早孔雀屏前春浩浩願持此扇朝暮看一輪寶月長團團貝宫夫人海宫曈曈紫貝光瑶妃叫月歸龍堂金虯蜿蜒翼兩傍手弄真珠白煌煌天寒北渚采瑶芳窈窕宛若驚鴻翔湘南老竹泣娥皇二十五弦秋夜長秋思西山日沒東山紅白蟾夜浴天河東望舒逸駕碾晴空銀牀風葉墮疏桐美人團扇辭漢宫流螢稍稍入房櫳空閨搗練夜未終關山夢長啼早鴻贈峽川僧玉堂學士文章好夙昔與師交有道朝罷揮毫寫贈言師也得之如得寶我亦前身支許流十年不見紫薇秋白頭未了看山債安得杖藜同一遊又吾聞紫微山上應紫微星山中有僧寶趺坐香華亭臞然玉立雙瞳青閲盡西方華藏經潮音動地天籟作海上魚龍皆出聽靈鷲西來有黃鶴重重無盡開樓閣月華先照妙髙臺光明雲繞加沙角題了菴道人魏吾聞伯陽鍊丹金罍山丹成上天去不還芙蓉伏火絳泥冷空有寶訣留人間神仙中人不易得今見其孫有仙骨手把參同一卷書此書云是傳家物往年騎鶴上𤣥都袖有龍虎真人之畫圗雲窗霧閣在咫尺萬里何必尋方壺歸去西湖飲山淥一榻了然心自足琪花滿地雨聲寒為爾髙歌洞天曲題王繼賢山浦樓詩卷豐城客子王季友復有雲仍繼其後我來五載寓鍾陵每想憑髙摘星斗樓居宛在城之西中有百尺青雲梯西山南浦望中見飛雲捲雨天暝迷滕王髙閣今何在唯有江山留勝槩昨夜神龍挾雨來洗出波斯萬螺黛我欲笑拍洪崖肩飄然駕鴻凌紫煙俯視東溟一杯小門外黃塵空擾擾題王得賢槐陰堂詩卷三槐何鬱鬱云是晉公栽自從栽槐後二郎登上台後世佳孫子買地亦栽槐我願子孫多種德莫負當年王相國種葵東園種葵葵葉長中有寸心傾太陽去年采葵花萼少今年斫葵根本傷但得中天太陽在葵根縱傷心不改采蘭陟幽澗兮掇崇蘭葛藟藟兮路巑岏思美人兮淚汍瀾心搖搖兮不能餐采芳兮寄逺望佳期兮日晚日云晚兮霜露多蘭兮蘭兮奈若何題馬圗玉花驄氣如雲畫史只數曹將軍將軍畫骨不畫肉韓幹畫肉神不足此圗與曹略相似逸氣雄姿有如此何當掣斷青絲韁任渠蹴踏天河水題雪心上人畫梅不見雪心人鐵心花更好雪心人寫鐵心花京路緇塵向誰道夜深天女散花來縞衣飛下瓊瑶臺鐵心如石不可轉雪心如玉渾無埃送人之京烏啼山頭日杲杲丁蘭井上桐英老徴書催起孝廉船慈母倚門兒在道揚子江邊多鯉魚一日兩潮須寄書五月臨平蕅花發臨風送别意躊躇送張稅使朝看長安花暮折長安柳柳條鵝色黃映我杯中酒君車上天去我笠歸山中今朝一分手他日還相逢相逢須下車相見須下馬有使過長安寄書虹橋下小姑漠漠山隔霧冥冥水涵天舟人起相報行過小姑前推篷問姑姑不語不省姑年今幾許姑云獨立大江濵一生不踏名利塵愧爾東西南北人送臨海張司訓天台山髙四萬八千丈我昔飛夢遊其間天雞二唱海色動瓊臺銀闕髙嶄碞留侯之孫江海士磊落襟懷有如此三年把釣掣金鼇文采珊瑚湛秋水子居東越我句吳一朝邂逅青雲衢得魚賔館休彈鋏挾䇿王門且曳裾二月江波緑如酒我亦張帆大江右洪崖山頂望春晴一度相思一回首贈别正月二月春風來桃花李花猶未開故人酌我一杯酒恰似漢水蒲萄醅邂逅關西好孫子磊落竒才有如此况有能詩何水曹尊前談笑清風起揚子江頭春水生一帆東指鹽官城明朝我亦南昌去長倚香爐望晚晴落星石落星石何磊磊既不補青天又不填滄海屹立中流竟何待銀河一水夜迢迢胡不上天橫作橋送萬玉潤往杭州朝看𤣥都花暮折洪都柳笑拍洪崖肩醉酌麻姑酒槐里堂上好弟兄去年相别鳳凰城却憐春草池塘夢飛過南州孺子亭浩飲酣歌復相見白頭頓覺身強健此地豈無新相知新知何如故交面伯也買牛歸力田仲也又上東吳船我家正在南斗下卜築草堂滄海邉荷葉圎時君定到一段離情向誰道稍待秋風白鴈來便中先寄烏紗帽梅竹軒徐卿自是麒麟駒當軒種樹玉不如雪後疏花映修竹倚竹看花仍讀書縞衣仙人心似鐵翠袖天寒更清絶歲晚能全金石交平生不改氷霜節邇來將跨葛陂龍翻然直上珠崖峰與卿别後相思處好在黃昏明月中題扇贈萬玉立枇杷雨足風日清故人别我豫章城相思一日復相見使我白髮生千莖章江碧樹三十里馬蹄蹴踏青雲起問誰此地最知心槐里堂中好兄弟泮浦書堂上山逐翠羽入海探明珠翠羽出南粵何如阿翁築堂兒讀書翁昔有堂臨泮浦羣山如龍青入戶絃歌聲繞五羊城直把番禺作鄒魯仙梯曽躡廣寒宫教鐸來振東湖東昨者王門一相見襟懷磊落生秋風何當借我端溪硯醉墨淋漓寫詩卷生男但學梁伯鸞翠羽明珠何足羡送鍾孟振服滿之京豫章城中頭白烏結巢樹頭生好雛一朝雛飛上天去夜夜思歸故巢樹故巢樹老何所依葬烏在山雛乃歸雛歸啞啞不見母三年淚灑墳前土雛今振羽挾青雲五色鳳凰同作羣上林有枝風日好雛兮上天當及早贈峽川僧山色溪聲語未終朝天又拜紫泥封薝蔔林中灑甘露犀牛扇低揚清風我亦平生愛山野師今共結東林社稍待枇杷春雪晴乘閒來借支郎馬題夏圭畫三日大醉喚不醒夢到九叠芙蓉屏兩崖中斷寫飛瀑匹練界破青天青髙人似是陶與陸坐聽松聲飲山渌覺來忽向畫中看回首秋雲滿巖谷送繼甫之京爾祖文章妙天下前朝聲價髙班馬黃金有像鑄莫成白雪無絃和應寡我識若翁東海邊與子論交三十年茅屋蕭蕭坐風雨布衣落落棲林泉九重詔下徴賢士眼中之人得吾子鳳鳥及時當一鳴神駒墮地須千里官船十月渡龍河有信還憑白鴈過聖德如天無逺近除書早晚定如何和朱彥倫教諭題山水障歌蓬萊仙人居五城六鼇戴山波不驚吮豪池頭閻畫史掃霧驅煙移翠屏城中無山愛山好憑軒迥出秋雲杪似有青猿隔薜蘿直疑白鶴回穹昊此中逸興浩無邊流水桃花心杳然括蒼先生偶相過想像石門之洞天石門洞口松花老中有飛泉來一道丹崖拔地千仞髙玉筍凌空衆山抱軒轅騎龍登上台下視培塿皆蒿萊從今慎勿念鄉里一日看畫須千回揚子江阻風戲柬同舟諸友金焦兩山青突兀人言下有蛟龍窟颶風吹浪打船頭白日低昂天倒流安得列禦冦三清八極同遨遊送王河泊楚人歌竹枝吳人歌白苧寄言黃帽郎停舟向江渚江渚清漣漪江風吹客衣三載一朝别寧無千里思子乘道上車我戴山中笠它日若相逢還當下車揖雩陽好山水三江接龍門願託雙鯉魚時時寄平安望雲軒與太學生焦思齊賦白雲何重重乃在蜀川之西芙蓉之峰太學儒生念慈母望雲千里心忡忡朝望雲在西夕望雲在東白雲有聚散此心無終窮兒昔在家時手種冝男草阿母倚堂門看花顔色好兒今兩年不得還夢裏猶懷蜀道難秋風吹夢渡江去飛繞太白峨眉間意匠經營勞畫史别情深似巴江水丈夫當學狄司空讀書莫忘孝與忠題文昌圗星中之君號文昌開闢造化分𤣥黃修髯玉立頎而長黼黻雲漢昭天章駕風鞭霆遊八荒下視九㸃煙蒼蒼我欲從之翺且翔翩然騎雲朝紫皇勾陳𤣥武森在傍呈琅玕兮沐恩光是用作歌孝友張福我壽我期無疆一天秋月為侯少府作仙人髙居鵲華峰手把五色金芙蓉驂鸞翳鳳朝九重翩然出入蓬萊宫軒轅上天騎白龍羣臣泣抱烏號弓八年鴻臚贊翊功帝命出佑天南東鳳城百雉盤修虹海水直與銀河通仙人披錦袍玉立氷壺中笑呼東方白兔公周覽八極氛埃空廣寒三萬六千戶借問誰持修月斧上界清虛隔風雨應知照見顛崖苦兒寒思母衣兒飢思母哺莫向人間照歌舞為天作眼萬萬古題蘭雪軒魯連解世紛談笑却秦軍功成蹈東海千載揚清芬皎皎天上雪可以比髙潔英英谷中蘭可以喻清節開元供奉李謫仙神交倜儻知仲連一歌清風灑蘭雪讀之使我神飄然鳳凰山前隱居者水石軒忩亦瀟灑何時酌我葡萄醅大笑長歌呼白也望三茅山吾聞句曲三洞天此地往往多神仙三茅兄弟鍊金液何年駕鴻凌紫煙大峰小峰青可愛中峰更在丹霞外似聞碧落度笙簫仿佛泠風振環佩停車一覽心神開忽有白鶴從東來明當借我上天去手把芙蓉朝玉臺鴛湖舟中玩月四月十五夜團團三五月挂在鴛湖東方舟泛流光坐我青天中低頭看月月在水倒影嫦娥呼不起三更露下苧袍涼恍然濯足銀河裏城南斗酒真珠紅與月共醉蛟人宫醒來月落不知處張帆且趂清明風題梅花村民為嚴司征作我昨夢入梅華村清晨有客來扣門為言渝川一佳士貌比玉雪清而溫平生愛種羅浮樹仿佛羅浮洞中路積雪擁門三尺深漁歌樵唱無尋處主翁杖策何逍遙出門一色皆瓊瑶縞衣仙人夜相訪緑毛么鳳鳴交交寄言渝川士何為自慕村野人調羮不入商家鼎止渴不給曹公軍蘿窗一榻延素月醉來自卧梨花雲我今尚被微官縛夢中猶想村中樂憑誰喚起何水曹歲晚題詩寄東閣梅月雙清歌為憲司經歷賦羅浮仙人乃在瓊瑶臺炯然玉立無塵埃乾坤清氣不常有白月飛上青天來常時見花不見月一色梨雲萬株雪只今有月復有花幕府芙蓉共清徹吾聞揚州何水曹東閣賦詩清興髙又聞孤山林處士詩名清似西湖水吁嗟今夜月曽照古時人古今同一趣花月長相親氷為神兮玉為質鐵石心腸人不識㑹當弄影舞婆娑花前重寫雙清歌壽樂堂為潘上舍題陳綺席進華觴聽我長歌壽樂之髙堂堂中老人壽而康金蘭玉樹森在傍世人但願生兒早兒未成人親已老惟有潘家好弟兄親年未老兒長成綵衣朝朝舞花影紅燭夜夜聞書聲進華觴陳綺席五福之中壽居一明年兒當五鼎食人生此樂無終極題具慶堂為趙參議作日出大梁城照見黃河清黃河清見底四海歌升平紫垣星髙黃道正積善之家有餘慶平原趙公忠孝門食君之祿承君恩承君恩食君祿白髮髙年膺五福堂前大椿八千歲架上羣書三萬軸請以五色線為補舜衣裳普令天下人同登具慶堂愛日熙熙舒以長顛崖化為仁壽域萬億蒼生賴蘇息題清致軒玉湖清氷清徹底銅盤甘露甘如醴一洗胸中萬斛塵揮毫濯以薔薇水坐中賔客且勿喧聽我長歌清致之髙軒聞道幽居最清絶人物似是瀛洲仙五峰佳氣鬱不散仰見華蓋當中天朝朝拄笏延爽氣空翠飛落軒楹前自從負笈登太學借問不歸今幾年山猿野鶴豈無夢緑蘿夜月秋姢姢萬先生何磊落在山泉清出山濁手把芙蓉朝紫皇下上青雲騎一鶴㑹當四海澄其源白日洗天風雨作題雷節婦鳳凰丹山穴雌雄兩相依鳳兮一去不復返孤凰繞樹鳴聲悲堂前有五桂一一青瓊枝雛今文采生光輝飛翔阿閣登天墀瑶池流玉漿𤣥圃産金芝孤凰形影自相弔風雨故巢終不移贈張將軍張將軍乃是留侯之子孫英姿卓犖超凡羣帝令洗劔滄海水東踰暘谷西昆崘捷如摶風之快鵠矯若運海之遊鵾我願千萬年海水直與黃河清海為濠山為城四境不聞金革聲東旭軒我昨夢見摩尼幢智幢道人忽相過笑指東方海日紅恍如東旭軒中坐浮生擾擾大夢中幾度金雞啼向東百年三萬六千日日出日沒皆虛空道人還家見東旭爾軒何異吾家屋當窗寶樹唱天雞隨地金沙接暘谷我今去踏東華塵曙色蒼涼朝紫宸萬井轆轤霜滿袖回頭却笑軒中人豐城寶劒歌送李判簿之京豐城雙劒如雙龍何年沈伏泥沙中騰輝夜夜射牛斗紫氣化為千丈虹不逢張雷識奇寶至今甘與凡鐵同太阿龍泉雌與雄玩之翕歘生雷風開元供奉佳孫子磊落奇才有如此手提三尺陰山氷鸊鵜膏凝白鷴尾一劒躍入延平津一劒飛騰如有神雙劒相離復相見何況鄉里同心人我歌雙劒篇酌爾一杯酒㑹行髙步上星辰有待雲霄重回首椿萱堂為憲史張彥文作吾聞廣成子千二百歲居空同又聞麻姑仙三見清淺蓬萊東此皆荒唐何足道不如靈椿與萱草靈椿得夀歲月長萱草忘憂顔色好秀州孝子留侯孫園有靈椿堂有萱歲歲花開黃鵠嘴慈親白髮倚堂門兒昔在家時讀書秋樹根上堂問甘旨下堂候寒溫兒今髙步霜臺表回望白雲心懆懆但令一日簡書稀歸著斑衣舞晴昊豈不聞留侯曾進黃公履歲晚相從赤松子千載雲仍有祖風移孝為忠照青史題畫逺公昔住廬山下一十八人同結社到寺聞鐘即皺眉只有柴桑姓陶者不知何人寫此圗風致還似東林無阿翁手持九節杖一童抱琴不受呼今人古人同一調虎溪何必傳三笑題詩寄謝香爐峰待我來躡金芙蓉聽雨軒為夏節兄弟作朝聽西窗雨暮聽西窗雨暮暮復朝朝弟兄同笑語雨聲一夜隔天涯兄在它鄉弟在家千里情牽湘水竹三年夢繞錦城花吁嗟人事何草草出門不如在家好在家聽雨聲在牀出門聽雨聲在道原上不須悲脊令堂下不須栽紫荆願言四海皆兄弟來向夏家聽雨聲送别峰上人之京我聞澄江淨如練優鉢曇花世稀見千載髙安古道場師來重把犀牛扇先皇在時常引見詔許談經明光殿尚方雲錦賜袈裟甘露天㕑分內膳翩然卓錫雞鳴峰帝遺渡杯來向東神機鼓舌走飛電玉麈到手揚宗風白雲在天無所住塔前雙檜為龍去一夜呼龍入鉢來森然化作唐朝雨五色絲綸下九天師今又踏大江船山色溪聲何限意總歸八萬四千言題雲海茲上人號雲海一脈曹溪鎮長在何年杯渡東海門拾得海底珊瑚根上有六鼇峰𤣥靈結胚腪置之太華芙蓉盆中有靈響含清溫靈泉貯空碧倒影莓苔痕上人臨流築髙軒平地幻出祇陀園翻經灑以甘露言寶花亂落青瑶琨我亦平生好禪者十載夢遊雙樹下正思執熱濯清漣何由借我支郎馬峴山樵隱歌為二令劉克和賦劉侯襄陽人自言襄陽好樵居卜隱峴山陽漢水一江流浩浩朝汲江上水暮樵山中雲拂石坐埀釣讀書行負薪笑殺風流晉山簡習家池頭意蕭散小兒拍手唱銅鞮馬上歸來不知晚更憶羊公墮淚碑英雄一代令人思鳴笳叠鼓白日動千載以來如見之漢江之水蒲萄緑日暮行歌大堤曲大堤女兒花滿頭把臂踏歌歌不足宦轍東西十五年前程如此隔三千夜來夢逐南風去直到龎公舊宅前石田可耕山可屋瑶草金芝滿丹谷功成它日賦歸來我亦相從學樵牧贈醫士郜士清丹井西頭山澤癯平生愛讀軒轅書石田有芝養白鶴瑣闥無佩懸金魚前年别我朝天去藥籠參苓隨所寓歸來卜築兩山間繞屋杏花春滿樹木蘭之楫沙棠舟市上孰知韓伯休一水相望五十里峽雲江樹思悠悠題望雲圗我家望雲二千里君家只隔一江水北堂豈無萱草花生男不得長在家願兒讀書忠與孝阿母看花長夀考母昔在家時佩以宜男草母今生子後慈顔長不老樹萱北堂下葉葉書帶長兒年日以盛母壽日以康兒有昆崘桃壽母三千歲兒有紫霞觴勸母花前醉富春水有金鯉魚富春山有油壁車有車可乘魚可膾歲歲看花北堂背送禢二令秩滿之京我聞南州古南雄梅花庾嶺當春風乾坤旁薄育神秀乃有文章禢迪功三載作官東海邑頑夫能廉懦夫立胥曹束手戒貪婪醜類革心俱辟易杏花二月春雨晴東風嫋嫋吹華旌今年考績之瑶京耄倪夾道相送迎使君此行須奏最復見疲氓借河內送百戶徐叔平之甘州徐卿有子天馬駒從戎甘州十載餘白雲東望八千里夜夜夢繞鴛鴦湖鴛鴦雙飛復雙宿湖中鯉魚白如玉腰下能懸寶玦還水邊不用金錢卜左持張掖酒右進涼蒲萄上堂舞萊衣暫脫戰時袍别家復向甘州去簡書有程那久住雁落黃雲塞上蘆烏啼白月庭前樹吾聞李牧今守邊邊庭四境俱晏然椎牛饗士開屯田星河逺近同一天願卿父子長壽考壯士不須憂逺道送人歸省還京朝望南山雲夕望北山雲游子在逺道時時思見親憶昔别家時父母年未老兒著五色衣上堂顔色好東市買白苧西市買烏紗白苧製寬袍烏紗簮好花三年游太學讀易司成館春暉一何長草心一何短陽城弟子有何蕃優詔特許兒南還堂前靈鵲頻報喜飛傍宜男花樹間父母聞兒歸黃色浮雙眉大兄聞弟歸出郭身欲飛小弟見兄歸持觴細割黃金雞入門快意無不足城中少年徒碌碌大江水落秋風生兒留三月還復行九天閶闔五雲近張帆上拂牽牛星萬方冠冕朝玉京老眼復見黃河清黃河清四海一願保千金軀比之雙白璧送黃鍊師還天台吾聞天台山髙四萬八千丈中有玉平之洞天丹霞赤日照林壑此地往往多神仙神仙中人不易得黃公之孫有仙骨放浪江湖四十年春風落盡柳花碧海邊樓觀臨蓬萊何年飛舄從東來絲綸五色詔遺逸手把芙蓉朝玉臺昔我題詩過方丈令我臨風倍惆悵不見遼東一鶴歸步虛聲落青天上我有一掬淚不灑三十春但哭市井交何曽哭仙人我知仙人長不死晝夜循環亦如此送道瀾上人還天界道瀾上人好文采舌如波瀾性如海犀牛扇子破多時留得千年公案在别峰禪老日邊來金襴照日天花開皎如一片秋水鏡置在七寶青蓮臺室中弟子多聞道見性無如道瀾早結社曽邀陶令過論詩每愛支郎好飄然飛錫向何方第一禪林古道場且對黃花談般若更留數日過重陽贈觶僧㑹天目之山自西來羣龍回繞青蓮臺千年翠氣鬱不散化成樓閣重重開上人自是僧中寶黃鶴峰前坐來好天風吹動雜花林山色溪聲談未了昨者鳳凰銜紫泥潮音却渡海門西海門月照白毫相濁水倒影澄摩尼我亦前身許𤣥度半生頗有烟霞趣夜來八萬四千言笑對黃花獨無語題雙松圗贈司虞趙子瑛吾聞泰華山上有千尺之長松白雲英英出其顛天門日觀遙相通三更雞鳴海水赤羲和攬轡騎飛龍松下髙人坐盤石金芝瑶草青茸茸三年釣鼇東海上奏最去謁明光宫棟梁之材當大用大夫不讓秦時封贈君此圗千里玩長見青青齊魯東題太古子為分水縣佐蘇侯賦八風不動地軸寧六合無塵天宇清聖人在位羅羣英干櫓化為絃誦聲蘇侯紹芳德彌馨邂逅黌宫舒我情笑談霏霏甘露灑意氣落落秋風生為言佐政分水城樓船東下窺滄溟海門山水多奇異西通月窟東髙麗天雞夜半啼一聲璧采金光絢霞氣蓬萊更在天東隅欲跨飊輪遊八區麻姑别去音信斷弱流清淺今何如太阿躍出豐城獄斫斷三山巨鼇足九苞鳴鳳信有神結巢宛在珠樹林雲窗霧閣應可到海若天吳安敢嗔山可登兮水可臨嗟我白髮秋霜侵幸逢昭代寬且仁梯航重譯輸南金自從天地一開闢凡有血氣皆尊親我欲入海攀鯨鱗手探明珠弗顧身安得昌山雙玉琯吹徹太古羲皇心羲皇之心萬萬古且酌百瓮蒲萄春題貞婦胡氏貢姑妾薄命向誰道生不學空中花死甘為墻下草墻下草生不離家風中花泊天之涯爺娘早亡阿弟死膝下呱呱遺一子婦守嫠居不二天形影相依心若水送判府萬侯秩滿如京南昌萬使君乃是東漢將軍之子孫家有槐里堂世稱忠義門鋭如豐城之寶劒矯若滄海之遊鵾一旦雄才際昌運三年出佐東南郡寒谷陽春化日長玉壺夜月清氷瑩鴈背霜髙江水清雲帆曉發鳳凰城長