body:
  text: 斗南老人集别集類五明提要臣等謹案斗南老人集六卷明胡奎撰奎字虛白海寧人生元至順間嘗遊貢師泰之門明初以儒學徴官寧王府教授是集前有寧王權序稱其晚年泊舟鄱陽望湖亭見石刻東坡黑雲堆墨未遮山詩次韻和之俄見一叟來誦其詩曰子非斗南老人耶因以自號其事頗怪疑好事者附會之莫由詰其真妄也朱彛尊靜志居詩話稱吾鄉雲東逸史曽手録其稿舊藏項氏天籟閣繼歸髙氏稽古堂後為華山馬思贊所藏案今世所傳奎集皆出天籟閣抄本止有四卷前有項元汴題識而無寧王原序此本為明初寧王府文英館所刋見於寧藩書目崑山徐氏傳是樓又從原刻影抄實分六卷凡詩一千九百餘首與項氏所藏互校乃知彼多所脫佚不為足本觀寧王序中又載宗哲徐將軍居西山有道士過訪食蕨道士吟一絶句云一拳打得地皮穿握住東風不放拳只待杜鵑啼血後展開鳯尾始朝天問其所作以箸書斗南一人四字時先生未有是稱後得先生稿方知先生是也與望湖亭和詩一事文相連屬而朱彛尊靜志居詩話獨未采録知彛尊所見惟天籟閣殘本其記望湖亭事亦從都穆南濠詩話托入耳奎詩不事雕飾往往有自然之致彛尊謂其功力既深格調未免太熟誦之若古人集中所已有者其言誠不為過然舂容和雅其長處亦不可掩視後來之捃拾摹擬者固有間矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀斗南老人集序是詩者斗南虛白胡先生之詩也其序也涵虛子臞仙之所作也凡欲舉其事必先昭揭其文以發揮之務在輝煌炫赫以光厥績然有其詩而無其文如舟之無水不能以行遠今先生之詩又非艖艇之比乃萬斛之舟焉非巨浸不能以達江海莊子所謂夫水之積也不厚則負大舟也無力豫之文實不足以比巨浸之厚而先生之詩實不侔乎艖艇之小故借豫之文以假巨浸庶幾可以達於江海通於天下是有望於斯文也乃呼中書君即墨侯而告曰詩之行於世也多矣而作詩者又多矣而無一人與焉雖孩提之兒亦能言之而童顛沒齒者不能作也是知人之為詩者易而不知詩之為人者難難易之説非窮微至妙而不能以窺其徼也茍非酌天和飲玄化而得性理之端倪者曷足以觀於此哉先生浙之海寧人也生於元至順乙亥及長師事於參政貢師泰之門因客與師泰評古詩有太行積雪都消盡船到舒州水正高之句師泰曰太行在何處舒州在何處紕謬太甚時先生方十有二嵗在傍笑曰太行雪消時莫不天下雪都消盡耶師泰竒其神童曰此子日後必能作詩後歷元三朝聲譽聳於京臺詩名震於淵藪我朝國初以儒學授教授豫求為王門師居豫章七年豫憫其衰老遣使送歸海寧明年卒於家時年七十有五先生以詩鳴於世者久矣然生而穎悟天性不凡其胸次之量又是一般涵飬與人不同處多但託興於詩酒隱化淪景有出世間語非神仙中人莫能及也白玉蟾有曰收入酒生涯擁出詩世界蓋有得於此矣鴻飛冥冥弋人何慕籬下燕雀徒啾啾耳豈不然乎其高處若披太華之朝霞呌天門之閶闔泛泛者莫能及也駑􅀈之競騏驥愈望愈逺不過伏櫪俯首而已其幽深邃遠者飄然如凌霄之鶴雖鄒衍相如不足以形容其高其雄傑豪邁者凜然如嘯風之虎雖季子張儀不足以張皇其大其咀嚼道妙者雖邵子种放不足以研襲其賾其遊方之外者雖子休列生不足以摹寫其真酩酊造化盤礴宇宙鬼神為之駭矚兩稱斗南之名可謂異矣昔宗哲徐將軍居西山有道士過訪飲間童子以蕨獻於几上道士指之曰一拳打得地皮穿握住東風不放拳只待杜鵑啼血後展開鳯尾始朝天問其所作以箸書斗南一人四字於几上時先生未有是稱宗哲曰昔狄仁傑稱斗南一人莫非仁傑之詩乎道士但搖手大笑俯而不答少頃酒酣失其所在宗哲異之後得先生詩藁方知先生詩也其道士仙也先生之詩鬼神亦嘗取矣稱為斗南一人豈非神仙中人耶及先生歸海寧泊於番君之望湖亭見碑上有東坡詩曰黑雲堆墨未遮山白雨跳珠亂入船卷地風來忽吹散望湖亭下水連天先生賡其韻曰鷗外淸波鴈外山望湖亭下繫歸船夜深起坐占風信龍在珠宮月在天書于壁間久之或有老人狀貌甚竒觀其詩曰幾六百年無此詩矣爾非斗南老人耶乃為長揖舉首不知所往因是以斗南為其號時人皆稱之為詩仙信不誣矣故命壽諸梓以傳無窮焉涵虛子臞仙書
