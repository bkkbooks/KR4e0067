body:
  text: 斗南老人集卷一明胡奎撰古選敬進寧王殿下仙人好樓居三章仙人好樓居乃在靑雲中金窗洞然開咫尺與天通上有太古音被以龍門桐左招廣成子右揖浮丘公憑虛覽八極呼吸凌洪濛壽與天地並逍遙樂無窮仙人好樓居乃在蔚藍天東西九萬里日月相周旋上有飛霞佩五鳯何翩翩左招王子晉右揖洪崖仙含和鍊金魄至真洞𤣥𤣥無為以淸淨寄傲羲皇前仙人好樓居下瞰凌虛臺雞鳴海色動萬里雲霞開上有白玉虯騎之上蓬萊左招梁園客右引鄒與枚吹笙弄明月八鸞以裴回俯視一泓水終古無纎埃步虛詞五氣合大梵三花凝素雲沖妙混真朴𤣥化蕩無垠靈飇遵絳節稽首虛皇君嘯歌瓊臺上飄颻鸞鶴羣寥寥蔚藍天曜靈開龍陽黃老維我神𤣥精貫中央氤氲九天氣晃郎七星芒遊燕玉京府逍遙紫極房九氣合大梵鴻濛啓神霄上披三素雲靈宮鬱岧嶤羣真翊羽蓋絳節凌回飇粲粲霏玉葩琅琅歌洞謡凝神息萬慮遐齡比松喬稽首無為化永言贊昌朝玉虛運𤣥化曜靈升大羅三景開天根碧落浮空歌仰瞻彌羅館紫雲覆峨峨縹眇金芙蓉御以麒麟車九光分異采萬彚含沖和皈命希夷門超然凌太霞皇朝闡真教慧風覃八埏琅函啓靈篆玉文簡𤣥𤣥授以丹霞衣回翔玉淸天三精飛爽靈五色凝非烟黃老維我神專氣長綿綿逍遙無極君歸真合自然浩劫開隆運鴻靈秉化機雲章結丹篆空洞啓𤣥微九鳯翼羽蓋八龍衛金扉授以赤玉文丹霞為之衣迢迢白玉京上通蔚藍天煌煌黍米珠五色浮空懸包括無極際虛明洞𤣥𤣥可望不可即恍惚象帝先得此以為寶逍遙以長年萬化同逆旅百年等浮漚何不學神仙汗漫與天游餐以暘谷霞濯以星漢流左手招安期右手揖浮丘傲睨八紘內逍遙以忘憂東窗緑玉樹鋭葉何離離春秋八千嵗蟪蛄安得知至人有𤣥術靈泉漱華池專氣有真一超然入無為會當保貞素黃髮以為期登九天閣製步虛詞龍漢還蕩蕩瓊宮鬱峨峨九氣結靈篆千月印明河穆穆渝妙容飄飄登大羅仙人緑雲中縹眇回空歌逍遙永無極暘谷駐羲和玉虛啓真境寶閣凌丹穹曜靈洞八窗空響振回風絳節飄颻下𤣥房曲密通中有古仙人黃公與赤松飛霞為之佩下上隨雲龍九日登九天閣曜靈啓暘谷丹霞麗𤣥穹晨朝回絳節羣真集珠宮登高覽八極逸興凌空濛中有古仙人云是商山翁浩歌紫芝曲此意無終窮九日良燕會登高暢余懷憑虛發淸嘯浩蕩天風來金莖逼華蓋六符明泰階排雲呌閶闔靈扉洞然開安得金衣鵠乘之上蓬萊朝披碧瑶簪夕登紫極房綺雲紛郁郁龍漢鬱蒼蒼游神九霄外恍忽覲虛皇相從赤松子乃有韓張良安知千載後跨鶴重來翔登玉虛閣賦游仙詞五山出東海巨鼇十五頭帝遣戴山足勿使西南流至今雲霞間上有白玉樓琪樹麗陽岡瑶花被𤣥洲麻姑有書信方平或未游尋真諒不逺悵望凌高秋琳宮倚虛碧瑶海含淸輝翩翩花鳥使日暮雲中歸弱水隔𤣥圃三山橫翠微明月為我佩丹霞為我衣天顔覲咫尺晃朗朝金扉游仙詞東海有麻姑乃在三山岑去時海水淺來時海水深翩翩三靑鳥結巢琪樹林寄我錦字書泠然空外音何由啓玉齒臨風披素襟所思鬱鬱我所思所思在瀛洲黃金以為闕白玉以為樓枯桑漂白日弱水不容舟亭亭三珠樹别來已千秋仙人招我來采藥遊丹丘餉我千嵗桃贈我五雲裘長鯨鼓巨浪欲往無安流因風寄寥廓東望空悠悠鬱鬱我所思所思在泰山黃塵浩無際碧海何漫漫金鴉夜中出照耀靑雲端我欲乘飈輪因之扣雲關飛霞以為佩明月以為環側身望閶闔天語咫尺間懷哉隔遠道鐡鎖何由攀鬱鬱我所思所思在華陽上有仙人掌巉然倚穹蒼玉井湛靈液丹霞生洞房酒母呼子先騎龍入雲翔我欲往從之憑虛覽八荒黃河渺如帶一葦端可航麻姑儻相憶寄我緑雲章鬱鬱我所思所思在衡峰靑雲團紫蓋白日開芙蓉上有飛來泉倒掛千尺虹思昔玉字書允符神禹功九州既混一百谷俱朝宗仙人騎白鹿呦呦立雲中何當鍊金液日夕長相從寄王鍊師安期入東海采藥三蓬萊東窗緑玉樹嵗嵗見花開弭節崑丘圃吹笙閬風臺翺翔綵雲裏揮手招我來安期雙黃鵠相從凌九垓題雪舫餘淸回櫓泊寒渚雪月淡淸暉嶺雲低欲度沙禽靜不飛悠悠江海心爾獨此忘機題稼軒交交桑扈鳴時雨夜來至星言出東臯田舍有生計天時與農功黽勉焉敢棄春耕或少怠何以遂秋刈古人皆食力素餐良可愧伊人沮溺徒遁迹淡忘世父菑子乃播優游以卒嵗余亦林野人與爾頗同志懷哉愜素心南山有真意題廬山圖我昔夢五老翺翔緑雲中濯足銀漢水上與天門通仙人坐中峰手持玉芙蓉邀我吹鸞笙相期入空濛淸猿夜啼月夢回迥寥絶遙遙紫霞想忽若千年别昔向夢中見今從堂上看林巒如夙契煙翠生高寒天風颯然來頗覺衣裳單恍如陶𢎞景置我長松間此境何時遊我夢難再續悵望九疊屛白雲滿空谷學古軒張公志于學古貌又古心尚友古之人自言古猶今古人不復作古道良可欽齊居古以朴悠然淡沖襟手援緑綺琴中有山水音願揚太古調一洗里耳音題安分齊鵬鵾運霄漢鷦鷃棲蒿蓬小大各有適動息無不同龍興山出雲虎嘯谷生風達人悟𤣥理卜築大巖中靜閲天地心超然萬慮空齊居安所分永言玉汝躬喜友見訪快雨生夕凉逍遙倚虛閣故人適我趣觴至同一酌托兹忘年交真率以為樂何當筋力健杯酒共酬酢永言懷好音東臯有鳴鶴水亭燕集微雨散方池回飈進虛牖故人賞我趣酌此尊中酒淸談愜素心嘉會得良友日暮悵悠悠雲帆一回首五里見一堠五里見一堠十里見一亭依依道傍樹相送復相迎相迎數勸酒相送重回首富貴貧賤交孰不念親友送者日以遠迎者日以親夢中不識路何由見故人前者送卿去繫馬長安樹今日復來迎不聞歸馬聲别情何草草淚滿長安道昔如三春花今為斷根草草枯還再生花落還再榮悲哉二三子一去無音形題謙上人聽雪窩次韻幻境依空立初不在營構譬如空中花過眼安得久上人淸虛室置之無何有心超三觀妙離淨復離垢英英玉生輝况值越之晝前身乃雪峰後身應雪竇夜聞落葉聲滕六肆馳驟朔風號枯桑猛若獅子吼爐頭懶殘芋邀我速相就我本有髮僧俗緣嗟逗遛昔也求一𤣥今焉白自守寥寥入無聲寂寂破諸漏兹聆陽春曲一洗平生疚載歌白戰詩千軍當却走題觀魚圖子非池中魚安識魚心樂池魚非子心此樂竟何托乃知魚與我所樂皆自然升沉各有適動靜同一天北海埀天雲西江斗升水寧知涸轍餘中有扶搖起觀水固有術觀魚意何如我意儻相契煩君寄素書出塞出塞復入塞馬鳴何蕭蕭穹廬坐名將云是霍嫖姚氷河馳萬騎雪磧射雙鵰出北郭有懷晨出北郭門微雨散晴野花寒鶯尚遲水緑氷初解折芳思寄遠幽蘭未盈把日暮望歸鴻何由疾如馬出郭城西值初夏門巷緑隂交吳蠶始登箔越燕已營巢來往索詩句頓忘推與敲路逄林下筍明旦具行庖寄震上人踈鐘出古殿月上靑林靜鶴去海雲深龍歸泉石冷秋高萬籟寂此意竟誰領定起下巖扉裴回碧蘿影秋懷寄友人去年聞秋聲我友在天末今年秋復至兩地成契濶踈桐不知秋當窗墮斜月寄我瓊琚篇藏之字不滅不信苦相思來看鏡中雪題芭蕉雙鶴圖雨鳴蕉葉凉頗覺秋聲早階前有雙鶴迥立風塵表夢覺兩無情喧寂各有道持以寄山僧觀心一時了度函谷關車行何盤盤靑山碾為土英雄去已逺石色猶太古天低太行樹歷歷靑可數落日照平原黃沙渺煙霧雞鳴曙星沒大夢誰先悟紫氣不東來悠悠白雲度夜泊采石我思謫仙人渴飲江上水神遊八極間隨月忽飛起泠然宮錦袍濯足天河裏思悲翁客有思悲翁老大悲明月昨日顔如丹今朝鬢成雪雪色落明鏡所思胡不悲寄言東家子行樂當及時節婦吟汲井井水淸彈琴琴弦直弦直節不移水淸心共白夫死舅姑老妾身安所歸燈前形共影獨留三嵗兒願兒日長大他年應門戶莫戀蜜脾甜甘為蓼蟲苦題淵明撫松圖淵明與孔明出處各有道乃知歸來辭即是出師表盤桓撫孤松全身以為寶納雲軒為海上人作依依度簷隙冉冉通帷幔初騰洗鉢水却繞翻經案去來固無心既聚還復散龍噓石氣凉月淡蘿窗半室虛如有容超然悟禪觀送給事服滿之京剖松見貞心裂竹知直節所以君子交不學兒女别我隨賢王駕聿來古洪都給事偶相見長身美多鬚昻昂九臯鶴淸聲振寥廓三載讀檀弓一朝登鳳閣南浦水如天開帆月正弦風恬鯨浪穩人識孝廉船子乘駟馬車蹴踏長安道傾蓋各有時何須論遲早笑呼麻姑酒送别豫章城願言崇令德忠孝在兹行送王山人之金華昔有牧羊子云是黃初平寄迹金華洞棲真入杳冥山中多白石叱作羣羊行穿雲尋紫术躡雪采黃精子去追仙隱逍遙塵外情登臨愜幽賞吟嘯有餘淸欲往違夙願相思蘿月明送人之京我本林下人偶與故人别今旦出門去山明鳥聲悅江花已變春野樹猶含雪佇立送飛鴻依依望丹闕黃鵠行東海有黃鵠羽翼何翩翩十里復五里裴回上靑天靑天高無極下視周八埏朝依𤣥圃樹夕飲瑶池泉鳯凰以為匹啄食保長年贈張鍊師東海有仙人云是谷神子飢餐暘谷日渴飲玉池水太虛廓無際洞然啓𤣥門陶鎔日月髓灌溉𤣥牝根從事夏黃公逍遙橘中隱三花如可攀共上崑崙頂舟過廬山靑山在船頭正對香爐面如何五老人一老不可見臨流問四老相遇何不早一老對我心萬古靑不了我昔過匡廬白雲在其下盤盤封谷口如虎復如馬望之安可招攬之不盈把何人結茅屋此意更瀟灑老至今晨對明鏡始知吾老矣五年寓洪都思家二千里江流直如弦風帆疾如矢西山有白石可以礪吾齒題山居畫在山不識山出山山在眼移之圖畫間此意更蕭散依依倦鳥還悠悠白雲晚一笑淡忘言逍遙思無限題寓菴寓形大化內道寓太極先厚者寓乎地高者寓乎天晦明寓日月流峙寓山川榮悴寓草木飛躍寓魚鳶吾身寓萬事理寓方寸田問子何所寓寓以八九椽大雅寓古意微言寓陳編至味寓𤣥酒希聲寓素弦行寓南山下坐寓白雲邊息寓芳柳隂飲寓佳菊前嗟余隨所寓寓洪今五年賦雪寓梁園烏紗寓白顛歷觀寓世者寓言無不然伊呂寓莘渭巢由寓林泉靜寓惟獨善動寓隘八埏吾亦聊寓耳試歌寓菴篇吳江月下泛舟餘霞斂遙岑微靄生近浦江行得凉夜月出鳴柔櫓茫茫天欲浮歷歷星可數水螢乍明滅沙禽或翔舞此意與誰同三高渺千古春夜懷友恬淡何所營稍欣人事簡霏微禪榻雨杳靄鐘聲晚獨念華山人聆君廣陵散分緑軒涼翠入虛幌紛披散回飇非煙還翳翳不雨亦瀟瀟朝光凝竹簡晚色借山瓢試從明處見復訝暗中消尚擬題名姓因詩寄廓寥送人還碧蓮峰聽琴詩卷東海有别鶴孤飛白雲端五里一返顧十里一盤桓盤桓向何所乃在碧蓮山上有千嵗松下有幽澗泉靈飇振逸響宮商自相宣眷此冥棲士抱琴松下彈一彈白雪操再彈猗蘭篇泠然太古調不在指與弦别鶴眇千載此意無人傳安得跨黃鵠相從凌紫烟東園漫興池荷生夕凉快雨飄然至窗虛延竹色林暝散花氣地偏人事簡遂我幽棲志緬懷心所親佇立凝遠思林扉朝雨歇旭日朗以淸花上野禽語竹間萱草生呼兒晚移席觴至時一傾故人偶相慰適此閒居情明月入東園柳影在庭下炯然如水蘋可玩不可把褰裳舞婆娑誰識獨樂者須臾淸籟發恍惚洞庭野軒皇奏鈞天此曲知者寡何當乘飈輪大笑呼白也鑿池以為海疊石以為島游魚行其中倐若萬里道千里復萬里乃在咫尺間不有埀雲翼安知天地寬微風散晨雨落花滿前除振衣延旦氣讀我齊中書沈潛周孔思究竟羲皇初無言永終日逍遙以自娛雨歇林氣淸鳴蜩集高柳癡兒戲我側進此尊中酒御史不在前執法不在後陶然玉山頺竟入無何有塵不可以鏤影不可以吹至道與𤣥合無言亦無思大鈞播萬物總總復蚩蚩天命各有得人事故不齊何當混真朴彈指悟希微炙背坐東軒思欲獻天子由來山野人所寓敬而已安知九重天陽春被遐邇願頌康衢謡相從葛天氏幽蘭生石上楚楚含朝暉微飇度前楹淸芬襲我衣承彼雨露恩采之當及時持以遺君子勿隨秋草萎東園有佳竹云是靑珊瑚當窗互賔主相看以自娛如金復如玉靈籟奏笙竽題詩留醉墨不待倒薤書避喧息萬慮習靜喧乃忘賔退掩關卧兀然就空牀鳴禽欲變夏風葉生夕涼俯仰超宇外悠悠傲羲皇洗硯臨淸池愛此鴝眼明今晨無俗事試墨寫黃庭掃地樹隂午超然有餘淸因之悟𤣥牝可以保長生東園漫興寄友齊居晨雨歇褰裳涉東園薔薇欲變夏芍藥尚餘寒好風從東來靈鵲一何喧故人枉瓊藻海蛤侑山尊醲鮮適野性頗覺古意存感激謝知己何由同笑言東園即事積雪擁柴門不知春社過蕭條花事晚誰共看花坐既醉還復醒頺然掩關卧漫興皎皎天上月回光照羅幃盈盈窗間女手弄天孫機上有雙鳳皇翺翔綵雲飛願秉古刀尺裁為君子衣君子在遠道無由接容輝裴回不能寐矯首望金扉流雲夜無聲月直南斗間明星爛華采歷歷當高天側身望八極長夜何漫漫鶴鳴知露下蛩響識天寒思欲凌霄漢上接雙飛翰黃鵠絶四海一去何由攀中情不可寫掩抑坐長歎皎皎天上月照我白玉樓列星埀光采河漢西南流不知誰氏女哀歌樓上頭歌聲入雲響思挾鳯凰遊鳯兮翔千仞宛在昆崘丘豈無雲間鳥念之非我儔含情掩羅袂惻愴令心憂采采芙蓉花涓涓弄秋水停君木蘭棹聆我歌聲起采花欲寄逺思君隔千里紅顔能幾何悲哉遠游子池中有天荷亭亭照秋緑薄言折其莖絲斷不可續欲知别情苦甚於蓮子心棄置勿復念裴回以沈吟孟冬寒欲至珠箔沾微霜冀馬向北鳴燕鴻亦南翔朗月懸中天驚飇吹洞房客從南海來遺我雙明璫何以報區區繫在紅羅裳珍藏篋笥中三載生輝光努力保明哲願言勿相忘黃鵠東南飛乃在霄漢間五里一返顧十里一回旋人生念儔侶况乃隔河關我有緑綺琴為君鼓猗蘭商飈激流響中曲何由宣合并固有時躊躇不能言晝卧北窗下雙蝶何蘧蘧悠然尋夢去變化在須臾蓬萊易淸淺日月無根株魯連東蹈海李斯西上書人生各有適萬事徒區區上塜冷食江南節田家改火時桑間鳴戴勝塜上見棠梨冥冥昊天德渺渺白雲思持觴數行淚重擬挽歌辭黃鶴樓湛湛江上水不洗人間愁悠悠江上山無心自浮浮一掬别時淚不隨水東流側身望黃鶴寂寞三千秋凡骨不可蛻大丹還能求願令遠游人慎勿生白頭登五嶽樓五嶽萃靈氣巋然見高標上凌三素雲仰見九層霄玉女啓天關參差紫宸朝羣龍翊殿陛雙鸞夾笙簫倚闌待明月淸露下泬寥游神八表外羽佩何飄飄靈飈吹海雨洗出江南山丹梯倚層漢玉女啓天關秋聲撼雙檜白日波濤還龍駕倐來游空中鳴佩環朝發榑桑涘夕棲若木灣會當凌八表晞髮太霞間寓言客從海上來探彼明月珠下沈無底谷不惜千金軀得之驪龍頷行險何其愚君子保明哲榮名安可趨求魚不投餌待當守株迢迢漢川上有女麗且閒佩以雙明珠遊戲淸波間翩然若飛鴻可望不可攀贈我以翠羽報之以秋蘭裴回碧雲暮引領空長歎仙人渡弱水云是王方平海上見麻姑為言三淺淸天風吹榑桑魚龍不得寧海水相蕩潏五鼇欲頽傾世傳如瓜棗服之可長生安得謝人世飄飄凌太淸灼灼苑中桃托根瑶池傍丹葩含淑氣豔彩炫青陽常恐玉階樹秋風委朝霜弱水不可渡蓬萊竟茫茫安得跨黃鵠凌風以翺翔夢乘白玉麟遨遊洞庭野明月流高天白雲生其下軒皇張廣樂云是太古者靈妃鼓瑶瑟𤣥音淡而雅此曲遺人間但恐知音寡茍非遇伶倫黃鐘不如瓦世無鍾子期孰知悲與喜聞昔有韓娥歌聲繞梁起一歌令人悲再歌令人喜同為齊中音憂樂如轉指我有太古弦泠泠㵼秋水所願感人心不願感人耳羲和無停車萬物豈長久顔回一何天盜跖一何壽明鏡䝉埃塵安能别妍醜松柏遭翦伐不如蒲與柳所以劉阮徒沈酣托杯酒女媧鍊白石上補靑天靑搏沙散人世六合何冥冥二氣更變化三才立儀刑篤生聖與賢出言為大經至道不可泯炳然如日星嘆息千載下持蠡測滄溟靑靑百尺桐乃在南山岑朝陽生其顚上有五色禽昔聞有虞氏斫為太古琴一彈南風操可以滌煩襟如何千載下筝笛貴哇淫引領望蒼梧悠悠白雲深神龍啓河圖淸濁自兹判三才由中立萬化歸一貫粵從形氣生遂有人文煥載誦康衢謡令人發深歎秋夜東園秋氣淸露坐當夜半月高棲鳥寂雨止流螢亂淸影轉疏桐微凉入虛幔開戶望明星離離度河漢重城罷鳴柝朗月出東山河漢從西流滉漾箕尾間高樹息棲鳥微露浥芳蘭故人期不至良夜何漫漫揮絃發淸唱同心誰與言初秋東園夜坐有懷秫莊淸友秋至倐五日微涼入東園河漢西南流月直箕尾間鮮飇啓夕秀露彩泛崇蘭神閒意自愜思其故人言故人期不至中情何由宣秋夜懷友沈沈秋夜靜蟋蟀鳴中堂出戶望河漢星辰低復昂念我平生友遠在天一方安能學明月萬里延輝光輝光有時闕此情不可滅願為雙黃鵠翺翔恣超越秋夕月出萬井秋商聲在高樹風條絡緯鳴露葉流螢度天河一杯水流向西南去坐念素心人佳期渺何處寄趙子竒金氣稍侵閣裴回月東上思君得良夜何由遂真賞螢依露草深蟬曳風條響西池煩暑退神情亦超朗既消文園渴奚戀銅仙掌上方鐘磬餘令人發遐想紫薇花下看月寄友娟娟海東月照我紫薇花花月相裴回玉露浮淸華美人如明珠流輝隔綵霞可望不可即玩之令人嗟安得騎黃鵠同游太淸家醉後薔薇花下待月有懷林扉待月出醉影忽在地褰衣就花前弄影學兒戲微颸吹我衣淸露散花氣隔水報鐘來故人期不至月下懷友西亭文墨暇方塘含夕淸流螢竹間度棲禽沙際鳴脉脉動遙思念之感中情欲鼓猗蘭操流飇激商聲雨後待月有懷雨過生夕涼流螢度疏竹褰衣步明月淸露灑庭緑仰瞻天宇高明漢手可掬城南有故人丰姿美如玉跫然懷足音何由慰空谷題鞋山朝行女兒港夕步小姑山羅襪凌波面金蓮出地間惟應渡銀漢蹴踏竟忘還雜興春風爾何來吹我門前柳呼兒唱吳歌欵乃齊拍手御史不在前執法不在後倒著烏紗巾兀兀但飲酒題燕集詩卷城南夏五月碧樹始鳴蜩維時集羣彥觴詠共逍遙憑高望大海俯見萬里潮藻翰發竒思華筵激流飇獻酬各有禮既醉復長謡嵗月忽已邁聚散若雲飄佳期阻良覿關河悵迢迢白鷗戀近渚黃鵠慕層霄寄迹凌浩蕩游神思廓寥習池應不遠折簡會相招城南燕集次韻我本丘壑人幸陪金閨彥煌煌處士星分輝照南甸駕言出城東弭節蓬萊殿高雲澄宇宙江氣白如練維時迫重九楚楚集清燕羅袂微風散文采明霞絢繫馬高陽池華觴列豐膳誰為蛻骨仙大藥成九鍊手把黃金花安得長會面滄波浩茫茫坐見桑田變志士多苦心甘許鐡為硯張公人中英倜儻吾所羡海內閲神交目若巖下電良晤欣在兹既醉復留戀偶憑靑鳥使書來疾如箭願言附冥鴻修翼排雲健顧况讀書臺朝登紫微寺日出林扉開尋僧訪古迹始見讀書臺嵗月不復考古人安在哉空餘丹井石寂寞生蒼苔東海有蟠桃托根在蓬萊結實三千嵗誰能見花開此樹夀命長世傳王母栽思昔通天觀靈馭排雲來漢苑不可種茂陵非仙才回視三山下淸淺飛黃埃寄友人效韋體圓穹倚高蓋厚地浮虛舟日月相循環萬古無時休人生大化中何異海一漚嗟彼桃李花豈識芙蓉秋願言杯中物化作長江流普令四海人一洗胸中愁送雲季昭西池生夕涼虛閣流螢度援琴發清商離情慘中素夫君瑚璉器相見一何暮鳯鳥及時鳴還依上林樹寄何尹翠羽生南海結巢在三山靑鸞與之匹翺翔琪樹間虞羅不相及裴回竟忘還比翼從北飛言度鴈門關霜高百草短長途淒以寒願言同飲啄慎彼五色翰陪林叟池上晚酌晚憩池上閣涼飇散沖襟丹丘廣文老卧病力不任論文意自適下榻情逾深諸孫列左右觴至時一斟既醉月在道出戶天沈沈枯桐委㸑下感激謝知音西池晚酌方池散文漪微颸坐來爽歸禽各已息華月從東上故人適我趣攜尊共延賞隔水聞踈鐘令人起遐想月上朗月上東園照見梨花白裴回東闌下花月同一色飄飄素霓裳可望不可即思欲折瓊芳佳期綵雲隔春思白日麗璇霄下照六合間茫茫名利途積塵如丘山朝輪登太行夕轍度秦關大道平若砥誰云有波瀾安得挾飛仙吹笙緱北山飄颻跨黃鶴永接松喬班古意煌煌明月珠乃在碧海南下沈無底谷百仞誰能探昔在軒轅世象罔索龍潭少昊徵鳳瑞隋侯感蛇銜安知至珍物翻為薏苡讒蛟人賣綃去勿用淚潸潸靑靑巖畔柏冉冉淇上竹娟娟閨中女粲粲麗春服翩翩若驚鴻盈盈洛川曲昔如出壑氷今如在山玉蹇修期不來空幃成獨宿積雪生暮寒幽禽在空谷夜來忽驚飛翩翩度踈竹擁衣坐方牀呼兒秉明燭念彼遠遊人何由慰衷曲明月流中天列宿相低昂盈盈河東女寒機織流黃靈鵲期不來欲度愁無梁睆彼牽牛星東西兩相望陌頭桑葉稀桑間戴勝飛盈盈東家女染絲上春機手把黃金剪裁為逰子衣可憐天上月中夜照羅幃幽蘭在空谷無人知其芳好風時過之淸芬襲我裳薄言掇其英置之君子堂君子好修潔佩之比珩璜葹薋妒其美寂寞委秋霜托根茍得所棄置庸何傷客從南海來遺我徑寸珠夜光奪明月明月恐不如珍藏三十載思照魏王車王車不待照魚目空相笑持以照人心千秋保貞曜我有龍門桐斫為緑綺琴一彈别鶴操再理孤鸞音中含太古意調高思彌深此曲知者寡山空月沈沈題巢雲在山巢白雲出山雲在眼天地同一巢舒卷任蕭散依依雙闕曙渺渺太行晚何當呼謫仙秀色同一覽題梅月圖娟娟古時月粲粲江南春美人不可見夢墮梨花雲玉質恆自愛素衣安可塵裴回嵗云暮索笑情相親禱雨有感至真運𤣥牝飛神遊大羅雲霞結丹篆紫宮鬱嵯峨靈符檄龍穴甘雨隨滂沱八表滌炎氣四郊蘇槁禾涼飈起寥廓為爾奏空歌送友人之京一雨午齊靜淡然忘世情故人别我去迢迢之玉京玉京九天上閶闔春雲生麴黃變江柳關關啼鳥鶯愁懷鬱離思暮角起重城挽知事陳仲信妻李氏燕山有雙鳯結巢在濠梁飢食玉山禾渴飲瑶池漿一朝挾其雄羽翼凌風翔㷀㷀遺衆雛遨遊白雲鄉回首謝孤鳯願言應時昌送知縣陳仲信之建昌一日白一髮三年白幾何自子業成均我髮白已多子今窣百里武城試弦歌相見即言别張帆泝江波西望香爐峰秋雲鬱嵯峨豐城有雙劍龍泉與太阿會合各有時精采長不䃺我無晨風翼送子涉關河南雲有來鴈裁書寄煙蘿患眼偶述卧病北窗夕淡然忘世情微雨竹間度蕭蕭風葉鳴隱几不知夜燈暈若流星兀坐學枯禪習靜心自淸因之悟𤣥闕感興荆山生巨璞安知中有玉卞和持獻之王乃刖其足天不生卞和此玉無人知天不生此玉和足寧刖之但求識者獻刖足復何悲送奎上人靑雲覆層巘一徑入幽林山中夜來雨不知雙澗深上人春講罷躡履縱幽尋寄謝巖頭月還同永夜吟擬古客從南海來遺我明月珠感君綢繆意繫在紅羅襦羅襦不可解中情不可改月以明妾心珠以結君愛誰言道路長咫尺隔光采幽蘭生江臯鋭葉一何好臨流掇其英持以寄遠道紉為君子佩玩之慰中抱毋令比蕭艾寂寞委秋草晨出北郭門遙見一抔土借問誰家田云是前人墓靑松夾道生薤葉披朝露寂寂蒿萊下但見狐與隂陽無停機誰能識其故南山靑桂枝奄忽易生螙榮悴更相共去來同旦暮秦皇與漢武千載終不悟為樂當及時棄置貧與富雨後杏花發對酒有懷故人雨後杏花發斗酒思所親愛兹花上月共賞今夕春如何同心者總是他鄉人春夜與友飲别高堂秉華燭四座慘無輝鵾弦奏急響商飇吹我衣闕今夕歡明旦與子違何異林棲鳥凌晨各分飛悠悠空中雲聚散無定期雲出尚有歸此别將何依且盡尊中酒永言長相思仙人金鼇十五頭盤盤戴山起仙人居其巔俯視東海水吹笙弄明月翺翔麟鳯洲風車儻可馭飛步綵雲秋房中思紅燭照啼痕當窗伴孤影莎雞語庭樹長夜心耿耿夢尋關山去不識關山路長亭楓葉秋憶君相别處征婦詞商聲振庭樹匹馬鳴蕭蕭念汝出門去關山悵迢遙牀頭無百金焉能買寶刀阿母淚雙下燈前裁戰袍稚女才倚牀少婦針指勞半年一得書使我心忉忉北上行食蜜不知苦衣葛不知寒今晨出門去始知行路難驚飈吹斷蓬沙磧何漫漫羸馬縮如蝟霜花大於錢夜涉黃河凍舟行不得前君腸轆轤轉我腸車輪盤王事有嚴程去去勿憚煩彎弧落旄頭飛箭定天山會賦饒歌曲論功萬里還送人之京大江春水滿芳洲蒲葉短黃帽唱吳歌東風吹不斷江君英少年貢入司成館袖有五色毫文藻光纂纂人生意氣合何論相見晚君如千里駒跌蕩走長坂我如九臯鶴長鳴任蕭散去去毋少留嚴程不容緩欲持一杯酒迢迢碧雲遠明年杏花開待我上林苑題槐隂親舍慈烏夜夜啼宛在慈溪西大槐高過屋慈烏來上棲烏雛思返哺啞啞愁日暮白雲飛度江恨不隨雲去雛有青霄翮翺翔霜柏枝慈溪東入海雛心無已時送貢士之京一水通震澤張帆挂秋風靄靄天際雲迢迢江上峰朝飲楓橋酒夕聞寒山鐘三年讀禮餘挾䇿還辟雍願言枉尺素時寄南飛鴻送人秩滿之京烏啼海門樹旭日生蒼凉秋風櫂歌發起拂帆上霜劉侯忠孝裔三載佐黃堂兹焉報佳政冠佩生輝光祖餞長亭下共酌青霞漿側身睇鴻鵠萬里高翺翔鳳皇出丹穴文采何翩翩朝棲峴山樹夕飲漢江泉一朝銜瑞圖飛鳴凌紫煙雙闕九天上冠蓋如星聫朝回有餘暇早寄瓊琚篇題硤川佳勝圖昔有紫薇郎登眺東西山持節去不返名留天地間我嘗覽陳迹行尋顧况宅峨峨讀書臺蒼煙鎖荆棘仙翁葛稚川丹井尚依然井畔長松樹不聞啼杜鵑雞鳴海波赤東望榑桑日六寺發鯨音長林起蕭瑟俱胝天竺來一喝洞門開鑿崖閟靈迹老石封莓苔回看山下路超然起黃霧憧憧往來人日中自旁午關西供奉孫兩峰青到門微風生綺席明月落淸尊乘閒來訪我中流浮一舸手持三尺圖恍如山中坐秀州夜泊回艫泊晚渚暫息嘉樹隂淸飈散狂瀾纎月生遠岑悠悠歸岫雲交交度水禽同舟遂幽賞𤣥談愜素心况兹水凉夕觴至時一斟道合理無忤怡然淡沖襟百年寓華屋仙人好樓居乃在南城隅大江從天來白虹繞其廬朝旭麗丹桷凉飈生綺疏清談落珠唾列坐蹌瓊琚秉心介于石富貴浮雲如寓形百年內逍遙以自娛千載居山丘四序更代謝羲和無停輈達人觀大化委順復何憂瞻彼池塘山鬱鬱松與楸棲鳥自回翔歸雲亦悠悠嗟哉泉下人永為長夜遊流澤衍餘慶千載賁兹丘送瀾典藏還天界寺大海流不息浮雲無定蹤人生有聚散幻相本來空上人得真傳何别復何同飛錫滄洲上言登第一峰得玉勿抵鵲探珠必求龍定起有餘暇題詩寄南鴻題望雲圖何山無白雲游子心獨苦千里萬里間見雲思見母白雲有聚散兒心無已時北風何栗烈吹裂身上衣母居澤山陽倚門懷遠道何以報區區春暉寸心草病中謝友見訪春隂散微雨小閣倦登臨萬子偶相過泠然披素襟裴回日將暮負疴力不任王喬有隻履持以謝知音雪中懷皓上人高閣暮寒甚不知春雪來急霰鳴竹間頃刻覆靑苔數日寡輪鞅林扉誰與開故人寄禪居雅趣亦悠哉熏爐與茶鼎真足外形骸坐久夜鐘過起思重裴回清樂軒乾坤有清氣付與賢者樂賢者樂其清所樂應不濁鳴蟬樂飲露聚蟻樂慕羶豈不同其樂斯樂有間焉鳶飛樂乎天魚躍樂乎水察彼俯仰間誰能知樂此彼樂或在外此樂乃在中外樂易消歇內樂無終窮蒙也樂濠梁尹也樂莘野欲知聖賢樂孔顔真樂者鄭公樂其天樂清以名軒清與樂俱有動靜無不然山以樂吾仁水以樂吾智居樂適其安行樂隨所寄人知使君樂不知使君心安得穆清風樂哉以長吟送人秩滿之京嚴城鐘鼓動曙色明榑桑車騎何駢闐祖帳生輝光荆君英傑士入幕贊黃堂三年主畫諾一日登朝行卿雲麗閶闔玉琯回初陽行當祝萬夀逍遙紫霞觴送嵗貢生之京俞生英妙年讀書南城下暇日從兒嬉騎竹當驄馬弱冠入虞庠良金貴陶冶聱牙稽訓誥葩正習風雅譬彼珊瑚器宗廟安可舍今春貢京師如生才亦寡雍雍成均地濟濟文學者縱橫三千字寸晷擅揮灑龍門錦先奪鴈塔名須寫有使即寄書停雲念鄉社摛辭繼班馬射䇿希董賈覺非詩晨興正冠裳端居儼若思先哲有遺訓兢兢常在兹賢哉蘧伯玉五十始知非是非日相仍何以决羣疑四勿我裘領三省我蓍龜衡以較重輕鑑以别妍媸直者不可枉白者不可緇願言保終始中心毋自欺送黃鍊師還天台沖漠混元化形神合自然至人保遐夀虛靈洞𤣥𤣥金鼇戴宮闕此地多神仙絳節凌回飈霞裾飄紫煙安期啖玉棗一笑三千年火烏出東方𤣥沒西海萬古復千年出沒互相待蓬萊鶴上仙何曾一人在寄萬百戶客從海上來惠我錦字書開緘挹光采字字明月珠藏之懷袖間魚目安能如相見一何晚相望一何逺迢迢河漢流雙星隔清淺送人之京李侯西江彥矯矯麒麟駒讀書司成館佐政東海隅會當馳廣陌安可困鹽車兹焉沐清化去謁承明廬霜風淒以寒飄然曳長裾青雲近在望壯志毋踟躇題澄心堂人心本清淨湛然井中水井水常自澄波瀾不曾起張子雅好道堂以澄心名賣藥城市間隱居如宋清我昨過其家燕坐接談笑何以效區區操存一言要送馬文學之惠安教諭英英馬文學年方三十餘秩然瑚璉器文采玉不如昔也未加冠今焉頗有鬚獻藝上春官司教閩粵墟翺翔南溟下播弄明月珠鴻濤際大海渺在天一隅文光射南斗樂育君子儒願憑青鳥使寄我空中書題春暉堂青天何高高中有三春暉母年日已邁兒心嘗依依此心向誰道一寸階前草宦轍東西馳千里萬里道兒騎青驄馬身著繡羅裳何異五色衣笑舞春暉堂春暉無時已照見東流水水中雙鯉魚朝盤奉甘㫖庭前有高樹慈烏日夕來烏雛思返哺飛繞黃金臺題綵煙山人瑞槐堂青青堂下槐乃在綵煙山一本如合璧兩枝若聫環堂中有賢母日行槐樹間槐根兩兄弟綵服何斑斑母今髮已皓人與槐俱好但見槐樹長不知母身老上有返哺烏下有忘憂草返哺識劬勞忘憂思襁褓槐今高過屋屈指三十年東西或拱揖左右相回旋不有兩兒孝安知慈母賢草木亦微物永錫信蒼天兒今何所願願槐長在目槐花年年開槐葉朝朝緑豈無螻蟻夢紛紛鬭蠻觸一笑天地寬白雲滿空谷送人還貴州别情何草草傾蓋苦不早暌違三十年隔越萬里道憶在東岡日彬彬麗文藻子少我當壯子壯我復老人生百年內安得長美好故交曙星稀先哲流電掃豈無杯中物與子一傾倒昨游𤣥都觀共覔安期棗挂弓榑桑枝洗劍滄海島酒䦨别我去何以慰幽抱楚山鬱叢叢巴水深浩浩願言崇令德黃髮永相保送人考滿之京伊昔太昊氏教民以佃漁神禹平水土羣生奠厥居伯益掌山澤立官自唐虞澤梁古無禁庶鮮給朝餔後世務財用輸納窮錙銖吾皇一四海恩波被八區南檣與北柂晏然如坦途英英南昌彥聿來東海隅釣鼇龍伯國簸弄明月珠清於出壑氷置之白玉壺賦稅日以羡聲譽日以敷我家臨江濱里社同枌榆謬登銓曹選獲與吾子俱得錢即相覔有酒即相呼朂哉金石交愧彼勢利途三年當考最駕言之京都京都九天上冠蓋如雲趨蜚英大鴻臚攬轡青雲衢豈無伯樂氏顧此千里駒大江秋水落旭日照檣烏柳條不堪折擊缶歌嗚嗚方當維新日羣才應時需子行勿踟躇善保千金軀友人邀飲豫病不赴作詩答之積雨散煩燠虛閣延清風故人賞我趣觴酒坐從容此意豈不佳老病苦相攻長途足無力憂來鬱忡忡知音有顔李迹異心自同題詩謝不敏恢量還當容早朝象魏臨丹闕鉤陳直紫微蜿蜒扶日上夭矯挾雲飛望拜千官集柔懷萬國歸春班隨仗入午漏隔花稀晃朗金銀氣昭回黼黻衣次周紀善韻大鵬摶九霄不如海鷗逸白首歸故里心神猶恍忽我足不良行我言竟誰述多君富文藻詞源倒溟渤安流既崩奔坦途亦﨑崛升沉任雲止禍福由中出緬思七閩地云是錦繡窟寄言塞上翁善保千金骨次曇師見寄韻高吟寄天末寒繭曳孤篁炯若雙明珠九淵安可藏出戶見明月流光入中堂載彈緑綺琴匡坐白雲牀寥寥太古調誰論虞與唐知音諒非逺我心自憂惶挑燈耿無寐清淚灑淋浪賴有一瓢酒慰兹離别腸孫武吾聞孫武子教戰闔廬城美人出後宮百花媚春晴三令復五申約束何分明一鼓玉顔笑再鼓蛾眉傾雷霆肅將令頗覺君命輕西來破楚疆北滅齊晉兵英姿渺千古颯爽悲風生孫臏孫臏古名將龎涓俱學兵刖足見齊使始識田將軍指麾輜車中號令若風霆引兵走大梁遂解邯鄲城救韓示怯戰減竈功乃成馬陵書大木弩發如流星跛鱉信千里刑餘安可輕吳起吳起好用兵嘗學曾子法東出衛郭門齧臂與母訣魯君不見用殺妻與齊絶將軍自吮疽士卒甘喋血擊秦拔五城魏侯尚功烈在德不在險舟中盡吳越孰云猜忌人千載名不滅李牧李牧守邊日屯兵鴈門關槌牛饗士卒十年戎馬間黃雲覆沙漠白雪漫天山狼烽日以遠騂弓不敢彎後來防秋戍思之應靦顔亷頗相如拜上卿豈畏廉將軍兩虎若共鬭其勢不俱生秦兵不加趙功歸吾二人忠臣當殉國志士當殉名不有負荆謝安知刎頸親田單田單破燕壁神人為我師鑿城出火牛被以獸文衣壯士五千人銜枚突其圍斬將敗騎劫迎王入臨淄齊城七十餘一旦俱復之雄風千載下英名良不隳張良良貌若美婦本圖報韓仇擊秦博浪沙隱迹下邳遊既進黃石履復運沛公籌關中興漢業天授非人謀謝事從赤松功成願封留一掉三寸舌名高萬户侯懷李白日落江水黃雲開楚山碧南風吹大帆倐爾臨采石緬懷謫仙人醉魂招不得俯仰天地寬誰云錦袍窄題三桂堂生兒貴生男男可應門戶種樹當種桂桂能耐寒暑君家有三兒一一青瓊枝時來三樹下騎竹相娛嬉大兒眉宇好小兒竒絶倒中兒更可人比兄讀書早願兒讀書早長大俱成名年年桂花發來聽讀書聲九日望海觴詠放曠麋鹿性消搖林野娛良時遂傾蓋真賞偶聫裾高雲澄泰宇旭日朗以舒亭亭逺峰出靡靡幽花敷憑高倚飛闕遐想入方壺幸陪金閨彥獲與靜者俱何當凌八表飛舄躡雙鳬傷思次韻江上雙鴛鴦雙飛復雙起如何南來鴈隻影沈湘水蘆花似朝霜漫漫逐風起欲寄故鄉書悲哉逺游子次友人韻青鳥海上來五采何翩翩口銜三素雲滿几生晴煙墨池夜來雨空碧涵漪漣安得王內史一掃九萬箋因風托青鳥寄謝瀛洲仙題牧童騎牛圖牛背穩於馬騎過南山下竹鞭三尺長不用紫游韁四郊干戈罷歸放桃林野一曲太平歌爾童奈樂何古意皎皎連城璧乃在巨璞中無人辨其真甘與燕石同所以卞和氏抱泣秋山空水中蒲青青江上蒲宛宛水中魚楚楚東家女盈盈樓上居泠泠撫瑶瑟粲粲被羅襦昔如崑山玉今如濁水珠美玉尚待價明珠終不汙擬今日良宴會今日慘不樂憂來鬱無端華堂秉明燭思奉君子歡南窗撫瑶瑟含情不能彈君情與妾意憂樂轉指間人生非金石流景若飛丸何不返初服英英谷中蘭無言混蕭艾委質霜露間得雨夜聞蕉葉聲秋至得涼雨推窗雲氣暝枕簟淨無暑竹間螢火度草際莎雞語焦原當復榮慰我三農苦送嵗貢生之京開嵗倐五日青陽動熹微回塘夜來雨碧水生漣漪明發戒舟航翩翩上京師官曹送子行酌以黃金巵師友送子行載歌鹿鳴詩鄉老送子行夾道迎春旗父母送子行密縫身上衣子今朝天去翺翔鳳凰池願言登太學肅肅愼其儀尚友古之人明哲以為期送張將軍之京曜靈啓暘谷春雲曳華旌將軍奉明詔攬轡出嚴城風吹杏雨白火改榆煙青儀鳯五色羽神駒千里程論功錫重爵遠邇振英聲題金蘭圖英英風露姿託根在空谷何人擷其芳置之黃金屋彼美同心者可以慰幽獨寄宋紀善東海有黃鵠託巢琪樹間朝浴咸池水夕息三神山翩然上霄漢翺翔白玉關我欲往從之短翮無由攀雄飛諒有道雌伏何足歎幽蘭在空谷無人知其芳天風一披拂置之君子堂擢頴蕭艾間鋭葉何輝光盈盈漢臯女拾翠江之傍所思隔逺道欲寄雙明璫明璫不可寄展轉鬱中腸青鳥天上來寄我雲錦書開緘挹華采字字明月珠佳期渺天末悵望心縈紆我無青瓊琚何以報區區願言敦夙好善保千金軀佳人折花聯句婉婉水邊來盈盈花畔立霞侵玉指暖露沁羅裳濕刺密尚遲攀條長詎能及持歸玉臺前自掩紅顔泣題琴軒南州有高士手抱龍門桐披襟坐磐石泠泠和松風上弦奏鳴鳯下弦鼓飛鴻寄情山水間所樂無終窮效陶晨䇿何所之言往南山陽白雲生其顛歸鳥共回翔采采籬下菊賔至同一觴醉卧北窗下悠然傲羲皇效韋我本麋鹿性愛兹林壑幽夕泉分澗落晴嵐出樹浮披襟挹高爽䇿杖散煩憂歸鳥引餘興裴回去復留題敬義齊南州有一士卜隱大江濵端居坐終日尚友古之人古人不可作聖遠復言湮出門岐路多何由問通津有客過其家誨語何諄諄集義以飬氣主敬以修身請子事斯語永言書諸紳送姪從戎雲南兼柬居掾史我祖自南渡世為鹽官人家傳安定譜子孫多搢紳嗟汝英妙年從戎萬里道斷蓬離本根骨肉豈相保憶汝别家曰婦病在膏肓小妹應門户兩女才倚牀一年一得書見書如見汝蹉跎十五年閲盡寒與暑昨者奉軍帖倉卒暫還家兩女上堂拜不識去時爺朝紡木棉花夜織機中布裁為身上衣夢繞天南路天南有名將云是漢嫖姚威聲振夷夏勳業著皇朝汝今向前去勿戀故鄉住生入玉門關會當有竒遇烏啼海東樹落月在城頭送汝北郭門霜花滿征裘千金買寶刀豈若聊城箭魯連倜儻生何曾嘆貧賤洞庭秋水落三峽夜猿哀船過瞿唐口還經灔澦堆嚴程不可緩别去關山遠縮地恨無方我腸轆轤轉轅門有知已遠惠白象梳瓊瑶無以報為我謝區區送東既白上人之京旭日東方來起送東既白山笠野雲深田衣江水碧去登千里道歸化三生石鶴羽振高飈迢迢望飛錫送浙江僉憲金臺王公考滿之京王公希代寶本自金臺人素抱匡濟略華年登要津布衣謁萬乘意氣干青雲恩承鳯凰詔擢為烏府臣錢唐古都會一水東西分三年持玉節遠邇勞咨詢氷壺貯秋月藻鑒無纎塵兹焉考嘉績封章朝紫宸天子坐南面視聽自下民茍乏耳目官上天何由聞公今司獻納一一請具陳某郡山水美某州風俗淳某守貪以墨某吏清以仁某田足禾稼某冶饒金銀某竈可淅滷某營可屯軍某曹奸且黠某士才更文里巷某貞節巖穴某隱淪忠良薦某輩淫祀黜某神虎拜伏闕下正及雞鳴晨天顔動微笑孰不荷陶甄維時晴雪後吳水碧粼粼張帆南斗下伐木大江濵我亦芻蕘者斐詞公勿瞋願言宣大化四海回陽春題曉峯在山不見山出山山更好披衣五更起山色入門早空翠落琴牀晴光動林表自有天地來萬仞青不了寄言山中人古今亦昏曉送叙班劉南奎還臨江省親日出獅峰頂鵲鳴庭樹枝慈母出門望兒從天上歸一别十三年母子隔遠道不憂嵗月深但恐母年老兒仕大鴻臚母在高堂居有祿不得飬問安徒寄書兒今乞歸省詔許還鄉井暫經洪都門遙指白雲嶺一笑偶相逢論詩鐵柱宮相逄即相别挂席趂回風回風吹五兩南浦春波長就船買鯉魚沿月櫂歌響登堂進流霞更栽萱草花百嵗母身健願兒長在家雪晴響始鳴條寒威稍侵戶聲䋣知雜霰溜密應兼雨尋燈靡靡飄度隙斜斜舞興極還思剡歌長重和楚寂寞大音希悠然向誰語辭世頌先生易簀之際作是頌命其子書而進之頌畢而終此可見忠愛之心始終無替也臣有一寸葵託根空谷間中有向日心炳如九還丹日照葵在地葵傾日在天由來忠義者存殁無不然臣心願如葵日照千萬年斗南老人集卷一
