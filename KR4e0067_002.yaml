啄啄哺母飢子多不愁哺母食夜夜來巢城樹枝烏夜啼烏夜啼城上頭城中少婦彈箜篌起聞烏啼生逺愁烏不能言解烏意願烏啼時赦書至雉朝飛雉朝飛鳴復止飢食野田粟渴飲野田水繡頸斑斑相逐飛何人感之犢牧子聖人在位歌關雎吁嗟雉兮今何如胡蝶舞東家西家胡蝶飛東家花落胡蝶稀西家明年花又放胡蝶還從花下歸東家還向西家道眼底青春為誰好人生行樂須及時莫遣花前胡蝶少孤鴈翔送馬山人歸潁川孤鴈翔潁之陽秦淮十月天雨霜人生豈無兄與弟獨夜哀鳴楚江水潁之陽孤鴈翔爾何為乎不作行明年寄書到東海日日沙頭鎮相待鵲失巢雙鵲結巢庭樹枝雌雄飲啄長相依東方風來知太嵗樹高巢重身多纍引雛樹問高下飛長見鳴鳩好羽儀豈意爾鳩鳴聒聒白書相期即相奪鵲失巢良可悲高岡鳳凰知不知鳩逐婦朝呼晴暮呼雨晴即相求雨相離相求何喜離何怒離合如關喜怒中青天長願日輪紅不見鴛鴦河水上一生交頸無惆悵屋頭桑子紅纂纂一雙飲啄桑隂暖繡頸斑斑相頡頏此時不道恩情短春雲淡蕩生朝隂爾雄聒聒啼高林豈意相呼即相逐可憐同宿不同心嗟爾孤雌向何處裴回闕忍他枝去早識長情不見疑託巢棲傍朝陽樹桑葉隂隂日當午桑下聲聲鳩逐婦喜即相呼怒即離輕薄恩情付晴雨恨爾不見雙鴛鴦一雙頭白在回塘銜泥燕銜泥燕尾毿毿昨日銜泥在城北今日銜泥在城南城南華屋故巢改城北故巢無復在裴回不敢離舊棲主翁一别何時歸君馬黃君馬黃臣馬白君馬在德臣馬力華山之陽春草長臣今矍鑠馬力强不願相遇王良與伯樂但願老歸田子方題貓捕雀圖强之食弱之肉飛者安知行者逐紛紛眼底人貓多雀兮雀兮可奈何古樂府妾有青銅鏡置君白玉臺無鹽與西子都入此中來郎采芙蓉花儂采芙蓉葉葉緑比郎衣花紅似儂頰古意皎皎蟠龍鏡娟娟秋月暉粲粲東窗女盈盈桃李姿婉婉惜芳年脉脉處香閨昔如璞中玉今如琴上絲玉質恆自愛琴心終不移郎如川上水妾似水中天流水何曽定青天不離川妾手不停織郎車不停輪長憐機上絲長寄車中人擬唐人十二月樂章并閏月正月青陽蕩蕩天門開太乙神君天上回翠旗青仗出蓬萊金花疉鼓鳴春雷黃河氷裂魚龍喜暖緑鱗鱗鳳池水麴塵吹黃上宫栁明日朝天稱萬夀二月日照曲江津千葉宫桃紅笑人梨園羯鼓趣花神綵絲五色繡青春金堤軟碧草如茵美人踏歌停素雲蛺蝶飛上榴花裙翠袖扶春海棠醉絳蠟通宵照花睡三月洛陽牡丹頳玉盤宫城落絮春漫漫千輪萬轂晝馳道一日看花心未了黃金買春恐春老錦帳圍天覺天小撞鐘槌鼓白日晏漢宫傳燭千枝爛南園草緑送春歸花落鶯啼綵雲散四月稚子斑斑穿碧草吳蠶繅雪車聲早內園中使進櫻桃單羅玉色試宫袍碧殿南薰生五弦高槐夾道團晴煙金溝荷葉緑田田五月明月裁團扇榴花照舞衣吳娃木蘭楫日暮采蓮歸龍綃圍水榭湘簟魚波動郎餐九節蒲妾食九子粽六月裁紅綃曳白苧館娃宫中催避暑夜凉水殿芙蓉開矯如驚鴻下瑤臺隔花玉碗調氷來七月碧落散金氣明河白浮浮鵲鳴知露重螢過學星流紈扇朝辭寵羅衾夜抱愁暑退長生殿凉歸乞巧樓月明吹玉琯開户望牽牛八月城頭夜傳柝露腳月中飛羌笛卷葉吹候雁向南歸缸花泣紅淚染絲上寒機莎雞且勿啼妾製邊人衣九月桂影離離畫闌曲露重銅盤泣寒玉轆轤軋軋轉金井美人手怯青絲綆鯉魚風高浪花白湘浦芙蓉失顔色七星挂樹長琅玕玉階羅襪生春寒十月氷蟾踏雲烏夜啼銀汞洗空霜倒飛蠟花巧綴蜻蜓眼銅龍無聲停漏板白天凍合玉河乾金井裁衣素手寒北風吹夢度關山十一月緑毛倒挂梨花雲辟寒犀暖蕙幃春玉妃剪水空中墮熏籠不斷沈香火宫中五色添長線旭日曈曈上瑤殿十二月匝地凍雲飛不起翡翠寒欺合歡被何人吹律待春陽三百六旬今復始閏月桃之都三足烏三年烏生三十雛東方燭龍夜回車氣朔推遷盈復虛緹室重吹鳳凰琯雌雄十二春聲暖斗南老人集卷二
