body:
  text: 斗南老人集卷二明胡奎撰古樂府前有千萬年前有千萬年不知是何物後有千萬年變化安可測河中龍馬未生時誰辨東西與南北混沌死七竅生昆崘水源直到海千流萬派何由清但見兩輪日月東西走不息人言火精與水銀鍛冶紅顔凍梨色消磨緑髮如星星人生得意且為樂何用空名留汗青有所思脉脉有所思泠泠寄哀弦弦聲久已絶思君聆我彈君情與妾意憂樂轉指間幸隨南風調流響九嶷山落葉隨風飛欲歸在何時人生千里不得㑹空向天涯歌所思黃陵女兒泣湘月蒼梧鳴鳳千年别彈折秋風五十弦妾貌如花命如葉青猿夜啼三峽長望美人兮良可傷回鴈峰前有來使願寄一書還故鄉所思向何方所思今有所食蓼不知辛食蘗不知苦惟有所思愁殺人蓼蘗不能如苦辛長相思長相思千萬里相思如車下輪相思如江中水江中之水朝暮流車下之輪何日休胡不斫車輪塞江水車不能行水不流世上相思何時已長相思路遙遙相思如大江水相思如楊栁條楊栁條長尚可剪大江水流不可斷長相思深復深平原莫繡五色線子期莫鑄雙南金人生知已古亦少相思之心向誰道長相思江悠悠洞庭木落三湘秋夢中不識别時路九嶷雲黯蒼梧樹翠華南去不復還雙娥灑淚愁空山五十哀弦雛鳳語鷓鴣啼處斑斑雨長相思思轉深請以白玉璞琢出相思心三湘之水東入海相思之心終不改三年不見郎萬里夢他鄉江水直到海寸心如許長思君恩君恩深似海君德浩如天嵗嵗流紅日山呼億萬年千里思五里復十里一日不見心縈紆何況千里别十年五年不得書君如天上雲我如水中泥雲在青霄泥在水相思千里不相知靜夜思出門月色白如霜靜夜所思思斷腸有美人兮天一方碧雲迢迢河漢長河漢長不可越但有一寸心含情託明月明月照人心不移靜夜所思誰得知思歸引寄聲託明月為我照家鄉十年不得歸今夕在路傍路傍楊栁樹猶記來時路越鳥戀南巢燕鴻懷北度去來南北無了期人生莫作楊花飛長歌引短歌歌不足長歌斷復續六龍之車海上來千秋萬古無停轂碾雪推霜入鏡中坐見緑髮如飛蓬滿堂窈窕春花紅長歌一曲歌未終西陵隴樹生秋風秋夢引井烏啼月銀牀冷轆轤聲斷青絲綆美人夢逐綵雲飛鸚䳇隔窗呼不醒小鬟臨鏡雙盤鴉熏籠火暖篆煙斜一寸芳心化胡蝶飛來自采芙蓉花走馬引千金買駿骨五花散春雲章臺楊栁陌醉踏落花春烽煙四邊靜寶玦腰間冷寄謝少年人男兒當惜身估客樂今日采石酒明日廣陵花大帆隨處泊終嵗不思家宫中樂初日上蓬萊平明玉殿開春風雙鳳琯吹下世間來緑水曲緑水何盈盈方舟出蘭渚美人臨清流相期拾翠羽翠羽不可拾春波蕩人心人心如緑水誰能知淺深江南曲江上水生蒲葉短白沙晴卧鳬鷖暖木蘭舟上紫雲娘笑入荷花羞見郎水痕漸緑蒲芽短雪消沙浦雙鳬暖一夜鵝黃著栁枝春愁暗逐春潮滿江上蒲帆鳥翼張船頭槌鼓出回塘吳中女兒不解飲呼酒隔簾催勸郎并州剪刀金兩股不剪人間别離苦湘雲剪舞衣楚月裁歌扇蕩舟蓮葉深羞與郎相見江上曲春江水深蒲葉短雙鳬交頸晴沙暖青裙女兒木蘭舟白苧歌回花滿頭郎乘木蘭舟說道長干去長干好女兒留郎再三住郎留豈不好妾思令人老郎心生蒺藜不如女蘿草妾有一掬淚灑向大江流願為西北風吹轉郎船頭蒲葉何短短潮來江水滿豈無金錯刀割水水不斷山下蘼蕪草江邊杜若花采芳思寄逺游子隔天涯江臯曲日暮清江上臨流采白蘋微波將逺意寄與弄珠人春江曲清江水深蒲葉短野鳬雙浴春波暖吳宫女兒白苧歌一曲春風吹不斷春波曲新婦磯頭雨小姑山下雲無情江上水總是别離痕金井曲井上青絲綆年深石有痕石痕猶不滅況是感君恩大堤曲朝看堤上花暮折堤上栁相送大堤人同傾大堤酒酒酣踏歌去留郎堤上住翻翻白馬蹄草緑無尋處大道曲將軍紫羅襦燕坐城南陌手撥紫檀槽市中人不識橫塘曲妾家橫塘口門前種楊栁春風吹舞腰勸飲桃花酒埀楊千萬縷下蘸橫塘水何事織離愁春風吹不起塘上誰家女紅裳白雪衣采菱愁日晚相待月明時妾家住橫塘郎過須下馬手把珊瑚鞭挂在埀楊下涼州曲曽聞一斗酒換得凉州牧寄語逺征人莫唱涼州曲越城曲嘗膽不知苦捧心徒自顰年年江水碧愁殺浣紗人城傍曲烏啼城上頭枕戈明月下十年不得歸願放華陽馬城門曲城頭烏夜啼月落少城西夜半傳軍令天明祭大旗湖中曲外湖湖水濁裏湖湖水清妾不愛濁水長向裏湖行手折芙蓉花佳期碧雲逺臨水照蛾眉盈盈愁日晚日晚當奈何湖中蓮刺多回舟蕩槳去莫唱采蓮歌天河曲天河之水向西流雙星夜夜當南樓機中細織雲錦字美人不來生逺愁日夕河邊待靈鵲玉宇高寒露花落愁心飛繞金井闌轆轤牽斷青絲索靈槎一去秋冥冥白榆千年那得青天上回波還入海東西相望心不改七夕曲妾在河東郎在西妾秉機杼郎扶犁夫田秋來不收榖妾織錦雲空滿軸一年一度寄郎衣妾抱苦辛郎不知今宵河畔一相見風露無聲烏鵲飛烏鵲飛來莫飛去借爾河東白榆樹樹頭結巢生子孫不愁填河河水渾百年三萬六千日今日誰云逢七七人言織女嫁牽牛靈鵲作橋天上頭妾是河東天帝女郎司天田妾機杼年年不敢誤秋期願田有黍機有絲絲能暖人黍能飽妾亦何心頻賜巧夜夜曲夜夜望明月初若蛾眉彎夜夜望明月今如白玉盤玉盤有時缺蛾眉愁萬結月照閨中人如何有離别夜長曲金虯無聲銀箭緩清夜何長晝何短七星斜挂少城西羣烏叫月霜花滿銅盤暖蠟絳紗明胡蝶夢寒龜甲屏三尺牀頭白鷼尾五更又逐雞聲起寒夜曲絳河凍合白如霜北斗挂樹天蒼蒼美人裁衣金剪冷夢入梨雲吹不醒玉關迢迢南燕飛燈花喜報行人歸行人不歸花自落月滿城頭夜吹角玉河回天凍光白流雲作氷飛不得銅龍嘶寒漏聲澀七星離離挂城北美人羅襪妒鉛霜蘭煙喚香歸洞房何人一笛關山月吹落梅花滿城雪銅龍嘶寒漏聲澀夜半氍毹霜氣入凍蠟凝膏不作花地爐火暖麒麟泣酸風射入如箭急燕律吹春竟何及平明起視三足烏紅盆刷羽氷花濕寒夜曲懷二子城頭烏啼寒夜長北斗挂樹天蒼蒼展轉不寐意倣徨我思二子如鳳凰大兒讀書不下堂小兒寫字能成行我欲挾子翺且翔手揮鳴絃發清商側身西望千仞岡令人懷思不能忘采蓮曲湖中女兒眉黛秋采蓮日日唱吳謳何如生長玉井水同擢仙人一葉舟昨日采蓮花今日采蓮子賤妾比紅衣寧教抱香死溪上采芙蓉蘭舟蕩晚風葉如郎意薄花似妾顔紅采花莫臨水水深清見底水有見底時郎心隔千里一去不思家秋風吹若耶只愁霜露重妾貌不如花折荷曲折荷莫折莖中有千萬絲秋風吹不斷總是長相思結楊栁曲千結江上栁萬結離人心千結與萬結何如結衣襟結襟尚可解結心終不改初結明月環再結同心帶帶以結綢繆環以結歡愛花遊曲東闌杏花雨嫋嫋寒食煙相期洛陽陌鬬草賭金錢白玉裝車軸珊瑚作馬鞭章臺年少子走馬緑楊邊檳榔曲與郎相别時檳榔高過屋妾有回文錦字詩為郎翻作檳榔曲緑窗沈沈春晝閒金盤鈿合羅兩鬟苦心一寸誰解識中含血淚紅斑斑昨夢郎歸采蔞葉丹髓凝春霞滿頰願封珠唾寄蠻箋郎若見時還念妾緑珠曲郎有百斛珠妾有一寸心寧甘墜樓死花落故園深田家曲門前一雨秧田緑柘葉重重覆茅屋今嵗籬傍筍最多南風一夜吹成竹趁暖吳蠶已上山繅車聲動水車閒幸喜村深無虎過柴門終夜不曽關蒿里曲蒿里曲春草緑人生百年如轉燭石家美人雙翠蛾尊前妙舞揚清歌一朝豔骨化黃土富貴浮雲可奈何出塞曲將軍烏角弓壯士逺從戎劒倚燕雲白旗翻漢日紅雪窖數行淚天山三箭弓鐃歌應有曲報捷未央宫登樓曲今夜慿高望青天月色多入窗風露冷開户看星河迎客曲陳綺席進華觴主人臨軒客上堂綺席陳瑤觴進清歌緩舞情無盡攜手曲攜手復攜手攜手杏花前白玉裝車軸黃金鑄馬鞭容華易消歇流光若逝川寄言貴遊子歡娛當少年搗衣曲去年搗衣郎有書今年搗衣郎在途手懸雙杵不敢下只恐夢驚堂上姑寄逺曲美人别後關山長買絲繡得金鴛鴦鴛鴦交頸不飛去與郎縫作征衣裳長長搓線莫教短短線恐郎情易斷衣成更寫數行書書中淚是蛟人珠懊惱曲懊惱復懊惱懊惱無人知阿婆不嫁女夜夜守空閨吟嘆曲王子喬好神仙吹玉笙上青天七月七日緱山顛青鸞白鶴相後先安得金丹蛻凡骨我亦從之凌紫煙雙鳬曲江上春生蒲葉短雙鳬晝卧晴沙暖一聲欵乃釣船歸錦翼斑斑相逐飛雞鳴曲晨雞初鳴當夜半少婦出房愁思亂晨雞再鳴月入帷少婦出門郎馬嘶晨雞三鳴月在道道上馬嘶聲漸杳馬嘶漸杳雞亂鳴桃燈泣淚天未明後夜聞雞北窗下夢裏雞聲候郎馬一鳴六龍海波赤再鳴暘谷東方白三鳴閶闔參差開紫雲飛繞金銀臺天街夜夜雞鳴早珂佩朝回霜滿道綺疏花影晏眠人夢裏雞聲不知曉晨雞初鳴月在堂少婦挑燈開洞房晨雞再鳴月在樹門前馬嘶郎欲去城西月落雞三鳴出户不聞郎馬聲馬聲已逺雞聲靜回首不知郎逺近寄語晨雞休浪啼啼時願郎歸馬嘶烏棲曲今夜烏棲向何處啞啞飛繞深宫樹宫中美人醉不醒空勞爾烏啼到明烏啼曲秦烏啞啞啼復啼夜夜不離庭樹枝妾聽烏啼識烏意明日官家赦書至城烏曲烏啼城上樹飛來復飛去烏去有時來郎今在何處月出女墻頭烏啼碧樹秋啞啞聲不斷啼月過西樓别鶴曲縞素作衣丹作頂夜夜月明看舞影今朝童子起開籠不聞戛戛回天風緱山仙人吹鳳琯八極無塵綵雲斷何由振羽當我前借騎一隻蓬萊天驄馬曲御史驄青連錢嘶風刷電朝九天昨日街頭人避馬今朝喋血車輪下後夜雞鳴聞曙鐘繡衣又復騎青驄迎龍曲朝迎龍暮迎龍旱火燒天龍在宫縣官投牒石潭中山南山北鼓逢逢蜿蜒躍入楊枝水山雲一縷隨龍起龍未離山雨到城城中三日不得晴明朝打鼓送龍去願龍十日行一雨種田有水刈麥乾年年謝龍神亦歡送龍曲迎龍來送龍去翠霧紅雲擁龍馭家家買紙謝龍神甘雨應期龍有靈明珠之宫紫貝闕碧潭無聲湛秋月願龍在山雲在天嵗嵗謝龍歌有年烏棲曲城頭月明烏夜棲棲到天明啼復啼底事夜棲朝復去不識朝陽鳳凰樹迎龍詞鼉鼓逢逢龍在王宫電虩虩雲重重啓貝闕精誠通驅五雷招八風送龍詞龍之來兮蜿蜒龍之去兮連蜷沛神澤兮沃秋田雲為車兮電為鞭陳玉醴進瓊筵感神惠兮不可言願五風兮十雨綏萬邦兮屢豐年白鸚鵡詞白鸚鵡隴西來金籠馴養無人開綺窗談舌學人語字字分明如處女一朝持入沈香亭玉環自教蜜多經解聽月殿霓裳曲慣識梨園羯鼓聲無端羽化沖霄去葬在碧桃花落處隴頭迢遰隴雲深無復重棲舊時樹山鷓鴣詞勸郎莫過洞庭湖湘妃廟前啼鷓鴣可恨九嶷山隔斷翠華無處問蒼梧江上有山復有山鷓鴣啼處雨斑斑一聲兩聲行不得南船北船朝暮還精衛詞精衛精衛飛且鳴千年填海海不平世傳此是炎帝女不知何年填海水海山石爛海水枯是時精衛安得無如何精衛鳥只填東海水海水尚可填人心浩無底鮫人詞并刀翻水凝不流碧綃如煙張素秋蛟人夜織魚鱗屋月色澄澄湛寒緑賣綃來從城市居主翁不識明月珠明珠贈君世無價明年有綃復來賣蠶簇詞拜蠶室祭神桑吳蠶在箔神在堂願神佑蠶風日好取繭倍多蠶縷長十日天隂未開箔蠶吐絲遲繭還薄地爐火暖借春回再禱神蠶須急作繅車易轉繭易抽長絲滿桁晴不收新婦登堂向姑道今嵗衣姑絲不少神樹詞田家種