body:
  text: 斗南老人集卷六明胡奎撰五言絶句題白馬圖開元照夜白箇箇玉連錢曾踏流沙雪長嗚上九天梳頭得白髮梳頭看明鏡中有春蠶絲明鏡不解語少年安得知襄陽小兒歌朝出習家池山公倒按羅歸時太守醉笑殺襄陽兒朝看襄陽花夕飲襄陽酒馬上倒載歸小兒齊拍手題黃公洞石磴古苔青不見圮橋履洞口有樵人渾疑赤松子棲鶻巖霜翮排雲開直下孤峰頂四山無鳥飛超然見秋影金雞石夜浴黃金盆一鳴天下白何年補青天化作山頭石驪珠石不照魏王車不填東海水如何徑寸珍長遺碧山裏棲鶴峰仙人王子晉忽作千年别時下碧雲中吹笙弄明月題小兒折花圖誰家花下兒采花不采葉行傍玉闌干驚起雙蝴蝶鏡天關髙閣倚天碧湛然明鏡中了知身是幻寄傲在虛空放鶴坡仙人有騏驥長放白雲中坡前啄瑤草猶勝老樊籠蘸筆池夜浴月中朝臨池上書定有古文字化為科斗魚慿虛樓慿虛倚髙寒不見歸鳥背山猿為主賓並立闌干外道林經室松籟起山頭潮音生屋下空庭白日長不見支郎馬內史行軒黃鳥晝隂寂白鵝春草青髙軒如可借著我學黃庭玄度舊隱晉代有詩家林扉一徑斜苔封山下石松老寺前花寶林八詠飛來峰靈峰解飛來畢竟還飛去如我去來心虛空本無住應天塔孤塔倚天起千鐙見佛光夜半風鈴語如聞替戾岡羅漢泉踏破山前月鑿開山下泉大千沙界裏隨地見青天鰻井鰻魚生井中隨潮時隱見恍然娑竭宫長見真龍靣布衣山中大布衣流傳自今古挂在杪羅林不待朝陽補鐡鉢不遊舍衛城不盛香積飯老僧乞食餘但言所作辦竹深處入山但見雲出谷不知路空翠四邊來袈裟濕秋霧盤翠軒一重復一崦翠色何盤盤坐久不知夜月髙風露寒題芭蕉畫扇昨夜西窗雨不知何樹聲今朝團扇裏看得最分明題山居圖短短山中樹山人手自栽只今髙過屋猶未出山來題人馬圖春草大堤平黃衫照晚晴朝回無一事立馬聽流鶯題李白醉歸圖寄語襄陽兒莫唱銅鞮曲春風吹潑醅漢水年年緣日落峴山西風吹白接㒿不騎山簡馬驢背倒馱詩一辭金鑾殿甘作醉鄉侯東華塵似海不及卧糟丘玉皇五色麟不踏京華塵如何捉明月一醉三千春朝醉長安花夕醉襄陽月至今花月間不見醒時節春暮有感閉户長聽雨看花不當春可憐三二月又别幾多人題梅竹圖雪後記曾來疏花竹外開至今雙蠟屐留印在蒼苔送友停棹更須臾盡此一杯酒莫忘相别時鵝黃上楊栁題畫久負看山約今朝見畫開想從東越去移得過江來織婦吟機頭一寸絲手中千萬縷夜夜織春愁梨花半窗雨蜘蛛詞朝布一尺網夕縈千縷絲東家雙蛺蝶不敢傍簷飛題山居圖行李晚蕭蕭挑雲過野橋料應無别事只是訪漁樵濯足圖水清濯吾纓水濁濯吾足不見濯纓人可憐江水緑題劉阮圖一自飯胡麻仙蹤隔綵霞空餘雙澗水流出碧桃花感遇宋人得燕石藏之以為寶白璧人不知荆山空自老題畫石曾聞鬱林石萬里過東吳偶託循良傳千年入畫圖彼美煙霞姿巉然亦竒怪不登竒章門足以當吾拜題醉石昔陶淵明所居栗里醉眠其上故名陶公居栗里一去已千秋獨遺秋水骨合諡醉鄉侯題平泉醒酒石平泉醒酒石曾置洛陽園却笑醉不醒無由傳子孫紅梅姹女過南園曾分換骨丹玉顔春不老禁得雪中寒墨梅快雪半消時春波動墨池翠禽啼夢覺拾得向南枝東園雜興蝸篆上階苔林扉雨後開夕花知夏過涼葉見秋來蕉心卷復舒此意竟何如相看渾不語恐是故人書掃地夕隂滿把杯江月生緑蕉三五葉先已著秋聲偶依城郭住渾似野人家童子朝分菊鄰翁晚送瓜隔花雙喜鵲飛去又飛還知有詩人至柴門不用關古井如明鏡寒泉夜夜添朝來評水品頗覺煮茶甜翩翩五色羽飛上紫薇花此地無繒繳時能到我家過江上隔水見江光前山送夕陽歸帆風力便吹過白龍堂江樹碧迢迢舟行第四橋月涼天在水龍女夜吹簫今宵何處泊七十二峰前記得夜來月江心五度圓題賀公畫賀老東湖上空回載酒船美人不可見江水隔涓涓題山水畫扇為越人作南望越王臺千峰罨畫開分明團扇裏招得過江來槿花有感賦命胡不長朝榮暮還悴安知瑤池桃結實三千嵗閏九月百年同一嘆九月兩重陽人似柴桑老花如晉日黃巫女妾住陽臺下何曾夢楚宫朝雲吹不散任爾大王風西施捧心一痛一眉顰夫差識未真曾知褒姒笑即是捧心人湘妃竹上斑斑淚重華去不還鳴條何處是腸斷九嶷山楊妃病齒五王同帳日花萼正輝光一自玉環入齒寒唇亦亡二喬天下分三國江東美二喬英雄方割據何暇詠桃夭緑珠妾墮髙樓日名園花正開如何金谷友不見一人來折花寄逺偶出城南去手折半開花青春莫相負全開我到家正叉清晨覽明鏡雲鬟正玉叉但得君前舞猶勝香徑埋邊城思草緑昭君冢月白李陵臺如何三月暮南鴈未歸來送人之揚州送子揚州去共説瓊花開瓊花開未開慿子報春來南浦夜來雨不知深幾尺早晚待歸船纜在沙邊石揚州好明月夜夜照髙樓咳唾風前落笙歌月下遊雨夜柴扉春雨深頗覺人事簡紅燭夜結花巧綴蜻蜓眼穿雲徑山中夜來雨雲氣不曾收手扶緑玉杖行傍水西頭弄月池煌煌明月珠倒影池中水恍然紫綺裘濯足天河裏免涉橋涉水免褰裳沿流不用航何人探梅去踏碎五更霜養生畦松根生茯苓雲氣白於雪中有采芝人商歌隔林樾鳳逸林翩翩五色羽下集青琅玕泠然振環佩天風生翠寒蛟蟠堤長堤蟠翠蛟鱗甲欲飛動豈同樗散材會待明堂用候鳩墅候鳥解鳴春呼晴復呼雨朝耕一壠雲夕息三家墅聽雞窗剪燭夜何長隔窗雞戒曉千古聖賢心書囊談未了夏夜待月東園夜花隂覆緑苔流螢三四點飛過竹間來白頭公青春流水去白髮見花羞山鳥緣何事如今也白頭寒食有感説向諸兒女行囊有賜錢沽來采石酒不到墓門前一畨寒食雨千里異鄉春賴有同舟侣相看笑語真襄陽童兒歌朝出襄陽城花間識馬聲春風夜來雨池上縠紋生倒著接㒿歸馬嘶城下路太守醉不醒兒童歌日暮夜泊采石缺月在青天抱衾猶未眠鄰燈三五點都是别人船寒食自遣寒食尊中酒清明陌上花莫教愁送老須仗醉為家番湖夜泊不見月又無酒可沽今宵三五月不照異鄉人笑殺陶彭澤空裁漉酒巾望海漫興東海珊瑚樹蓬萊石上栽何年沈鐡網移向世間來天寒魚眼紅躍出蛟人宫明珠三萬斛泣贈主人翁祖龍驅白石萬里駕長虹扶桑望不見吹起鮑魚風徐福求仙去樓船竟不還如何白玉樹移不到驪山穆王馳八駿西上崑崙山青鳥無消息碧桃春自間暘谷種扶桑根株萬里長八風吹不動生在海中央題漁樵問話相見長松下勞勞語未間料應無别事只是説溪山題山居圖山雨過臨平當門野樹青釣絲風不定隨意立蜻蜓即景暮雨過方池花落回風急信手上簾鈎恐妨歸燕入題畫竹昔聞王子猷曾訪戴安道安知千百年復見此君好團扇詞當暑恩何厚交秋寵漸衰涼風太情薄玉樹不禁吹拜新月下階拜新月一抹蛾眉彎月若知人意長如白玉盤聞鴈故人多在北候鴈又回南知有平安信聲聲語再三秋日有懷一水限天河秋來月色多酒船輕似葉何事不相過荷花鸂鶒圖荷花澄晚色荷葉蓋秋江無情沙上鳥交頸自雙雙秋夜偶成下階見明月起舞一裴回呼兒掃花影月落始能開冬夜偶成月白海氣寒烏啼七星落幽人掩關臥城頭夜吹角築堤謠朝鑿西山石暮填東海水西山石可盡海水浩無底登登復登登一日千萬杵寸石如寸金化為東海土水犀莫射潮祖龍莫驅石海水尚可填人心填不得哀哀精衛鳥東飛復西飛填得海波淺愁殺弄潮兒荷葉露珠既圓仍復碎才滿又還傾一掬銅仙淚終宵泣到明蛛網落花脈脈縈春思依依閣晚紅有情終戀日到底不隨風窗間水影朝旭動前池風漪隔窗過紛披覺魚亂散漫知萍破苔階蝸篆不從蠻觸戰聊學李斯書莫笑雕蟲技也勝粘壁枯銅牛水滴不能開蜀道庶可耕硯田縱橫三千字借爾一犁煙逺將歸朝聞靈鵲語夕見青鐙花空閨占吉夢逺客將還家題蘇李泣别圖孤臣一掬淚歸拜漢庭前白髮三千騎丹心十九年燈依微寸草心巧綴蜻蜓眼慎勿伴綺羅長留照編簡琴泠泠秋水清湛湛秋月白人間曲中意不似琴絃直棋勝覺乘機早輸憐得子遲山中間日月只許爛柯知書秦灰無豕魚孔壁有科斗河洛出龜龍天地同不朽畫昔聞詩中畫今見畫中詩芭蕉生雪裏只有輞川知新嫁娘窗間挂明鏡頭上百花新羞為郎相見低頭看未真七夕詞東西分一水音信不通潮寄語河邊鵲明年莫架橋雨竹急雨灑髙竹虛齋散微飈泠然金玉音如雜簫與韶題射鴈沙磧暮雲平龍駒蹀躞輕彎弓休射鴈中有弟兄情雨晴聞鵲寄友人雨晴聞鵲語立近杏花梢知有明朝約看花載酒肴夕雨有感夕雨振庭柯幽禽棲不定戀戀故巢安無人知野性齋居雪詠西窗寒正深推户雪盈尺不見碧苔䀶惟留棲鳥迹花上蝶翩翩花上蝶戀花不戀葉葉多花漸稀愁殺空閨妾擬古魚戲蓮葉東葉短初出水不學水中萍託根無定止魚戲蓮葉西蓮生不染泥阿婆不嫁女夜夜守空閨魚戲蓮葉南花紅水偏緑采花當及時佳人美如玉魚戲蓮葉北花落蓮子生早知蓮菂苦不有别離情漁翁結屋倚晴嵐移舟繫夕潭五湖煙水濶只合老江南題山水谷口見桃花飛樓隔翠霞仙家知不逺仿佛是金華題寒江獨釣我志不在魚獨把寒江釣却笑剡中人空回雪中棹聾叟聽雨戲題打窗風雨來兩耳驚不入起來覔秋聲但見林葉濕送友人之京燈前慈母線時樣製春袍未著心先喜蛛絲上剪刀此别意何如人來即寄書聖恩無逺近隨處是安居南風昨夜起吹動木蘭舟底事長江水年年帶别愁即事快雨洗庭緑幽禽變春聲薔薇時一落萱草已叢生關山月萬里關山月東西共一天遙憐馬上見不是在家圓詠燈欲滅又還明花落銀缸裏搔頭不敢挑待卜明朝喜春詞江城五更雨催得杏花開小立茅簷下一雙新燕來劉伶萬物須臾過沈酣竟不還家童將一鍤不省葬何山杜甫獨樹浣花村歸尋老瓦盆秋風吹破屋也勝富兒門盧同不諛墓中人不參京兆尹千年月食詩足以見忠鯁賈島姓字聞京兆才名比孟郊欲知詩意味元不在推敲孟郊酸寒溧陽尉何不化為龍千古低頭拜無由得再逄團扇詞紈扇長門月羅衣别殿秋西風吹玉樹先到玉階頭題畫沙明漁浦近水落釣船低野樹長含雨山雲欲渡溪夷齊扣馬圖牧野興師日商賢扣馬時要將忠與孝説向後人知圯橋進履圖出逄黃石公歸從赤松子漢家四百年功在圯橋履季札挂劔圖寶劔千金直英雄一寸心徐君墓前樹風雨作龍吟子陵把釣圖一片漢時月長江萬里開只應天上去釣得客星來題竹人愛此君節我愛此君心仿佛湘江上天寒龍夜吟一方明月影寫在墨池頭昨夜天風起颯然環佩秋聞杜宇蜀國子規鳥入林啼且飛我今還故里莫道不如歸即事一日一百刻書漏又添長窗下枕書卧時燒藝草香題木石圖乘槎上天去星河風露涼拾得支機石珊瑚二尺長過揚子江舟中有作樹暝千峯雨江寒五月秋轉帆山不見移過在船頭題林泉讀書圖手把桐君録林泉即是家數株秋樹葉都染葛丹砂題畫雨休松氣涼幽人此中住溪頭鱸正肥持竿放船去家住青山下船頭一釣蓑片帆儂使慣只是怕風波懷友昨日杏花開今朝燕子來相思三百里明月在髙臺種萱手種忘憂草都緣耐老親今年花又發不見白頭人夏夜月白銀河淡天青玉露微夜涼眠不得花氣襲人衣題梁谷才小像迹不逺城市志惟在山林所以梁伯鸞髙名傳至今雙吹管瑤臺明月涼玉琯回雙鳳不知誰氏女參差隔花弄勸酒且盡今朝酒休憐昨日花相逄須共醉不必問天涯泰和八景澧陂春漲山中夜來雨春水拍天浮野航髙過屋繫在樹梢頭香爐紫煙紫煙浮碧虛爐峰幾千丈欲持一瓣香安得仙人掌雲源仙笛仙人鍊丹處云是杜光庭手持青玉琯月下喚龍聽聖容鐘聲西山送夕陽東山迎素月一百八聲鐘迎送何時歇龍際曉嵐龍噓石氣浮空翠不曾收松徑朝朝雨蘿窗夜夜秋田東暮雨戴笠出東郊白雲如海濤前村風雨急溪水晚來髙甘峰飛瀑聞道浮丘伯甘峰看瀑飛手翻銀漢水隨手落珠璣天寶懸崖蓬萊巨鼇簪此立向天外仙人招我來飛空振環佩過田家門外棗花落池中荷葉生越燕雛將乳吳蠶繭已成桑間戴勝飛桑上鵓鳩啼社日聞歌唱田翁醉似泥題延月軒呼童掃前除試問月來未月不待人延開軒還自至明月照雙溪東陽有舊題風流千古意若箇子孫知圓魄上青天流光不待延徘徊經席上奄忽到尊前誰言今之人不見古時月古月照今人千年同一轍只除風雨夜特地到吾軒相望若千里相看無一言過山來較晚近水得還先好似西湖上飛光落酒船明月落誰家信是無心得出門舞婆娑梨花滿庭白我軒尋丈餘中有天地廣靈臺湛虛明夜氣接髙爽身在瑤臺上不知風露寒錢唐十萬户能得幾家看未題延月軒先得廣寒喚起沈休文更續東陽賦題畫仙翁采芝處只在白雲間童子立松下日斜猶未還題水榭納涼圖五月南風起荷花水榭開日長消酒渴碧碗送氷來題落花遊魚圖魚行日千里花落春三分慎勿過溪去磯頭有釣綸長門怨千金空買賦依舊守長門寄語文君道相如亦少恩醉後口號桃花休笑我爛醉武陵春百年渾是醉寄語獨醒人題蘇李泣别圖秋風吹節旄淚濕舊時袍玉壘胡沙逺金城漢月髙寶劔篇雙劔躍雙龍長鳴寶匣中何如吳季子挂在墓前松題桃花雙鳥圖雙禽爾何來四顧怕人見隔窗啼一聲驚落桃花片題荷花鸂鶒圖晚色淨娟娟文禽亦可憐一雙荷葉底誓死不孤眠題枯荷鷺鷥圖嫋嫋頂絲長枯荷倚夕陽窺魚髙蓋下不怕夜來霜橫塘曲橫塘風日好荷葉似花香勸郎莫蕩槳中有錦鴛鴦題竹江上靈妃過秋風響佩環騎龍向何處只在九嶷山崑丘多玉子雲氣不曾收數尺伶倫管天生在上頭昨夜西齋雨秋聲葉葉涼平明推戶看蒼雪灑衣裳雨後翠寒生鷓鴣啼晚晴湘妃江上過環佩落秋聲春雷破崖石驚起籜龍兒南風吹十日便有拂雲姿涼隂生墨池葉葉秋可數朝來禪夢醒一片湘江雨題蘭竹圖日落楚江頭美人生逺愁采芳紉作佩翠袖不勝秋題蘭竹雙蝶圖湘浦歌竹枝湘臯采蘭葉二妃招不來貞魂化為蝶題碧桃畫眉圖阿母西池上春風碧雪多一雙花鳥使也學畫修蛾寄友人一望一回頭白雲千里秋如何持别酒只是送行舟寄衣曲倩得鄰家女裁衣信手縫今年涼信早六月見秋風别淚千行線愁腸萬縷絲夜深纎手冷只有剪刀知織就機中素燈前拭淚看若教郎得暖又怕老姑寒近得平安信官家賜賞錢郎歸知有日不待厚裝綿題牛圖牛背穩於舟牧兒忘百憂晚涼過溪去落日在林頭一童牧兩牛牛馴童亦樂放浪野田間何曾識城郭老牸臥晴坡回看水中犢牧子過溪來前村草䀶緑江南水草肥爾牛亦何樂兩童對奕時若箇先一著雪後看山昨日白如玉今朝青似螺我留青白眼看得此山多離筵贈故人葉落不返柯水流無回波人生易聚散不飲當如何憶友日沒還上天月缺還再圓如何同心者一别阻山川題怡老堂畫竹玉堂髙學士逺寄碧琅玕此物能怡老長年耐嵗寒怡老堂前竹如君好弟兄裁為雙玉琯吹出鳳凰聲塞上曲邊城栁色動祗是去年春借問雲臺將如今有幾人團扇聯句織波千縷細剪月一規圓寵奪芙蓉後恩深蛺蝶前正叉聯句倦拭青銅鏡羞臨玉鏡臺叉梁金鳳小欲墮井中來昭君萬里靖邊塵休言誤妾身青青原上草猶是漢時春擬古望鄉白雲中家本白雲下白雲何當來化為千里馬青松在髙岡女蘿附其巔女蘿無所願願與松長年匣中有長劔防身三十秋長劔何所願願斬佞臣頭春風詞花信二十四春愁千萬端年年吹不散故故作餘寒通帷花氣重入户燕衣輕噓寒還作暖吹雨復兼晴朝吹杏花開暮送桃花落榮悴各因時莫怨東風惡銅雀妓月朝十五時望陵作歌舞歌舞綵雲空佳人化為土過相見灣月白霜氣寒鴈宿黃蘆靜停舟相見灣隔林見鐙影過相見灣遇友人大江無相知幸識君侯面舟行相見灣况與君相見舟中月白天宇髙仰見明星爛坐久不聞鐘舟人夜中飯題荷花鸂鶒圖文禽好毛羽雙臥芙蓉浦夢落煙水深蕭蕭葉間雨長夏雲村白雲自何來棲我山中樹願為九夏涼慎勿從龍去績婦詞小姑紅燭下夜績到天明乍可無膏火偷光莫借鐙商婦詞花時去販茶葉落未還家寄聲船上月慎勿照琵琶江上書情亂螢飛不停獨鳥棲還起若説故鄉情深於大湖水過平望虹截江雨收龍驅嶺雲散漁屋起炊煙舟人日晡飯江上青裙婦移舟夜月中喚郎雙打槳好趁正南風過閶門落日照長洲烏啼苑上秋百花都落盡一水自東流閨情頻拭鐙前淚恐沾衣上䀶不眠忘手冷翻覺剪刀溫聞霰翛翛葉打窗瑟瑟珠跳瓦長夜未眠人起聽孤燈下客中見月初月蛾眉彎纎纎出天外幼女學穿針多應下階拜題墨梅窗外翠禽啼巡簷索笑時鐡心渾不改只許墨卿知初日旭日照羅幃美人初睡起雙鵲繞簷飛良人隔千里玉鏡臺妾把青銅鏡郎投玉鏡臺芙蓉照秋水似向水中開纜舟石寄語江邊石郎今隔逺天如何江水上只纜别人船六言絶句題陶學士遇秦弱蘭圖白玉堂前明月烏紗巾上青天肯把自家風致盡情付與嬋娟老至今年七十有四一嵗三百六旬看過故園桃李不知幾度青春花信風二十四畨花信三千里外鄉心屈指落梅消息從頭數到如今漫成寧教花片沾泥莫遣隨風亂飛沾泥尚留春色隨風不返故枝東家西家蝴蝶南園北園杏花明日花飛蝶去不知春在天涯題梅月圖為長沙人作黃鶴樓中玉笛十年不到長沙夢逐梨雲歸去月明夜夜思家羅浮洞天月上姑射仙人夜歸玉骨本來貞白緇塵莫涴裳衣題山居圖亭上松風瑟瑟琴邊澗水泠泠一箇黃茅亭子四窗雲白山青題林逋觀梅圖昔年曾訪孤山欲識詩翁半面水邊著意相尋林下無心一見題伯瑜泣杖母昔杖兒身健母今杖兒力微孝子之心愛日喜懼之年可知題閔損衣單母在一子衣單母去三子衣寒名列四科之首孝為百行之原題管鮑分金同心之金可斷仁者贈人以財知我莫如鮑叔管仲之器小哉斗南老人集卷六
