㑹須明日償高興隨意㸔雲稱野情秋江聞雨秋夜夜長雨復作虛閣蕭條詩夢清蕉葉半忩敲漸宻燭花一寸落還生不愁屋漏無乾處正喜年豐有頌聲問訊丹丘廣文老朝來病骨也須輕寄友人秋隂閣雨冪林梢野舫乗閒出逺郊井就烏龍評水品山尋白鶴借雲巢煮茶榻共高僧坐問字門容弟子敲想得東家好清事竹間松下具行庖東里先生眉最白南州高士眼終青蓬萊弱水三清淺胡蝶莊周一夢醒今日好書封禪草他年還築聘君亭看山樓外秋無際誰識天邉處士星送人回餘杭小閣熏鑪㪚午煙論詩愛爾最清妍夜燈三宿無他夢春水明朝各自船茶到山中分榖雨酒從地上品丹泉此行若過棲真洞寄語仙翁葛稚川謝惠桂花金佛寺中金粟子黄金布地即金沙兎公邀月來香國龍女凌風㪚寳花撚處從教迦葉笑寄來絶勝趙州茶老夫鼻觀根塵斷遮莫秋風到我家送知縣陳仲信之建昌太學儒生三載别建昌令尹九江行中流鵝鸛秋㠶健五色麒麟畫錦榮日照香鑪生曙色河翻瀑布落秋聲清朝樂育菁莪意復見弦歌在武城望海元氣洪濛混太虛天呉簸蕩撼坤輿千年木石勞精衛百谷波流㑹尾閭月下明珠蛟女泣雲中飛觀羽人居秋風吹老珊瑚樹不見麻姑錦字書寄何山人白髪梁園能賦客近聞卜隱在林塘茶分陸羽評來水藥按桐君著後方雨雜澗聲通墨沼風吹花片落琴牀春來佳趣同誰領擬約詩人坐竹房寄幽湖友人幽湖之水清且幽三十年前曽一遊山中伐木歌黄鳥海上忘機想白鷗别去襟期同契濶寄來書信莫沉浮白沙翠竹依然在擬櫂空明一鏡秋寄高徴士金水河邉承詔日丹陽郭外買舟時還家咫尺無書問抱被尋常有夢知高適平生孟諸野杜陵人日草堂詩烏巾且漉黄花酒莫遣秋霜上鬂絲寒食感懐江栁絲絲㪚碧煙異鄉佳節思緜緜空梁燕子驚三月踈雨棃花又一年魯酒可消官舍冷宫袍初試越羅鮮栝山雲樹無多路空把閒情託杜鵑輓大無外上方鐘鼔寂無聲又報茶毗一箇僧丈室不留居士榻隣房空施藥師鐙身離火宅三千刧手輓牛車第一乗清夢定過湖上寺梅花月色澹如氷輓沈孟雲居士我識東陽鶴髪翁毎將五采繪虛空浮沉夢落沙鷗外得失機藏塞馬中幻境因縁今日了他生笑語幾時同無端聞訃初三夜哭上青天月半弓即事静中得句共誰論數日長吟嬾出門巻幔不教妨燕子掃花長恐損苔㾗小園避地無車馬高竹過墻有子孫莫笑閒居無伴侣興來傾倒是山尊題多景樓十載前登多景樓樓中景物最清幽大江入海走其下白日麗天行上頭去雁一聲歸楚信征㠶十幅過淮舟老夫登眺情何限又為題詩得少留次韻客裏流年衮衮馳鳥聲如語復如悲破除午夢慿茶鼎鏖戰春愁是酒旗下榻定留徐孺坐敲門還問子雲竒人生何處無知已和得回仙七字詩築得春城似錦官東南烽火喜平安花前起舞還提劔李下行歌莫正冠鉛澒晝開蒼术火羅衣朝試杏花寒鳴笳鼉鼔軍中樂應念高堂菽水懽歸來貧居側近曳裾坊老病歸來葺草堂芍藥玉盤花更大枇杷金彈子能黄毎移棋局多依竹自理琴弦不下牀稺子扶持日卓午下階先占樹隂凉暮春病起病起不知春已歸餘寒猶滯越羅衣倉庚只向愁中語胡蝶多從夢裏飛閒繞曲闌看芍藥更添修竹架薔薇故人知我逢迎嬾頗覺詩筩近日稀招飲答謝緑隂門巷麥秋天欲訪髙齋拜不前詩史少陵元姓杜文章司馬舊名遷竹間只許安茶具花外何煩櫂酒船昨日山庖分盛饌笑看兒女舞回旋題雪谿船愛爾雪谿船最好櫂歌聲近野鷗磯人如天上春來坐興比山隂夜半歸當席最宜明月出持杯長見落花飛徃年記得曾相過醉後寒生白苧衣輓友人妻白首飛蓬感嵗華不隨句漏飯丹砂一函埋骨知何地千里看雲不是家南國春風懐茘子東䦨暮雨泣梨花傳家有女能全孝屬纊無兒可嘆嗟送禇二令大江八月鯉魚風興在烟波浩蕩中雨露自天通百粤山川何處是南雄晚凉歇馬榕隂緑朝日行盤茘子紅袖有相如封禪稿㑹須獻納未央宫壽郭文伯蓬萊宫殿壓金鼇南極星明紫氣髙太傅諸郎瓊作樹開元供奉錦為袍逢人惟種林間杏待我來偷海上桃西翠樓前今夜月玉笙誰伴醉春醪送人之惠安教諭春朝射䇿鳯凰池一日聲華四海知駟馬橋頭題柱日三鱣堂上校文時晚凉移席臨蕉葉朝日行盤擘茘枝别去應須各努力粤雲呉樹總相思柬髙上人物表手揮玉麈坐談空一月不知花信風逺公髙志在物表蘇晋長齋多醉中方池種蓮春水緑虛室坐觀夜燈紅懸知定起了無事煮茶賦詩誰與同題玉川草堂古有玉川家洛陽今有玉川開草堂周公夢回日丈五諫議書來天一方野鶴當階似人立春筍過壁比兒長先生閉門無一事花雨茶煙繞石牀送南昌𤣥妙呉大節鍊師編書之上清青天白雲如白龍送爾上謁蓬萊宫誰言肉重不騎鶴我識神清能御風丹篆雲霞從地出玉壇星斗與天通芸忩駒影良可惜清夜好分官燭紅仙人宫闕五雲交羽佩翩翩起白茅月下方諸凝墨沼風前脉望出書巢丹臺石室名先到玉檢金編手自鈔想得山中寒食近青精作飲具山庖清白軒為都昌縣丞邵譲題楊震當年畏四知君能清白更無私涵空水色原澄淨映雪梅花不受緇百里謳歌欣政化千家絃誦聽唔咿他時秩滿登天府民有甘棠去後思送玘大璞還山放生池頭朝雨晴上人買舟明日行飛錫還山雙屐逺渡桮到岸一鷗輕湖西猿鶴心先喜海上蛟龍夢不驚無限送春詩思在盡情都付子規聲送恬上人兼柬奎方舟飛來峰頂袈裟影正在長松落照間正月不歸當二月出山未久又還山午階花落茶煙澹春院苔生杏雨斑問訊維摩無恙否幾時能伴白雲閒輓慶雲山􅊰師白雲飛影度前峰去上諸天第幾重林下經閒春卧鹿谿邉鉢冷夜歸龍傳燈誰續生前火大藥難留病後容積雨長廊苔色滿更無人聽講時鐘望海觴咏太常博士金閨彦也愛長齋繡佛前放浪形骸當九日康强筋力稱餘年臨池冩字鵝翻雪隔竹煎茶鶴避煙昨日登髙東海上時人稱是地行仙海國凉生白苧袍年年此日愛登髙不妨更落西風帽想象同持左手螯雨過一江澄晚色空清萬里見秋毫凭闌望逺誰能賦只有元龍氣最豪賀人生日蓬萊佳氣接雲髙此日初筵集俊髦二十四人金谷友三千餘嵗玉池桃禎祥自昔符麟紱文采於今見鳯毛一笑後天同介壽薔薇花畔醉春醪種竹屋前種得萬篔簹醉日移來傍短墻不礙月華晴照夜最宜雨氣晚生凉此君對酒年年好稺子當階箇箇長手把玉笙吹一曲蹌然如有鳯來翔題處静軒聞道仙家多種橘此中佳趣有誰知波瀾不起千年井日月長閒一局棋總道蘇耽能養母也知商皓是吾師寄聲華盖峰頭月静極還應有動時處静軒中好賦詩熏爐茶鼎最相宜夢回啼鳥日髙處坐久落花風定時賣藥仙人多種杏爛柯樵者亦看棋援琴試鼔無絃調流水髙山只自知和郭文伯惠筆韻兎頴應從月窟収寄來筠管自湖州題詩毎媿鍾王帖載酒長懐李郭舟鱸出四鰓蓴菜雨蠏分八跪稻花秋十年不飲呉江水安得相從訪舊遊題畫空青㸃染入秋毫不用并州快剪刀太華三峰從地出蓬萊千仭倚天髙重重澗壑藏雲氣菶菶梧桐集鳯毛寄語山中騎馬客清時莫種武陵桃題海雪軒馬家亭子海雲邉一室空明萬里天閬苑東來花滿樹崑崙西去玉為田珠宫凍合龍鱗濕斗帳寒生鶴夢圓坐釣珊瑚枝上月子猷那肯便回船題琴軒借問軒中何所有一琴佳趣少人知但能白首歸元亮何必黄金鑄子期幽澗水聲風静處碧忩蘿影月明時好㝷太古無絃調更賦巴人白雪詞望雨一月不雨農心憂兩月不雨田無秋南山空聞雷電作北斗不輓星河流赤龍枯死洞中燕白日叫乾桑下鳩昨夜欣聞月離畢照泥星出屋東頭送友人之蜀川山上于今復有山親闈宛在白雲間江㠶直上五千里秋水初生十八灘謝豹叫雲魂魄苦楚娥啼竹淚㾗斑相思若有平安信寄與明年春鴈還送人還南雄秋風吹老白蘋花八月歸船定到家重見彭籛生盛代也勝賈誼謫長沙雲㠶入楚輕于鳥江水通巴曲似蛇諸蹇登堂拜郎罷呉音越語共謳啞送張將軍之京綵旗嫋嫋動春城千里朝天上玉京諸將論功稱李牧小兒學語識花卿彎弓曾射南山虎立馬還聽上苑鶯江上梨花一桮酒題詩相送若為情題涵碧軒圖雲影天光湛碧虛何年卜築傍西湖可憐故老歸泉壌只許兒孫見畫圖秋鴈白邉漁艇小晚山青處草堂孤却思舊日懽娱地花滿樓船酒滿壺題秋江别意圖五色綸絲下九關使君指日向南還雲㠶直上五千里江水初生十八灘媿我安能從驥尾如公正合在鵷班到家已是登髙節把菊悠然在看山寄貢尚書姪三十年前老秘書故家文獻近何如諸孫總抱連城璧遺稿誰収合浦珠荒塜有人來下馬秋風無樹可棲烏嗣宗子姪唯公在何日相過致束芻呉雲越鳥思悠悠毎憶髙人住沃洲詩法好追元刺史風流還繼白杭州釣船荷雨孤鐙夜禪榻茶煙兩鬂秋莫戀賀家湖一曲行看玉帛賁林丘寄嚴州張同知近聞别駕朝天去船過長安問野人聲價已知當代重交情還似向來真月明江上魚龍喜日落山中虎豹馴肯借嚴陵灘畔石持竿來共白鷗鄰贈醫士長律十首上池吾聞上池世莫識扁鵲傳來信有神飲水不過三十日隔垣能見一方人若非沆瀣流金液定是崑崙漱玉津自笑煙霞多病渇願分一勺洗埃塵丹竈海上仙人有葛洪騎雲八極杳無蹤十年䑛鼎來雞犬九轉丹成變虎龍玉髓豈無金液鍊絳泥猶有紫苔封只今誰得長生術獨有南州鶴髪翁杏林匡廬西望太霞邉種杏仙翁不計年花塢日髙聞虎嘯芝田雲煗借龍眠活人何惜千金藥積榖全勝萬頃田回首紫薇山下路萬株團雪照晴天菊潭南陽谷口菊花潭百尺清泉一味甘老去最宜延上壽晚來猶可漱餘酣金英汎濫和雲濕玉液泓渟與海涵擬約柴桑陶處士烏巾漉酒共清談龍藏昔年聞有孫思邈曽遇神龍授異方一夕珠宫開海藏千金寳訣啓天章波濤浩蕩秋無際雲漢昭回夜有光徃徃到城騎一虎山童時復佩青囊兎臼羿后何年奔入月至今擣藥兎長生一泓鉛澒丹鎔就雙杵雲英玉琢成金粟樹邉秋有影素娥臺畔夜無聲𤣥霜肯駐人間景我亦乗橋出太清芝田聞説蓬萊海上洲石田瑤草不知秋安期慣采千年藥徐市曽乗萬里舟丹鳯啄時清露下𤣥龍耕處翠煙浮何當服食尋仙侣直碾飊輪八極遊橘井鑿井仙翁夲姓蘇后皇嘉樹翠紛敷一泓碧甃涵雲母萬顆金丸鑄木奴徳洽人心終有濟泉通海眼不曽枯我今亦抱文園病脩綆何由轉轆轤蛇珠隋侯當日見蜿蜒徑寸明珠射目前孚及豚魚應有自恩沾鱗爪豈虛傳夜光何啻千金直罔象徒探九仭淵聞道鮫人曽泣涙豈容魚目笑真圓雀環雀也當年知報徳至今聞者亦驚猜銜將白玉連環去化作黄衣使者來不是撫摩全羽翼安能翔舞出蒿萊金丸年少那知此楊寳隂功位上台題竹西小隠㧞劔王郎歌莫哀竹西今見畫圖開好尋東閣題詩去更約平山載酒來何處玉簫遺曲譜誰家紅藥有池臺十年一覺揚州夢頭白慙無杜牧才次韻風生長夏不鳴條好雨知時沃翠苖龍女巻雲歸晚洞鮫人推月上秋潮靈槎正近黄姑渚仙馭初回絳節朝藻翰寄來蘇病骨夜凉神思亦迢遙舟至大勝關大勝關前津吏迎南風獵獵動髙旌魚龍水底寒無夢雞犬山中夜不驚在徳豈論天塹險開邦正喜地圖平一鉤月挂西南樹卧聽篙師欵乃聲過焦磯中流砥柱壓金鼇上有神宫結構牢豪傑已隨三國盡精靈猶占一山髙雞鳴海樹朝迎日豚挾江風夜涌濤沿月櫂歌祠下過采蘋無計奠春醪番湖舟中番君湖上雨晴天水氣㝠㝠生白煙賀老無人惟酒舫中郎有女識琴弦故園桃李春如海逺道風波夜似年笑指洪都無百里今宵須並木蘭船左蠡彭蠡之湖深復深月黑夜泊天沉沉波濤時時鬼神㑹風雨徃徃蛟龍吟神禹䟽鑿自開闢篙師徃來無古今千金一壺何足論險易只憑方寸心題鐡柱觀何年鐡鎖貫神鼇勢壓西南一柱髙星象上通呉分野石犀長鎮海波濤百靈呵䕶天樞祕八索綱維地軸牢誰信旌陽千載後𤣥都重見種仙桃贈鐡柱熊道紀鶴髪仙翁養大還紫霞為佩玉為冠琅函有篆丹書古鐡柱無塵寳劍寒鳯闕恩從天上賜龍宫方向月中看我來欲問長生術一曲空歌月滿壇次徐指揮韻賢王開國樹旌幢上將西來鎮大江天上麒麟今有幾斗間龍劍本成雙歌回金縷風生席讀罷青編月到忩頼有麻姑酒價賤興來何惜玉為缸松花餅黄雲掃盡挂猿梢不待嵩陽道士教琥珀鑿崖分石蜜醍醐團雪出山庖寳方應似龍宫得金屑何煩兎臼敲我亦明年尋惠逺采花同訪謫仙巢鄔子茶鄔子岡頭紫筍生寄來蓓蕾見髙情茶經漫學盧仝賦水品長懐陸羽評雪乳滿甌消午夢風濤一榻起秋聲興來便欲逃禪去繡佛燈前坐到明柬僧綱住上人紺園臺殿鬱重重雲去雲來不離峰鶴影毎隨天外錫潮音長和月明鐘一詩何足酬支遁三笑于今識逺公昨日分茶謝相訪絶勝白絹寄斜封午榻春煙試石茶老禪定起具袈裟花飛丈室天埀雨日出東湖地涌沙香積有厨分乳酪藏真無帖掃龍蛇夢中猶記相逢處徐孺亭前一徑斜過南昌縣學柬顔司訓徐孺宅前湖水東隔谿遙見素王宫當階樹影風簾碧近浦書聲雨燭紅寳劍毎瞻南斗氣羅衣初試舞雩風多情頼有顔夫子相見無言意已通答顔司訓見寄次韻神仙中人不易得髙士亭前相見時碧色湖波春浩浩緑隂門巷晝遲遲閒臨醉草池皆墨老擁臯比鬂已絲海内知音今有幾黄金端合鑄鍾期林谿谿上青林林下谿南州卜隱草堂低水生酒舫髙過屋花落樵徑净無泥鄰翁把釣得春鯉童子煮茶聞午雞白頭也欲採芝去好在洪崖丹井西寄杭州侯少府小樓聽雨客京華一月春隂勒杏花泥没長途官馬滑風吹深巷酒旗斜青雲北闕初承詔白首西江正念家寄謝錢唐秋月色好分光采照天涯贈道士道士誦徹蘂珠經雲裳月佩風泠泠養生自鍊千歳藥勸客毎傾雙玉缾松間清籟作琴響竹下嫩凉催酒醒知子能彈廣陵㪚更約月明來一聽題張文顯凝清軒詩巻凝清軒中好賦詩盡収清氣入詩脾千古萬古不常有一人兩人今始知竹裏煎茶風動處琴邉放鶴月來時更歌孺子滄浪曲著我臨流照鬂絲新春有作軒轅吹律鳯凰臺春滿乾坤絶㸃埃一夜星隨天左轉八方風自日東來草㾗向煗安排動花信迎陽次第開白髪野人瞻氣象却從雲采望蓬萊蒼雪堆種得琅玕三百箇當忩飛翠不曽乾潤浮石榻常疑雨清逼田衣故作寒開徑何煩童子掃敲門只許故人㸔若為消得南州熱借我吹笙坐碧壇京中七夕天近蓬萊暑漸凉滿城月色白于霜遙憐此夜雙星㑹只隔明河一水長靈鵲有橋通碧落綵鸞無字到家鄉定知慈母青鐙下暗卜蛛絲坐北堂七夕書懐月臨南斗夜生凉見月令人憶故鄉碧海青鸞空有信銀河烏鵲竟無梁二千里外雙星㑹十二時中九曲腸自笑白頭甘守拙錯將工巧擅文章題金粟軒阿翁手種黄金粟聞説靈根出廣寒此樹想從天上得何年移傍屋前看故山丘壠多喬木若箇兒孫見牡丹好在百年無剪伐露花凉葉自團團題漢水幽居張公江海毎思歸看畫令人説漢谿清夢毎經渝水北白雲多在仰山西脱䙀稚筍年年長返哺慈烏夜夜啼最憶春明花爛漫版輿隨處蹋青泥題聽雪􅌪天寒虛室夜蕭蕭談坐蒲團轉寂寥著樹似兼風葉墮窺簾應雜雨花飄色從白處分明見聲入空中即漸消明日庭前詢侍者不知若箇立齊腰月食四月十五二更初海上涌出白蟾蜍圓于止水懸金鏡闕若清氷碎玉壺黒處山河還復正明邉桂樹不曽枯中庭額塌泥沙拜蟣蝨微臣本姓盧敬賜内侍竹谿道人蔣康之詩巻昔聞蔣詡開三徑今見此君臨一谿月色倒流天上下秋聲多在屋東西路從翡翠巢邉過詩向琅玕節下題好約仙人吹鳯琯髙閒長共碧雲棲和友人紀行之作燕山雪花大如手飛繞天家十二闌白戰詩成貂帽濕黄封酒醒毳袍單巴人誰和陽春曲學士應分小月團年少相如最能賦梁園宴罷日三竿送呉孝廉分題得石井白石井頭桐始花山瓢春水當流霞仙人縮地今無術孝子看雲正念家聲轉轆轤腸欲斷夢回天柱路應賖好分一勺髙堂上駐景還同葛令砂輓祭酒胡儼母徐恭人蕭峽何年輓鹿車恭人懿徳滿京華瀧岡表出歐陽氏太學文傳祭酒家夜月琴牀悲别鶴秋風宰樹感慈鴉梁園一掬宗人淚灑向北堂藼草花贈庸信菴上人建盧大夫橋大夫橋頭波浪濶行人那得渡浮杯騎將碧海鯨魚去移得青天螮蝀來野曠最宜呼月出水髙應不礙㠶開豈無一片三生石著我談空坐碧苔寄奉祠李光與公契濶已多時媿我耽詩老更癡失馬翁歸還自得亡金郎在不須疑曽從塞北多竒約重向江南話所思一曲陽春真寡和瓊瑤何以謝相知七言排律早朝詩次韻千官聽徹午門鐘咫尺蓬萊有路通山色漸分宫樹碧日華微映御袍紅九成樂奏龍光近萬歳聲傳虎拜同湛露潤浮天上下卿雲晴繞殿西東舍人書詔臨丹扆内侍傳宣出紫宫冉冉鑪烟凝几席重重花影轉簾櫳時當元首賡歌際春在康衢化育中已覩文章資黼黻更思旒纊蔽明聰豈無良牧如龔遂應有儒臣得馬融想見朝回封事少上林吟徧百花風送李山人還富春北山佳氣翠冥冥南渡衣冠識地靈龍穴雲歸晴作雨蚌潭珠出夜如星承聞先世傳遺澤復見諸孫守一經空谷白駒何皎皎前朝宰木尚青青騎鯨仙去長懐李化鶴人歸或姓丁進履好探黄石洞吹笙還過赤松亭正期歳晚尋瑤草應許天寒寄茯苓他日鳴騶來入谷待余重勒草堂銘題李草堂墓誌螺川東去水冥冥落日烏啼宰樹青三徑就荒陶令老衆人皆醉屈原醒錦袍仙去空懐李華表歸來或姓丁遺墨尚存封禪稿高風誰築聘君亭如公我亦悲先哲有子天教得寜馨百世幽光應不冺草堂長近少微星送歳貢生九重宫闕倚天開丁夘年中貢士來晴雪半消鳷鵲觀春風先到鳯凰臺成都司馬真能賦太學何蕃信有才仙仗趨朝聨鷺序神珠照乗出蛟胎熖光二丈應燒杏離思重歌當折梅忠孝致身須努力泰階平處是三台閏月九日擬邀秫莊清友今年九日兩登高小雨生寒著苧袍擬約故人將進酒空懐吏部左持螯治安有䇿長沙賈投老無錢處士陶萬頃滄波鷗在渚九天清露鶴鳴臯安排節物饒佳况斷送生涯藉濁醪心悦故交真有託足聞空谷可能逃多才豈愧凌雲賦清論須焚繼晷膏朝日團團行苜蓿秋花采采勝緋桃盤餐未必兼熊掌文采于今見鳯毛竒絶千年金莫鑄歌長一曲繭頻繅鷓鴣香煗鑪堪爇鸚鵡桮深手共操漫道太行多覆轍從教滄海足驚濤蕭蕭短髪慙烏帽秩秩初筵叙燕毛學圃一經甘寂寂詞源三峽任滔滔可容行李催歸櫂須看真珠壓小槽古徃今來同酩酊風流端合属吾曹送上竺隱箕山法師五天竺國前朝寺八十三年出世僧月下眼能看細字雲中手不拄枯藤天厨甘露朝朝飯丈室生花夜夜鐙鹿苑證成無上覺牛車説破最初乗春深又送花間鳥湖水都消雪後氷明日逺山遙在望上方臺殿翠層層送靈隱明性菴禪師西還隻履已多年一派曹谿有正傳涌出上方為寳所飛來小朶落青天獻珠龍去長聽法合掌狐來或問禪麈尾暫停雲外錫袈裟又上月中船松華餅試清明後石鼎茶分穀雨前無計可留支遁馬有詩須寄薛濤牋斗南老人集巻三
