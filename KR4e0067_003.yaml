body:
  text: 斗南老人集卷三明胡奎撰五言律詩埀虹亭晚泊泊舟埀虹亭水氣秋冥冥泛濫露浮白依微天倒青鐘聲臨水度漁唱隔林聽賴得知心友因傾雙玉瓶池上池上坐來久風荷雜雨聲林虛容鳥度水動見魚行意愜理無忤神間苧亦清裴回不知晚有待月華生秋日喜雨驚雷初動地甘雨最知時石有交飛燕田無再坼龜稻花齊覆水荷葉亂翻池早賽雞豚社秋成信有期秋後三日得雨立秋三日後好雨應時來豈但農心悅頻消旱魃災風雷生白晝河漢洗黃埃擬撰豐年頌慙無冠世才登大悲閣日照紺園秋登臨閣上頭雲隨飛鳥沒天入大江流華蓋瞻雙閣金沙見十洲龍王宫裏月夜夜白蓮浮過揚子江雨過大江秋蒼茫一葉舟鄉心隨去鳥旅夢學眠鷗水與天同色雲兼月共流誰家歌楚調令我不勝愁出揚子江出江風力便買紙賽龍君篷響渾疑雨帆髙不礙雲地維從古險天塹此中分漸近金山寺踈鐘水上聞春日東園即事旭日上林扉餘寒入苧衣傍闌移芍藥編竹引薔薇野興同誰領間身與世違多情雙燕子重覔故巢歸東園雨晴即事兼旬積雨聲旭日弄初晴花上野禽語竹間萱草生煮茶尋活火臨水濯煩纓門巷無車轍陶然少俗情移芍藥去冬移芍藥日日待花開屈指到三月傍闌看幾回露花滋繭栗春色滿池臺不學魏家紫兒孫無地栽挽郭子振閣淚強裁詩臨風詠白圭憑棺猶有僕屬纊竟無兒只道歸全璧安知夢一炊我來松樹下哭到月明時挽曲江友人羅剎江邉賦慈恩塔上名杏園春寂寞槐國夢分明酒進杯留影詩傳畫有聲哲人今已矣無復見升平送百户徐叔之甘州烏啼城上頭白髮夢甘州自是勞行役非關好逺逰邉雲隨雁落河水帶氷流萬里無烽燧功歸定逺侯送人歸黃巖黃山高徴士白首解窮經里巷聞弦誦兒童識姓名藝忩山氣暝竹簟水紋清更有佳孫子芝田産玉英送人還越間居多種竹開徑接羊求老去便孤嘯詩來遣百憂鵝羣翻墨沼兔頴滌氷甌每有登臨興憑闌望越州題畫小雨落桐英羣峰出晚晴樹藏茅屋小溪漲野橋平童去因沽酒船回不到城此中真可隱亦足慰吾生春思脈脈動春思臨鸞懶畫眉喚人間鬭草分子共敲棋舞倦羅衫重歌長玉漏遲纎腰如弱栁渾不似當時食新鮓海鱭出銀濤長於金錯刀未書裹鮓帖先壓真珠槽一笑出竒味數杯慚老叨醉歸詩有興坐剪燭花髙寄震龍門和尚最憶龍門老高情似逺公胸藏千畝竹手植萬株松林晚牀留虎溪涼鉢引龍玄關須一扣莫遣白雲封安平池子上不到十餘年石老三生夢茶枯一味禪澗泉通屋下山雨落尊前我亦除煩惱還來了勝緣山臨此地平不改舊時青雙塔雲中見孤鐘雨外聽苔深松有甲笋長竹添丁料得無多事觀心即是經送雲季昭夫子才名重丹山出鳳毛九年三閏月千載一蟠桃閶闔青雲近蓬萊紫氣高單羅秋水色裁作上官袍挽友人妻李氏結褵從少艾屬纊在今朝寶月空鸞鏡銀河斷鵲橋湘靈安可弔楚些若為招間却黃金剪誰縫白苧袍送陳知縣之建昌三年登太學一日宰南康白鴈連淮逺青山入楚長燈前慈母線花下故人觴儻有南來使因風寄數行秋夜懷友朗月生瑶浦流雲度絳河微涼通海氣清籟落空歌過鴈分明見飛螢即漸多有懷人不至孤影倚松蘿冬夜有懷柴門掩晴雪户外無俗駕悠悠懷故人寂寂坐終夜凍雲歸逺浦朗月生虛榭古意寄氷弦何由共清話挽一臂和尚山頂白雲層重來不見僧人多收舍利誰與續傳燈謾説三番呪徒聞最上乘裴回雙樹下何處覔南能幽棲二十年足不到山前麈尾風生海軍持月浸泉字留懷素草社散逺公蓮無復論三昧唯應上五天舟中懷友人白頭人已老同約不同遊寒食他鄉酒春波各自舟見燈思越語聞櫓待吳謳安得須叟見令人散百憂夜泊長江上何人笑語同月依臨浦樹雲逐渡江風短髮明燈下浮生大夢中却憐河漢水咫尺不相通舟中舟行一水間同泊大江灣白見初生月青憐已過山有家形老夢無酒慰愁顔仰覩雲霄上冥鴻不可攀過小姑靈峰倚玄穹古殿繐帷冷雲霞冠陽岡雷電蓄隂嶺憑高鬼神會直下魚龍靜王事有嚴程無由登絶頂美妾換馬掩淚整花鈿當階卸錦韉徒誇珠絡臂不及玉連錢一笑千金直長鳴萬里天明妃青塜草遺恨寄嬋娟題張真人畫生絹才一幅云是上清來過雨晴猶濕歸雲晚不開神龍回洞府老鶴識樓臺擬著芒鞋去躋攀紫翠堆初夏快雨知春盡鳴禽覺夏初日高槐影直風細竹聲踈簾靜惟留燕池清足養魚間居無雜事點檢篋中書送馬公肅之潁川讀禮三年後張帆十月初千金司馬賦八法右軍書逺道無來使空山有故廬持竿東海上只釣北來魚題永思堂愛日情無已終天志可哀每於堂上見多是夢中來氷鯉空朝饌寒烏靜夜臺十年餘手澤不敢向人開送崇德縣簿之京溪明秋水涼百丈出回塘帆影衝南斗鐘聲别上方三年傳美譽千里沐清光想見回艫日青袍雨露香春山煙雨春雨不作泥春林布穀啼山頭煙羃樹溪上水平堤翳翳巖花重蕭蕭澗竹低平明看野色騎馬過湖西舟中積雨一雨復一雨渡江重渡江風雷自動蕩水石相衝撞月影忽墮地雨聲猶在忩間愁千萬斛安得酒盈缸舟次番湖風順雨晴柬同舟李紀善潮落大江開春流碧似苔沙明分島嶼山逺出樓臺白日千帆過青天一鳥來同舟李供奉真有濟川才題青山讀書圖咫尺出林下翛然一草亭雲歸天姥白山落鏡湖青月色當忩見秋聲隔樹聽柁樓如有約來寫換鵝經城東獲野鹿城東四月交野鹿走林拗本是歸靈囿何因出近郊生無青澗飲死有白茅包猿鶴同驚怨􅊯􅊯失故巢五言排律五月一日千秋節鳯厯紀初元龍飛御九天賢王開大國宗社鎮長年東井回羲馭南風入舜弦階蓂晴散雨宫樹曉凝煙樂奏彤庭上班齊紫殿前鳴珂穿栁過清漏隔花傳律應蕤賔節星當翼軫躔菖蒲浮玉醴葵萼照瓊筵自愧龍鍾老叨陪雁序聯願言安社稷餘慶福綿綿送褚項民之京閶闔青天上蓬萊紫氣中六符隨斗轉一水與天通子抱才華去人稱翰墨工按圖真得駿戲技匪雕蟲𣲖接河南逺羣超冀北空壺分官酒碧衣映苑花紅歲月淹行李江湖念轉篷暫辭金馬直歸拜白頭翁祿養嗟何及交情恨莫窮兒心徒耿耿王事且匆匆解纜潮初起停杯曲未終秋聲今夕共月色異鄉同伐木歌鳴鳥揮弦送去鴻忩間辟螙草池冷換鵝籠慎勿誇燕石須令得楚弓詩成何限恨吟遍木犀風送雲季昭有美雲夫子河間好弟兄多才諳世事一見遂交情竒論諸生服雄談四座驚夜吟催燭換晨講候鐘鳴鑿井思泉及為山待簣成圖探河馬祕書贊洛龜靈禮重春秋祀名高月旦評厯經三閏月天轉九周星逺近皆知化西南喜得朋廣文延鄭老同舍識袁宏春郭花邉酒秋忩雨外鐙字臨懷素草詩寄剡溪藤踏月多尋友看雲或訪僧襟期恆坦坦履踐必兢兢相見嗟何晚先生自此升治安須賈誼授業望陽城祖道歌初發炎天暑尚蒸片帆懸碧落斗酒醉金陵阿閣思巢鳯天池擬化鵬壯懷今若此離思祗難勝晝漏趨青瑣秋河近玉繩榜看題後墨壺出賜來氷太乙珠聨緯蓬萊翠作層河清還獻頌旭日在觚稜患眼偶述幽居氣鬱蒸病眼偶相仍翳翳如迷霧熒熒若亂星無愁眵滿睫不泣淚交膺晨起羞看日宵眠怕見燈金篦那可刮銀海若為澄爽憶銅盤露寒思玉井氷但令心似水寧望酒如澠歡伯從今斷仙方信莫慿披襟從放浪散髮任鬅鬙白葛巾休裹烏皮几暫憑坐須臨水竹行必倚山藤即遣三尸去非關五色瞢宗之元自白阮籍本來青才匪張司業詩慚杜少陵揮毫聊自慰持以謝良朋擬呈無為真人二十韻上界金為闕蓬萊玉作城日行黃道正星列泰階平堯帝尊巢父軒皇候廣成真符傳世久公衮賜衣榮屢遣皇華使遙迎碧落卿竹宫祠太乙桂殿禮通明班出三台立身先百辟行琅函宣蕊笈瓊醴進霞觥河應千年潤嵩呼萬歲聲飊車回絳節霜匣祕蒼精鳬墜雲中舄鸞吹月下笙山林皆動色猿鳥亦知名枸杞山籬晚芙蓉野岸晴極知詩有思誰謂道無情草聖超懷素傳家過伯英書籖森戢戢琴石立庚庚梵氣開三景玄風被八紘鴻猷資化育鯨海望澄清曼倩偷桃者安期采藥生金丹如可賜凡骨灑然輕柬知縣陳善方有美東曹彥科名四海傳長身片玉立髙論大河懸慷慨千人俊驅馳萬里天賀蘭西入夏渤海北通燕劍拂邉霜重弓開壠月圓文章韜虎豹羽翮鎩鷹鸇太華雲隨袂長城雪擁韉黃河秋汨汨黑水夜濺濺旅夢雙胡蝶鄉心五杜鵑倦彈賔館鋏飢囓漢臣氊寒谷空吹律焦桐忽斷弦淚乾慈母線囊澀水衡錢遂感王門召惟應國士憐所蒙稽古力幸免枕戈眠講殿陳韜略經帷侍簡編名從西域播詩到外夷傳天地重開闢人材肯棄捐詞林翔鸑鷟學海起蜿蜒飛動關元氣涵濡及逺邉青雲瞻象魏紫氣應龍泉士論爭推擇王言益勉旃龍香濡露頴風藻濕雲箋杕杜勞還役蒲萄賜别筵玉關歸定逺銀漢送張騫君命不俟駕祖生先著鞭我知清白吏人迓孝亷船大藥丹初就盤根節愈堅郎星吳分野宦轍漢山川蘭秀仍藏谷珠明必媚淵有家供滫瀡無夢屬櫜鞬潘縣花無數莊椿壽八千炙分黃雀美鱠切白魚鮮忠孝原如此升沉合自然錦衣行白晝采服稱華年下榻懷徐孺銜杯笑鄭虔羣黎勞撫字多士荷陶甄暑雨清炎瘴秋禾滿大田紅收鸚鵡粒青爇鷓鴣煙自笑雷鳴缶深慙雪滿顛續貂吾豈敢聊以致拳拳上虞太守有美金閨彥才名海內多古稱清白吏今尚孝廉科日照黃金節風鳴白玉珂弦歌傳魯頌書法擅虞戈燕寢嚴兵衛賔筵設禮羅清尊開北海烏舫載東坡欲拜車塵下其如鶴髮何未隨童子馬先辱右軍鵝學比雷鳴缶文慙鳯擲梭願公施化雨留意育菁莪雲門樂八風開槖籥一氣運鴻濛黃屋尊堯德玄圭錫禹功干羽三苖格車書萬國同醴泉從地出甘澤與天通電繞星樞北春回夀域中雲門齊奏曲彤管紀時雍明月篇湛湛復盈盈當秋徹夜清直疑天有塹却訝水無聲隱約箕邉起依微斗外橫氣浮華蓋動光映泰階平東去遙通海西流淡挂城擬乘蓮一葉萬里泝空明聖壽無疆詞至德乾坤大重華日月光羅圖今有兆寶厯永無疆瑞鳯來丹穴神芝散玉房九重春蕩蕩萬國海茫茫玄圃安期棗瑤池阿母觴小臣歌盛世何幸際明良太平樂玉帛來王會山河拱帝京日行王道正星列泰階平人醉笙歌地山圍錦繡城宫花留舞燕御栁著啼鶯蠻獠全歸化羌胡已罷兵願言封禪稿虎拜頌河清樂未央天臨丹鳯闕日上翠雲裘社稷安如堵君王百不憂鵲鳴宫掖曙雞唱禁城秋白玉裝車軸黃金絡馬頭鈞天聆廣樂丹扆儼埀旒此樂真無極洪恩被九州朝宗引海郡同歌舞神人共贊堯有天皆入貢無地不來朝玉燭調元氣璇璣運斗杓六龍高扈駕五鳯夾吹簫瑞應清河頌歡騰擊壤謡翔南聲教逺干羽格三苖百獸舞飛動關元氣音聲感至和石當蘷擊拊琴協舜賡歌海內文麟出朝端振鷺多蹌蹌隨列仗肅肅動鳴珂玄圃生朱草丹山産玉禾萬方無一事多士集鑾坡沐恩波綵鳯銜圖日金雞放赦時恩波寬似海天語出如絲雨露埀丹扆風雲會玉墀沾濡涵宇宙渙汗被華夷金鏡千秋録瑤池萬壽巵朝陽有靈鵲長占上林枝蒼龍闕鴻龍排絳闕象魏闢金扉太乙昭黃道勾陳直紫微蜿蜒扶日上夭矯挾雲飛望拜千官集柔懷萬國歸春班隨仗入午漏隔花稀願奏虞廷樂長瞻黼黻衣鳯凰城旭日麗金城祥雲護玉京九重雙闕近五采百花明縹眇瞻飛蓋葳蕤見折旌瓊林生竹實粉蝶墜桐英阿閣思重見岐山待一鳴伶倫裁律吕九奏協天聲何本先以天香茶見惠奉賦一首金粟與金芽都收陸羽家候雷春采葉和月夜分花暖焙筠籠火涼敲玉臼砂比圭方