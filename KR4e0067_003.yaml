閣凌空十丈髙倚闌南望際鯨濤天花㪚處皆金地海月生時見玉毫夜氣澄清龍在窟秋聲蕭爽鶴鳴臯丹梯咫尺諸天近香霧霏霏濕苧袍壽張河泊三山紫翠壓金鼇琪樹英英長鳯毛正月江南春意早明河天上使星髙王喬應下雙飛舄方朔曾偷兩度桃醉把流霞喚鸚䳇風吹花氣滿宫袍春日即事草堂長日無車馬雨後空階長緑苔已見梅花當戶放更移藼草近忩栽引雛沙燕時髙下作伴江鷗自徃來物色於人俱適意詩篇吟罷共誰裁鏡中梅日上綺忩啼翠禽臨鸞㸃額曉寒侵一泓自照春風面百鍊方知鐵石心白玉臺前憐影瘦黄金礦内覺情深錦囊収拾餘音去月落空閨何處㝷滴翠軒武隆山下望晴暉嵐氣濛濛翠欲飛龍帯晚雲歸夜榻鶴翻朝露濕秋衣石窪承溜泠泠㵼水樂懸崖㸃㸃稀恰似匡廬招五老屏風九疊䕶霏微遊葆真觀百尺飛樓接帝青非烟非霧入冥冥雲間雞唱朝迎日海底蛟眠夜見星函谷有關瞻紫氣蓬萊無地問丹經道人肉重不騎鶴一曲空歌醉復醒黄鶴一去不復返紫陽有孫能學仙蓬萊如隔三千里萍水相望四十年煉就大丹金作鼎種來靈草玉為田無端四月枇杷雨不共青鐙一醉眠蓬萊東畔是仙家旭日蒼凉絢紫霞門外黄塵皆海水忩間青鳥識桃花閒㝷墨沼來題竹擬借丹鑪學鍊砂千歳安期吾有約他年同喫棗如𤓰苦熱溽暑經旬嬾出門風亭水榭亦昏昏徒聞露下黄姑渚漫想氷生玉女盆筠簟不教眠得穩蔗漿猶覺飲來温故人病起應相憶何日從容共晚尊寄樞上人上人年少解言詩應是前身本姓支多病養成丘壑志學書臨得廟堂碑蘿忩翳翳雲封屋繭紙重重墨滿池想得山中三日雨煑茶煙起落花時次韻黄花翠竹帯清谿方外詩名恵逺齊鐵鉢夜分鯨海月袈裟晴汚燕巢泥三生石上今重見百丈峰頭擬共躋聞道御前宣教㫖天花如雨㪚龍墀支許論詩已有年還同食蜜味中邉題名正喜芭蕉冩入定從教薜茘纒暮雨踈鐘髙閣外秋雲短錫故山前相過只説無生話似覺浮生絶世縁柬直方居士髯翁經夏稀相見絶愛清容似我兄好采紫芝娱晚景更栽紅杏待春耕長安女子應知姓廬阜仙人早得名從此草堂三日雨相過莫厭緑苔生自笑讀書長閉户毎逢清友即同遊柴門可是妨人掃斗酒還能與婦謀任爾雨晴來看竹從渠雪夜竟回舟風流此意誰能識頼有忘機海上鷗墨池昨夜水生波換得山隂道士鵞盖世文章今有幾傳家書譜已無多休糧服得霞千片握髪盤成雪兩螺擬借白雲分半榻醒時言笑醉時歌鶴背東來不待招雲裳霞佩思飄飄語言已覺無煙火襟度還能振泬寥近海玉樓天不逺當階珠樹雪初銷此中别有箕山趣莫為風聲即棄瓢采蓮女小小蘭舟櫂晚凉雙雙新浴錦鴛鴦舞回葉底春無力笑入花間水亦香妾恨恰如蓮菂苦郎情應佀藕絲長娉婷却笑東家女換得明珠論斗量鞵山一葉青蓮墮碧波美人不見奈愁何天邊有月羞弓様水底無塵汚襪羅五老著來雲氣濕小姑行處露花多足音未許人間識蹴蹋風濤幾度過曽憶蘭舟問二姑何年隻履墮晴湖滿江波浪流不去小龍女兒穿得無只許足音聞谷口不教蹤迹混泥途至今想見凌波襪隔水盈盈不受呼送徐千户之甘州春寒初試越羅袍不惜千余買寳刀馬援槖中無薏苡張騫槎上有蒲萄崑崙西去黄河逺函谷東來紫氣髙何事相逢又相别隴雲邉月夢勞勞春日東園即事小園今日春意動風目正東來草堂萱草漸抽書帶綠栁條都酸麴塵黄鳥聲近屋啼偏好雨㸃沾衣濕不妨穉子下階頻指㸃去年種竹已過墻東園檢㸃舊生涯春色多情到我家穀雨前頭移菊本清明時節看梨花但求北郭多収秫何待東門更種𤓰今夜月明吹玉苗笑呼兒女進流霞寄東岡賈徴君三月三日雨晴初東望東岡無鯉魚杜陵愛酒自多債太傳治安還有書洛中牡丹少閒地江上燕子識吾廬木蘭丹擢桃花水頗怪近來蹤迹珠東園春日檢㸃小園無别事清晨汲水自澆花薔薇碧引風前蔓芍藥紅抽雨後芽可是野情忘世故正縁春色属詩家山僧野老時相遇分送菩提寺裏茶寄硤山人碣石巖前有隱君草堂分得半間雲兩湖月色當窓見萬壑秋聲隔樹聞墨沼寒通丹井水銀牀暗䕶紫苔紋此身迥出烟霞表長倚青霄㸔鶴羣除夕憶京中小弟明朝嵗事又更新應簉鵷行拜紫宸鳷鵲觀前還見雪脊令原上况逢春花占蠟炬憐今夕酒進屠蘇少一人池草夢中深念汝寄來詩句莫辭頻雙孔笛混沌誰分濁與清鑿開空翠太分明有聲本自無聲出二氣還從一氣生碧海水寒龍並語瑤臺月白鳯諧鳴依稀黄鶴樓中聽吹落梅花雪滿城過貢秘書墓只今學士總奔波不似先生葬薜蘿眼見蓬萊成海水身騎箕尾上星河開元供奉江南少天禄詞臣地下多回首敬亭秋色逺山青雲白奈愁何西翠樓為郭醫作北郭仙人十二樓好山多在屋西頭凉隂晚送忩前雨爽氣朝迎笏外秋翡翠半簾分太華鳯凰雙琯下崑丘安期定有如𤓰棗我欲相尋海上遊輓髙處士阿翁手種春松樹預卜佳城已十年將老便尋身後計有兒能守墓傍田晚凉就竹安茶具春水當花放酒船如此風流今絶少一回西望一澘然憶昨相尋髙處士回舟醉蹋蕅花風三年别夢來谿上一箇閒身在墓中故老只今俱寂寞浮生方信是虛空哀歌冩罷緘雙淚秋葉離離夕照紅失鶴仙人騏驥誰能馭鍊得丹砂頂漸紅不見將軍來射石却瞋童子慣開籠夢閒一曲滄洲月聲斷三山碧落風從此竹林無伴侣洞簫吹徹綵雲空賦恵山泉送張徴君之無錫徃年曽識恵山人遺我靈泉一味真水品評來稱第一茶經著就已千春也知陸羽曽分汲信有梁鴻共卜鄰此去茅齋休煑雪山缾還許寄來頻題倪元鎮畫徃年曽訪天隨子煙樹微茫過太湖雪色寒鱸臨水買翠毛春鳥隔林呼只今圖畫渾相似如此家山住得無皎皎白駒空谷裏令人搔首憶潛夫立春雨今朝占得正東風春在江南好雨中六琯氣從温室候八方雲與泰山通調和草色相將緑沾灑花枝取次紅茅舎一瓢生菜酒自題春帖紀年豐過呉江江上凉生白苧袍荻花楓葉晚蕭騷長虹飲澗天在水怒雷劈山風送濤地勢混茫通九澤風流今古屬二豪収㠶暫向楓灣泊喚索呉姫壓小槽第四橋頭夕照紅収㠶買紙謝龍公酒從今夜賖明月船待來朝借順風樹色蒼茫晴雨外江光明㓕有無中今來古徃東流水無限閒情逐去鴻和友人韻西望東岡首重囘菩提山在白雲堆烏衣燕去無華屋碧眼僧來有刼灰徃事茫茫何足較流年衮衮莫相催梨花又過清明節載酒無由得蹔陪和黄應奉巧夕書懐涼雲如練坐來収此夜家家望女牛列宿總隨天北轉明河不共海東流銅龍漏轉三更月白鴈聲傳兩地秋笑卜蛛絲慿逺信有人相憶鳯凰樓夜坐翫月紫薇花滿月團團今夜三更最好看碧海飛來銀作闕青雲髙處玉為盤蛟龍應有含珠淚兎臼寜無換骨丹獨據胡牀吹短笛苧袍風露不勝寒江上三湘南去别情多不唱呉歌唱楚歌夜雨滴乾斑竹淚春風吹老白蘋波瑶琴誰和巴人曲錦字空勞織女梭却喜沅陵酒價賤愁來猶得遣詩魔九日和應先生韻白髪秋深莫浪悲有酒且醉髙陽池百年知幾從古少一日不見令人思醉來子細看萸佩興劇風流歌柘枝洪範橋西浣花老得錢相覔肯教遲悼斷臂禪師禪機山頭一臂禪幽居長在白雲邉已超世網三千刧不出山門二十年壊衲朝陽松下石春茶活火竹根泉法身畢竟無來去隻履還應到五天遊雞鳴寺夜半雞鳴海日紅慿虛涌出梵王宫紺園樹色朝含雨寳塔鈴聲晝撼風飛錫神僧西域至㪚花天女上方通曽聞翠輦登臨處御墨留題紫翠中送杜𢎞道之㐮陽西閣餘寒入毳袍一尊送别思勞勞路逢寒食花偏好船壓春江水正高漢女隄邉歌芍藥習家池上醉蒲萄穀城令尹如相問為説劉郎又種桃寄宋紀善錦里先生两鬢絲曳裾天府際昌時經筵虎豹分重席墨沼龍蛇見大旗白雪久傳梁苑賦清朝新覩漢官儀揮弦頼有知音在欲把黄金鑄子期和賈徴君韻不見故人今半年寄我好詩情緒牽朱弦泠泠有古調玉樹濯濯當春妍前身可是韓京兆此地曽逢賈浪仙夢繞鐘聲寺前月推敲兩字至今傳憶昨放舟相見時繫䌫宅前楊栁絲别來晴雲碧冉冉看過秋葉紅離離茶煎雪水同誰喫書到柴門有夢知晴日半忩初睡起水仙花畔和君詩想見南忩日上時硬黄繭紙冩烏絲兎敲玉臼丹應就蛇避金尊影已離司馬時多文字渇伯休誰遣姓名知流年又及春盤菜一度停雲一賦詩次郭先生韻南郭先生久不來草堂日日向南開筍已長成髙過竹花都狼籍半為苔渴心誰慰病司馬詩債先償麴秀才聞道放舟苕水上看山自倒白螺桮次復柬先生紀行之什丹鳳銜圖振羽儀六龍扶馭躍天池紫垣月轉通明殿黄道星環太乙旗寳鼎香烟穿栁細金壺漏㸃出花遲相如詞賦真無敵行見成都駟馬馳清朝文軌萬方同人在金甌覆槖中五色絲綸頒鳯闕千年珠貝出龍宫碧桃紅杏當霄見若木榑桑與海通寄謝紫薇山下客窮經慎勿歎頭童未明司鑰啓晨閽冠盖如雲謁九門百谷水歸東海大八方星拱北辰尊雞鳴紫禁宫花合馬度金河御栁繁此日儒冠䝉錫賚白頭歌詠荷洪㤙晨興七寳山有作晨起登髙望八荒金霞承日上榑桑潮頭白處騰蛟鱷天目青來舞鳯凰萬井人家煙漠漠諸天覺路海茫茫長齋繡佛心如水消得梅花昨夜霜題瞻雲圖望望髙雲不可攀鄉心都在畫圖間門前白處皆苕水屋上青來是弁山食禄正思三釡養買舟未省幾時還狄公勲業遺千載莫待馮唐鬢髪斑送楊判簿攷績如京我識關西好子孫河源九派出崑崙半生華髪頻看鏡秋夜黄金不到門一曲離歌心事逺三年政績口碑存無端又向明朝别手把茱茰泛緑尊送黄將軍分鎮台城夜半雞鳴海日晴將軍東指亞夫營山臨華頂天逾近星應台垣地最靈總道張騫曽泛海况逢黄石共談兵冬來若有長安使只寄黄精與茯苓海昌八詠海門洪濤一花初起白龍堆萬騎長驅石壁開碧海有山都是雪青天無雨只聞雷秋髙鴻鵠排雲去夜静蛟龍出穴來借問乗槎向何處五雲咫尺是蓬萊五祠古檜靈祠雙檜鬰䓤葱秀色渾如在魯東竽籟半空來鳯吹波濤中夜撼蛟宫碧雲團盖天門近翠霧當忩日觀通㑹有神明扶正直竒材真與棟梁同紫峽秋雲兩峽亭亭拱翠微白雲漠漠澹秋暉飛騰碧落從龍去㸃綴青松待鶴歸夜度鐘聲來梵閣朝浮嵐氣濕僧衣㑹須化作商家雨可是無心出岫飛顧況書臺紫㣲之峰林壑幽顧況臺前曽一逰千年古寺白雲外一箇長松丹井頭僧借繙經凉月夜童來掃葉夕陽秋明朝别後登臨處惟有書聲雜澗流葛洪丹井聞道仙人句漏令燒丹此地學長生林光毎㪚金銀氣石髓猶含日月精仙藥九還為白雪靈泉一勺勝金莖不須更借三山鶴便碾飊輪上玉京安國禪燈白頭僧説唐朝寺舍利猶存率堵波師子座空無所住犀牛扇破竟如何燈懸海月慈光近鐸振天風棾唄多最愛平原好孫子時來坐石看曼陀張許雙廟睢陽太守清源令衮冕巍巍共一祠節重長淮堅守日功髙靈武中興時汗青不冺忠臣傳太白長懸大將旗聖代春秋嚴祀典祠臣鵠立見光儀虹橋夜月渴虹飲澗不曽収化作飛梁卧碧流銀漢水分天上下白蓮花出海東頭鶴歸華表吹笙夜龍獻明珠解佩秋載酒長安三十里醉呼鸚鵡更停舟寄峽川楊司征我愛關西好孫子紫微山水足遨遊千家樹色雙峰曉萬壑鐘聲六寺秋漁唱樵歌通檇李龍光劔氣属揚州老夫儘有登臨興載酒能來倚暮樓立春申年春自申時到萬物申申總向榮南畆已沾三日雨東皇能賜一朝晴厯頒夏正乾坤大斗指寅方海宇清白髪野人瞻氣象五雲髙處泰階平題