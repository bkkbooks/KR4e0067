body:
  text: 斗南老人集卷五明胡奎撰七言絶句簡員外張士諤畫省題詩白晝閒春寒繫馬百花間船頭載得官缾酒來㸔江南雪後山題揚州翫月圖好月多情不待招滿江風露夜迢迢分明記得揚州見只欠瓊花與鳳簫蔡河聞鴈白鴈南來第一聲蔡州城畔最多情閨中此夜應聞得不道郎行到汴京題鉤勒竹誰冩南唐金錯刀秋風葉葉動林皋湘靈昨夜雲中過吹落丹山白鳳毛題雙蠏圖公子無腸玉作膏畢生偏稱左持螯畫中偶見十六跪正及黄花秋興髙題紅梅葛洪井畔是仙家鍊得芙蓉伏火砂玉骨年來都蛻盡不須更服海東霞題釣魚圖萬里清波一鏡開白鷗分占石磯苔客星只在桐江上若箇閒人釣得來題桃花流水圖為劉山人作一片飛花水上頭九盤十折澗中流胡麻飯熟千年後卻笑詩人也姓劉輓員外張士諤二仙坊裏張員外頭白相逢只論詩今日過門君不見小樓春雨燕歸遲西子湖頭碧草春天留山水葬詩人老逋泉下應相見為説梅花冩得真題雪峰湘妃廟前江水深鷓鴣夜啼斑竹林峰頭積雪髙千丈不隔思家一寸心郎家住在雪峰前湘水湘雲若箇邊一片布帆儂㑹使浪平風靜早回船避暑圖五月芙蓉水殿涼紅綃新製舞衣裳班姬不用題紈扇咫尺階前玉樹霜題雞冠昻然綘幘倚東闌絶勝丹山五色翰想得飛鳴天上去玉皇分賜紫霞冠閏三月清明今年又改清明火此地重㸔一月花多費酒錢三十日儘留春色在詩家題髙士聽琴圖一彈太古無絃調只有柴桑處士知回首蒼梧呌虞舜南風何日到朱絲東園晚興雨晴階下㸔宜男自汲清泉漱晚酣隊隊雲收天一半纎纎月在屋西南題武夷圖武夷何處覔仙蹤一一林巒紫翠重世祀乾魚真可笑最髙應是大王峰題黄鶴山人畫竹黄鶴仙人去不返可恨此君相見晚髙堂六月生秋風見畫令人意蕭散漁舟夜月水底青天洗玉盤一蓑風露夜生寒鷗波不動明如鏡此處停舟最好㸔聞樵笛㸔罷仙人一局棋自將短笛晚來吹白雲遮斷無尋處正是東山月上時題繫馬圖日日黄塵淹馬足誰能占得午隂涼天閑芻豆無多戀好解青絲八尺韁題蕨一拳打得地皮穿握住東風不放拳直待杜鵑啼血後展開鳳尾始朝天題銀杏雙鳩圖鴨脚葉青銀杏肥雙鳩和夢立多時日長庭院無人到呼雨呼晴總不知題枇杷山鵲圖翠衿丹嘴雪為衣立在盧家雨後枝不是少年金彈子一雙來往莫相疑題梅花白頭公圖誰冩羅浮夢裏雲飛來山鳥意相親傍人莫笑頭如雪占得江南第一春題桃花山鳥圖楚楚山禽好羽衣小桃枝上立多時樹頭樹底無金彈且向東風自在啼夏日偶成雲氣晚従簾外過雨聲涼傍竹邊來魚波小簟清如水北牖南窓面面開題紅梨花玉容寂寞倚東闌偷得瑤池换骨丹昨夜酒酣銀燭短綘綃和月䕶春寒題紅梅為樞上人散花天女玉姢姢飛落維摩丈室前可是嫣然通一笑自緣醉裏學逃禪題雲山圖雨洗千峰栝樹青飛泉落澗晚泠泠仙家只在雲深處長伴天邊處士星若説揚州吳分野好山只數越中多括蒼洞口分明見染出波斯萬斛蠃秋夜髙栁疎疎集晚鴉柴門渾似野人家月明露重空堦靜時見芙蓉落一花過陸龜䝉書院太湖水落秋冥𠖇七十二峰相送迎扁舟逺訪天隨子日落荒祠楓葉青題太真教鸚䳇念心經春寒夘酒睡初醒笑倚東窓小玉屏早悟眼前空是色錯教鸚䳇念心經題白鷴圖我家白鷴白如雪朝步落花心自閒價重連城雙白璧當時籠寄謫仙還促織月下如抛白玉梭千絲萬縷奈愁何佳人夜半停機杼九曲回腸頭緒多題吕仙摘耳圖蓬萊清淺又生塵消息傳來總不真料得耳中無一物先生真是避喧人題紅梅為紫微山人作玉顔老去怕風沙學得仙人服片霞丹井西頭曾一見縞衣都染葛洪砂題墨梅一夜春寒雪作花緑毛么鳳隔窻紗朝來喚醒詩人夢揀墨留題瘦影斜玉堂仙人氷雪姿幾度月明勞夢思畫中相見好顔色只有鐡心如舊時疎花倒影淨無塵占得江南第一春玉骨近來何太瘦應知飯顆是前身謝杏林送酒山缾春日送流霞不用青錢付酒家草閣暮寒成獨酌醉邀明月上梨花題漁舟圖山下漁舟逐浪開江平風靜好歸來吳中儘有銀絲鱠莫過瞿塘灧澦堆題竹昨夜美人驂彩鸞玉笙吹徹露華寒定應斫却月中桂特地植此青琅玕題天台李氏竹石圖秋風昨夜起林皋拾得丹山翠鳳毛擬約仙人吹玉琯九天環佩碧雲髙天台四萬八千丈中有琅玕石上生禹穴南來尋李白丹霞翠雨滿秋城題竹石圖蓬萊石上珊瑚樹精衞銜將出海濤昨夜秋風動涼影葉葉南唐金錯刀題紅梅西子湖頭快雪消當時曾見董嬌嬈只今畫裏渾相似猶記春風第一橋題馬圖五花雲散玉連錢記得回朝下九天不用蓋鞍黄帕子綘袍人立御門前金河春水濯龍媒應是天門立仗回五朶花寒雲氣濕紫衣太僕自騎來題玉花驄畫誰冩開元玉雪驄黄門待駕立春風南薰殿上承恩日只説將軍畫最工題鞵山一鉤涼影度行雲彷彿湖波隔翠裙弓様任教江月妒足音那許世人聞小姑曾此脫金蓮蹴踏風波不計年夜半星辰都在水直疑平步上青天隻履何年踏巨鼇生來渾不怕風濤問渠那得根株穏只為従前著脚牢秋江濯足圖雨餘秋水漲滄浪孺子能來就晚涼寄語東華塵土客馬蹄終日為誰忙江上避暑圖梅花道人厭煩熱自冩竹林河朔圖恰似峰頭玉井水晚涼貯在清氷壺秋思金井烏啼一葉秋半規纎月挂銀鈎不知天上雙星㑹今夜穿針懶下樓出江揚子江頭春霧消南風吹上午時潮白頭思家正無賴隔水桃花人面嬌黄㡌阿郎歌棹謳手牽百丈上山頭上山艱難下山易送得幾多名利舟見新月思家有作初三初四月如鈎照見江水向東流家人今夜應望月不知郎在大江頭初三初四月鈎彎郎在船頭望逺山月似蛾眉山似黛如何不念鏡中鬟懷李白我憶開元李謫仙蛾眉亭倚大江邊當時苦被蛾眉妬今日蛾眉更可憐清明日憶鄉中諸友今朝又改清明火一簇人家處處煙寄語故園桃李樹㸔花載酒是何年謝友人逺惠鮮鱭并采石酒江心鮮鱭出銀濤箇箇長於金錯刀未書山隂裹鮓帖先寄采石真珠醪過小姑雨後停舟望小姑翠鬟和影落晴湖南風吹作青銅鏡倒浸中天月半梳江上漫興江上鯉魚吹白波舟人打槳唱吳歌斜風細雨家千里輸與𤣥真一釣蓑小桃花落雨毿毿桑葉青青試浴蠶好水好山魚米賤人生只合老江南大姑廟大姑廟前江樹青老魚吹浪水雲腥神鴉啄食不飛去過客賽神姑有靈彭郎磯彭郎磯頭湖水平天寒月黒鴈祗更白頭不作還家夢臥聽風聲與水聲答鐡柱觀道友五色雲霞剪作衣長年養得鶴雛肥伐毛洗髓三千歲相逐蓬萊頂上飛南風泠泠吹我衣冩經換得白鵝肥山隂道士休相笑來㸔蛟龍作雨飛中散養生塵滿衣爬搔正想醴泉肥不見麻姑玉指爪漫勞青鳥入雲飛墨池新水長苔衣雨後來禽顆顆肥午榻茶煙應有約鬢絲風颺落花飛落星石曾聞博望泛靈槎直到河東織女家載得支機一片石至今遺迹在江沙題清碧軒為臨安黄生作濯清曾聞韓吏部棲碧長懷李謫仙欲識黄生清碧處汪汪萬頃到臨川題澄碧軒澄碧軒中好賦詩天心水面少人知試㸔風月雙清處正在波瀾未動時慿虛百尺俯清漣淘淨泥沙始見泉一片湛然秋水鏡無人知有鏡中天江湖襟帶自天開日夜風濤滚滚來㸔到水天同一色料應無處著纎埃題幻菴禪師鏡空大圓鏡智本來空不比尋常百鍊銅鏡有壞時空不壞月輪長在太虛中題扇賀胡鍊師生朝南斗星邊望太霞蓬萊咫尺是仙家昌黎不識韓湘子辜負尊前頃刻花三素雲中禮玉虛琅風吹動紫霞裾月明自蘸秋河露冩得天真一丈書日出扶桑榑桑若木是誰栽金柱紅盆出海來恰似寶陀山頂見天雞啼上妙髙臺題紅梅為嵩上人作玉骨生來不怕寒多應鍊就葛洪丹散花天女朝酣酒只許維摩帳底㸔題畫一谿月色梨花白醉卧船窓夢未醒記得洞庭湖上過夜涼吹笛喚龍聽西塞山前一釣絲此情唯有白鷗知黄塵不上磯邊石坐到風恬浪靜時白龍潭上雨初過鴨嘴灘前秋水多安得仙人綠玉杖月明來和紫芝歌一重一崦小亭臺雨洗山容翠不開燕寢晝長鈴閣靜青天飛下白雲來築得茅堂逺世紛北山無及更移文一株松下茶煙起直過前山化白雲題閻仲彬畫餘不谿上閻公子愛冩茅亭碧樹間一雨洗秋青不斷傍人説是道場山題山水扇面雨洗嵩丘翠不乾逺分秋色畫中㸔也知東閣詩人意只冩長松伴嵗寒雨過嵩陽玉女峰峰頭雲氣總隨龍至今一片青天月挂在西谿石上松一色芙蓉天上開何人鑿翠結樓臺輞川春色渾相似冩入王維畫裏來見螢火東園雨過見流螢飛去飛來不暫停著樹偶沾埀葉露上天渾學照泥星題淵明像彭澤之官八十日飄然即賦歸來辭人生出處各有道鄉里小兒那得知題谿山圖昨夜苕谿春雨晴山従天目到臨平故人只在雲西住綠樹當窻定長成杉風吹髪苧衣涼琴許家童手自將黄㡌棹郎頻指㸃好山多在藕花鄉題漁樵問答圖郎住清江儂在山山風江月意俱閒相逢莫話塵中事恐有秦人到此間題山居圖丁寧童子掃苔花有客㸔山定到家昨夜溪頭春水長酒船來繫白漚沙白石橋邊一徑斜碧雲深處是仙家雨晴知有詩人到先遣山童掃落花松風泠泠石齒齒坐㸔南山白雲起髙人有約抱琴來一曲樵歌月明裏數日不踏青林間積雨滿徑苔花斑知音莫道無尋處不在前山即後山鑿翠牽蘿結小亭丹泉落澗作琴聲晚涼騎馬谿南去更㸔前山幾朶青萬方賢俊頌清河底事山翁隠薜蘿定有鶴書來過隴従今莫唱紫芝歌題趙太祖蹴踘圖一氣洪濛運化鈞乾旋坤轉不停輪等閒蹴起東方日却是當年大耳人題綠隂埀釣圖白鷗分席坐青苔一片涼隂掃不開莫道清漳音信逺鯉魚時上釣絲來題攜琴圖松花落粉春晝閒童子抱琴朝出山明朝有意更相訪莫遣白雲深掩關題釣魚圖三山空翠壓金鼇釣得珊瑚出海濤定有雙魚傳尺素磯頭春水夜來髙枯木竹石圖蓬萊石上珊瑚樹更向琅玕一處栽不是任公釣鼇手如何移得世間來題畫白石磯頭春水生南山空翠太分明石南樹下無人到坐㸔漁翁釣晚晴雩陽十景川江秋月江如川字月如盤曾向龍門絶頂㸔三載思家東海上二千里外亦團圓三峽暮雲西峽夕陽東峽紅白雲生峽正當中莫道無心作霖雨等閒飛起便従龍龍門夜雨兩崖千仞自天開聞道當年手鑿來黒水翻江龍出峽驚濤夜夜作春雷雞嶂曉煙暘谷金雞天上啼日髙青嶂樹煙低従教截得山前路一寸鄉心定不迷青山瀑布銀漢翻空作雪飛近山渾欲換秋衣月鈎斜挂真珠箔不礙仙人跨鶴歸紫陽甘泉靈泉百尺接龍潭一日能酸一日甘笑我交情淡如水従今不必論酸醎烏石砂圖烏石岡頭沙似雪古來名勝説雩都雨晴鳥迹分明見畫史驚㸔十縣圖羅巖曲水濂溪祠在碧巖前下有流觴九曲泉前代風流遺墨在山隂空費打碑錢胡僧竹西域僧來雙眼碧履聲敲碎玉娟娟觸機悟得無生法始信虛心即是禪梁山古檜斗巖老檜自梁朝上有飛仙不可招擬借玉笙吹一曲滿天涼月送王喬楊子江中有作江風吹浪葛衣單遙認金焦兩㸃山落日片㠶歸鳥疾直隨秋色到龍灣喜何使君至雨中有作去年正月出京華馬上㸔燈直到家今嵗歸時春未半滿城風雨又催花江城春雨釀餘寒一尺青泥尚未乾無限故園桃李樹好花留待使君㸔襄陽童兒歌髙陽池水綠如苔日日襄陽太守來倒著接䍦扶上馬日斜乗醉㸔花回湘妃泣竹湘竹斑斑楚水流湘娥夜泣楚雲秋直教積淚成江水一滴春痕一滴愁二喬觀書自小㸔書在繡幃天生國色世應稀曾知醜婦無才貌也向南陽嫁布衣嫦娥奔月豈是人間不可居飛身自跨玉蟾蜍祗縁天上無離别織女牽牛莫笑渠巫女行雲楚雲如夢夢如雲雲夢相牽兩不分妾若是雲君是夢雲當為妾夢為君楊妃病齒侍兒扶起倦㸔花不道春寒入齒牙獺髓縦能醫病頰螙根先長在唐家西施捧心妾住西家本姓施越王嘗膽已多時至今獨抱心中苦長向春宫鎖翠眉虞姬伏劔當時玉斗碎鴻門碧血空沾楚劔㾗滿地落花皆漢土不知何處著春魂文君當罏苦樂相従不厭貧白頭甘守甕頭春茂陵原上多姝子未必新人勝故人昭君出塞玉顔一别漢宫花鴈背霜寒萬里沙説與當時邊上將鐃歌只合奏琵琶綠珠墜樓花飛金谷綵雲空玉笛吹殘步障風枉費明珠三百斛荆釵那及嫁梁鴻題畫扇一月春隂不見山何人移入素紈間積金峰在空青外千仞髙寒不可攀送孫府判之重慶五月開船得順風巴江一水與天通此行應有還家夢不隔巫山十二峰一道巴江萬里開暮㠶收雨過陽臺蜀中父老欣相報前度皇華使者來出都門有作青龍山前日欲斜一雨水長没鷗沙青裙老嫗索錢去遮口喚船來載車丹陽郭外茜裙女兒青髻鬟腰鐮刈麥夕陽間前溪水淺早歸去墨雲將雨過前山題兩翁對奕圖綠蘿隂隂覆丹壑玉局仙翁自為樂山中對奕不知年世上塵纓安可縛題梅曾過羅浮月下村綠毛么鳳立黄昏如何也作三生夢飛繞梨花一片雲題紅梅散花天女笑春風醉倚維摩丈室中任爾山禽偷眼㸔久知顔色本來空祗王園裏有頻迦偶逐春風到我家本是一株無影樹也隨明月作空花夜來天女散天花笑倚春風貌似霞山鳥不須偷眼㸔應無一片著袈娑題白梅誰冩江南雪後枝疎花冷蕋玉參差頻迦也管西來意啼到青天月上時雪壓南枝凍未消山禽和夢立寒梢分明一片黄昏月留向禪牀伴寂寥題子猷訪戴圖未出門時想戴逵扁舟興盡復何之如何不學袁安臥大雪干人也不宜題蘭亭流觴四絶為鄭大尹賦開元供奉侍鑾坡妙墨流傳辨永和定武化身千百億只今刻石已無多永興寺裏蘭亭帖千古髙風不可攀却笑昭陵藏不得又隨金盌出人間前朝畫史李龍眠想像流觴曲水邊四十二人同列坐茂林修竹尚依然鄭公好畫比瓊琚收得山隂褉事圖不向昆明隨刼火却従合浦得還珠題雲山圖半是秋隂半是晴數峰雲樹不分明怳然巫峽舟中見只欠猿啼一兩聲雪晴寄友快雪晴時竹色勻江南又見一畨春出門苦厭青泥滑十日無由見故人除夕過北寺嵗晚行過北寺前枇杷花落雨晴天長齋繡佛従今始僧臘明朝又一年嵗朝萬象最宜春帖子題來醉墨新今夜枇杷花畔雨又添情思到詩人人日自笑百年渾是醉不知今日始逢人朝來淨洗醒時眼一一従頭㸔好春臨安勝覽臨安老父鬢如絲解説錢王納土時吳越江山留勝概只今惟有表忠碑錢王射潮潮倒流尚遺鐡箭在江頭人言此箭不可拔永鎮東南第一州六飛南渡大江來五月荷花水殿開白塔已荒前代寺紫雲猶繞拜郊臺葛嶺蒼蒼横暮雲旁人指㸃岳王墳㸔取墳前向東樹也知生死不忘君月殿雲窓倚碧霄江聲雷動海鮮橋如何敵騎屯營處三日錢塘不見潮南山北山雲氣浮東澗西澗水交流靈鷲飛來天竺夜白猿啼老洞門秋風篁嶺前煙翠深水樂洞中韶濩音分明一曲無絃調洗盡人間萬古心鳳凰池中十萬家鶯聲燕語度年華笙歌夜月家家酒羅綺春風處處花紅泥亭子赤欄橋二八女兒眉黛嬌手折荷花蓋頭去𤓰皮船不怕風潮八月十八㸔潮生中有吳兒踏浪行青蓋紅旗誇涉險泰山一擲羽毛輕黄霧漲天紅日髙千門萬戸競錐刀當罏少婦勸郎酒自按琵琶金鳳槽元唱白酬詩興豪吳山更比越山髙無端月落潮平夜相送玲瓏别意勞湖上采蓮誰氏女南風吹起櫂歌聲勸郎莫向外湖去外湖水濁裏湖清小雨疎疎不作泥流鶯聲滿綠楊隄少年莫打黄金彈留取慈烏在上啼蘇小門前油壁車玉泉池上金鯉魚車能載酒魚可鱠人生不樂將何如坡翁通守臨安後又復能來綰郡符一段風流付晴雨直將西子比西湖最憶孤山處士家水邊林下見横斜天寒萬木俱搖落鐡石心腸是此花清暉軒罨畫谿頭秋水肥倚䦨日日㸔清暉藕花菱葉當窓見鸂鶒鴛鴦作隊飛輓僧鹽官國師古道塲犀扇無人再舉揚留得舊時公案在只今拈起話頭長犀牛扇子久塵埃扇破牛兒不見來慿仗禪林玉麈尾宗風重振雨華臺次復柬先生紀行之什淳化金城百雉䕶重關歴盡千山與萬山見説沈郎天上去一車行李賜金還陳墳前朝孤塚已多年望帝何心託杜鵑石馬長嘶風雨夜松花如雪滿山田句容落照明邊紫翠重停車松下坐従容何由借得瀛洲鶴飛上茅君大小峰土橋四月風生白苧衣河豚吹浪荻芽肥白鷗自信閒於我來往都忘海上機白土蓽門圭竇倚斜陽榆栁隂隂過屋長下馬試嘗新壓酒楝花風落苧衣涼丁莊歸心有底太悤忙此地應非五栁莊野館抱衾謀一宿水流花謝月蒼蒼徐村此是徐家第幾村千年老樹有盤根輪囷不入公輸手樗散長䝉造化恩練塘山前流水䕶方塘山下孤村落日黄隊隊奚官來洗馬如雲苜蓿滿沙場散關山花爛漫鳥間關白首不知行路艱道上兒童頻指㸃先生天上載書還丹陽丹陽郭裏夜聞簫無限離情付栁條却憶故人千里外山青月白思遙遙奔牛吕城春水與天連黄㡌操舟百丈牽一片征㠶如鳥疾歸心更比鳥爭先洛社花滿長堤水滿河一帆風雨夜深過歸心不省春先去洛社亭臺碧樹多蘇州船過閶門得順風此身如坐太虛中晚涼移向楓橋泊人在西頭月在東吳江七十二峯青可憐白鷗飛處水如天旁人錯認𤣥真子萬頃煙波一釣船太湖吳中女兒學畫眉日髙打槳放船遲笑將湖水作明鏡回首問郎宜不宜平望江上鱸魚三尺長漁翁撒網立斜陽到城買得真珠酒笑倚蓬窓待月光王涇栁花谿上木蘭船只許閒鷗伴我眠乗月到家無百里此時那有别情牽秀州繞城官栁碧於雲湖上人家兩處分一曲吳歈歌子夜滿船涼月白紛紛常州毘陵春去欲鎖魂紅葉池臺幾處存買得一雙金剪子夢隨蝴蝶到家園煑茶圖落花風颺煑茶煙水榭髙閒即是仙想見杭州蘇太守賦成龍井試春泉題一天秋月詩卷為侯少府作玉堂學士老東坡載酒西湖逸興多寄語文章侯少府一天秋月夜如何一天秋月夜方中時有南來水面風總是乾坤清意味盡情付與覺非翁一天月照鳳凰城鐘鼔遲遲報五更候吏不來公館靜此時㸔得最分明一天秋月湛氷壺千里家山入畫圖若向湧金門外㸔西湖即是湧金湖一天明月照清秋風露涼生紫綺裘若遣玲瓏歌一曲千年重見白杭州見新燕有感東家昨日杏花開西舎今朝燕子來載酒莫辭花下醉春風能得幾時回立春今朝試冩宜春帖拾得江南第一花秋水為神玉為骨正疑春色在詩家栁塘野艇楊栁青青水一灣隔江數㸃雨餘山釣船好向谿南泊莫待風波及早還和靖觀梅水㾗清淺雪初消望過湖邊第一橋處士不來花自發空山鶴去晚蕭蕭次詠軒雨夕見寄城頭月黒烏棲夜童子敲門忽送詩醉眼近燈㸔數過上牀吟到雨來時次楊鐵笛漫興韻紅泥亭子是誰家白石磯頭人浣紗好事提壺勸美酒一聲飛上合歡花湖上雨乾花片輕鐡笛新翻曲譜成西施鄭旦船尾臥狂殺江南阮步兵南山北山眉黛青日日載酒望湖亭買得湖船十様錦醉倒美人雙玉瓶勸郎杯酒莫放乾與郎裁衣禦春寒明日郎湏過湖飲花旗孑孑樹長竿和小遊仙白榆歴歴絳河東清露無聲墮碧空手把玉笙吹一曲月臨南斗正當中曾見天書赤玉文非煙非霧結氤氲羣仙不著飛霞佩自製霓裳月色裙櫻桃窓下夢青春蝴蝶翩翩是幻身山鳥一聲驚夢覺始知身是夢中人聽雪虛室寒生一片雲不知窓外白紛紛陽春别有無絃調只許詩人靜處聞夢雪夢跨仙家白玉鸞瑤臺髙處太清寒不知誰把并州剪剪得銀河一水乾㸔雪去年臘前不見雪今年子月見飛花慿誰說向林和靖莫把梅花擅作家過戚姬港作戚姬山下卞家莊花滿林皋水滿塘昨日雞豚賽春社丁男祈麥女祈桑桑葉重重戴勝飛壠頭斜日荷鋤歸柴門不見催租吏隔屋長聞織婦機題挾彈圖大堤春草碧茸茸馬上人彎落月弓寄語莫抛金彈子任渠鶯囀百花風宿淨上人房八字橋邊一徑斜尋詩來到梵王家平明起㸔門前雪一色都開簷蔔花題朗上人聽松軒一片潮音落太空禪餘多在月明中等閒聽到無聲處不是長松不是風題慶上人住雲棲應無所住住雲中雲也何曾有定蹤夜半月明天似水了無一㸃礙虛空題柯丹丘竹奎章閣下柯亭管學得雲間綵鳳鳴還逐軒皇上天去夜涼吹過闔廬城題賀公畫百頃荷花一葉舟賀家湖上汎髙秋南風吹散朝來雨移得青山近屋頭題閶門楊栁閶門楊栁鬱金條恰似章臺舞女腰舞到秋來人不見淡煙疎雨晚蕭蕭望雨一月不雨農心憂兩月不雨田無秋仰㸔北斗酌元氣安得倒挽天河流大田槁苗一尺長河水乾枯木葉黄似聞昨夜月離畢明日甘霖來沛滂立秋六月望後見秋風金井先飄一葉桐便覺人間有涼意三更月在絳河東客中除夕守嵗天涯感物華朝盤誰復頌椒花滿城列炬明如晝鐘鼔聲中夜不譁題蘆鴈飛鳴宿食圖草草書空不作行相呼相喚過衡陽蘆花月冷應無夢啄盡寒沙一夜霜路聞鷓鴣苦竹岡頭一兩聲鉤輈格磔為誰鳴縦行不得湏行去莫道離人不耐聽春日書情雨晴山徑淨無苔猶有閒人作伴來滿抱離情濃似酒春風吹上小桃腮鷓鴣啼處雨初收貪㸔青山不下樓縦使山髙千萬丈也應不隔異鄉愁詩瘦非關病折磨野棠花落奈愁何沅陵江水深如海不似徐卿别思多思家千里日如年借得禪房靜處眠靈鵲有聲催夢醒敲門人送買船錢宿澧陵山村蠶叢山下澧陵村猶有先農古意存千里閒愁添白髪一鐙瘦影伴黄昏當窓月出猿啼樹刮地風來虎到門賴得主翁多好事地鑪燒竹晚移尊沅水羅紋色正妍今朝風順好開船櫂郎莫説風波險已許江神賽紙錢渡江日出江頭春雪消雙鬟蕩漾木蘭橈歌聲唱入武陵去人面桃花一様嬌桃源即事桃花源上㸔青春少婦與郎行負薪槲葉覆身花壓鬢相逢不是避秦人楊花有意紛紛挽落暉無情衮衮傍人飛莫教化作浮萍草流向天涯忘却歸過鞵山一彎弓影落晴湖不見湖邊大小姑大姑化石心不轉小姑已嫁彭郎夫春夜遇雨宿辰州古寺春愁如海夜如年茶鼎分泉手自煎白髪老僧同聽雨就牀相伴佛鐙眠對月夜坐天際涼風破夕隂松花滿甕共誰斟異鄉月色同千里一紙家書抵萬金宿田家村北村南社鼓聲閒尋父老説昇平孤鐙也識離人意落盡寒花却再生夏日即事雨深庭樹始鳴蟬小簟魚波午夢圓老鶴一聲修竹外有人來候煑茶煙枇杷子黄山杏肥海榴花發燕雛飛綠窓五月南風起金剪新裁白苧衣中秋見月碧落無塵萬籟空月臨南斗正當中何由得似長生兔萬古千秋夜夜同觀日夜半雞鳴海日紅六龍飛出五雲中曾従秦望山頭見萬里青天踏彩虹枯木竹石圖三日颶風吹海濤蓬萊失却黄金鼇長竿釣得珊瑚樹葉葉南唐金錯刀題芍藥花下玉兔畫老蟾不鎖明月宮飛落西河白公玉宇清寒不歸去愛此日髙花影重題醉翁騎牛圖白頭野老醉騎牛笑引兒孫百不憂安得東華塵似海聽雞人立御橋頭紫薇花下天棘移來一尺長呼兒澆水傍南牆柔條盤作青羅蓋借我山窓一夏涼輓榮教諭江風山月夢悠悠白髪三年在惠州詩骨梅花兩清絶此身只合葬羅浮辛夘科名海内傳談經不到伏生年明珠徑寸誰收得流落天南海水邊山巾野服鬢絲絲記得南窓病起時白玉蟾蜍銅雀硯日長閒冩廟堂碑大庾山髙隔暮雲哀猿啼處月紛紛何由化作遼東鶴一夕飛來祭酒墳題梅花竹雀圖竹外疎花雪半欹山禽偷眼立多時安知千仞髙岡上鳴鳳朝陽有好枝題寒雀圖不向雲霄振羽翰蕭條自托一枝安無心更飽秋田粟任爾黄金作彈丸題墨菊别來幾度問秋風今日相㸔是夢中獨守太𤣥心不改傲霜髙節有誰同題瀛洲學士圖千年一度見河清㸔畫令人憶太平不是當年培養力諸公那得共登瀛鈴索無聲晝漏稀宫袍一色換朝衣院門不鎖松花落知是鑾坡進講歸苔錢人迹來稀地自偏閒門無事度年年最憐十日空階雨鑄得青青萬箇錢題毛女槲葉重重䕶玉肌蓮花峯下采金芝夜涼月出仙人掌恰似秦宫照鏡時送友人之亳州雨中飲散楊梅酒門外水髙三尺餘一路㸔山如畫裏到時須寄亳州書和靖觀梅花前立鶴小如童天錫湖山屬此翁留得黄昏舊時月至今長照水仙宫吕望釣魚圖磻谿手弄一絲秋夢入非熊雪滿頭釣得周家有何物白魚躍入後王舟題平逺圖白白春雲著樹飛望中渾似米元暉數家屋近谿邊住一片帆従日下歸題松丹井西頭只一箇香鑪側畔恰千株何當著我坐盤石童子掃花閒讀書題桃花畫眉天台山下問劉郎玉女纎蛾畫得長望斷彩雲無信息春風吹落鏡中央洞庭吹笛圖洞庭吹笛君山青龍作老翁來一聽夜深龍去笛聲絶但見月白天冥冥題鳴鶴山人谿山卷鳴鶴仙人去不歸秋風涼到女蘿衣白雲也是無心物長傍谿山好處飛畫鷹搏擊無心到草萊山雞野雉莫相猜昻然立在空青外遮莫人呼不下來金眸玉爪氣雄豪閒向秋風刷羽毛整頓鋒稜十二翮碧天萬里海雲髙羽衣凌亂菊花明白石江頭立晚晴不待將軍臂韝上紅絨絛掣紫金鈴青天擲下决雲兒正是霜髙俊捷時自有鵬雛充一飽山雞野雉莫相疑題洗馬圖奚官半脱茜袍紅應是開元白髪翁老去不聞征戰事閒來洗馬栁隂中題三笑圖一時行過虎谿頭何事千年笑未休山色水光無限思至今人説晉風流一時行過虎谿東笑倒廬山五老峰説與柴桑陶靖節攢眉不必更聞鐘題四皓圖皓首龎眉本在山紫芝歌斷白雲間漢家可是無羅網鴻鵠髙飛自不還雪竹黄陵女兒玉一雙天寒灑涙落湘江蒼梧鳴鳳無消息翠影參差雪滿窓題竹下美人天寒翠袖立盈盈中有貞心玉琢成明月滿天騎白鳳有人傳是許飛瓊紅竹葛令丹砂九轉功夜來化作葛陂龍飛向蒼梧叶虞舜赤霞晴射九疑峰牧牛晝睡圖草軟坡平午樹涼人牛此際兩相忘曾知亦有無眠者馬上雞聲滿路霜洗馬圖青驄浴罷出金堤草軟沙乾散玉蹄明日早朝催立仗晚涼牽過御溝西題賈山人竹雀圖翠竹叢邊棘刺多珍禽獨立意如何朝陽鳴鳳巢阿閣五采何曾觸網羅秋夜雨後待月雨後涼雲度絳河秋聲偏著樹頭多呼兒快掃階前葉整頓青天好月過題四馬圖聞說唐家五弟兄羈金絡玉出宫城自従一馬為龍去輦路年年春草生挾彈圖公子翩翩出大堤紫騮踏碎落花泥少年莫打黄金彈恐有慈烏樹上棲桃花流水圖參差煙霧隔樓臺千樹桃花洞裏開春色可憐關不住又隨流水出山來暮春東園雨後有作十日春隂一日晴晚來又見照泥星西南風起三更後吹落荼蘼雪滿庭滿庭風落白荼䕷春色三分竟不知睡起北窓閒㸔竹又添無數錦䙀兒移竹人言醉日可移竹我愛此君醒日多昨日雨中分數箇不知醒醉復如何山蕉葉畔偏宜竹借我南窓一夏涼八尺簟紋清似水秋聲月色兩相當汲井長夏東園無好雨花根土脈不相和朝來試灌銅瓶水也與花神助力多掃地林扉東向啓明開雨後呼兒掃綠苔整頓一方無别物夜涼只許月明來海棠黄鳥圖誰冩嫣然玉一枝金衣公子立多時曾知斥鷃蓬蒿下不識長安挾彈兒題克已齋何物名為克已齋須従偏處克將來等閒雲霧都消㪚蕩蕩青天白日開送雲季昭東牆隔樹有書聲晚閣長歌坐月明一隊鄰家小兒子夜涼分得案頭螢道人自是東方朔分得西池玉色桃别後好傳青鳥信大江誰道隔風濤池草青青秋水深杏花壇上坐鳴琴日長自講先天易説破羲皇萬古心素王宫中多種竹每分涼影過西鄰多情只有雲夫子九載彈琴㸔好春别日情多㑹日稀嫩涼昨夜入秋衣除書逺近須相報好付霜前白鴈歸有感洛陽無數牡丹開不惜黄金買地栽二十四人金谷友更無一箇㸔花來題太真梅邊玩月圖浴罷華清整佩環蛾眉笑比月鈎彎梨園夜半吹羌笛野鹿偷春過玉關題桂菊圖送酒白衣來栗里燒丹金井出淮南露花風葉俱寥落見畫令人思不堪輓寧州太守有人相見御門前説道腰圍減昔年寄與燒丹句漏令只今誰是地行仙白髪秋風相别後三年不寄一書來書來却是他人字放在牀頭不忍開孟光曾共去時車千里魂歸不是家腸斷綺窓花自落錯教鸚鵡喚琵琶寧州太守近如何不道離家是輓歌昨日把詩㸔醉墨伯牙絃斷淚偏多雨中夏日書事冬青花落雨涔涔一日舒晴十日隂也愛東園有生意枇杷鑄得萬丸金題水仙洛浦仙人玉佩璫盈盈宛在水中央明珠翠羽芳洲上欲贈佳期逺意長題墨菊晚節孤髙也自竒此情惟有墨卿知夜來酒醒寒無佘不覺𤣥霜落硯池題竹黄陵女兒佩明璫騎得雲間白鳳凰回首蒼梧渺何處涼隂墮地月如霜寒江萬里圖萬里寒江一鏡開棹郎何處放舟來桃花春水明年長浪靜風恬及早回題攜琴訪友兩翁何處訪知音澗水松風總是琴識得此中千古意子期端合鑄黄金重九今年兩度黄花秋濁醪可漉仍可篘西風任爾吹烏㡌不管傍人笑白頭題黄鶴山人畫松黄鶴山頭白雲飛黄鶴仙人去不歸一箇長松深谷裏秋風吹老女蘿衣題宋徽廟桑燕圖東風燕子尾毿毿繭館春明試浴蠶回首桑田都變海故巢煙雨滿江南題樂工湯子玉琵琶手卷白髪大梁湯子玉偶於畫像見風流鵾絃一曲無人和名落南州與北州推手為琵却手琶東家蝴蝶又西家春風三十年前夢飛繞梁王苑内花梁王苑内歌明月西子臺前醉落花昨夜海棠添蠟燭今朝鸚䳇喚琵琶七尺烏藤手自扶東風吹雪上頭顱梨園傳得龍香撥借問春愁撥得無瓊花髙髻有于娘一曲揚州獨擅場不有詞人龔子敬無人知有賀新凉題三笑圖過谿三笑本無心豈意流傳直到今澗水松風都是笑白雲依舊在東林題回文梅花美人圖花重妾心氷皎皎妾憐花貌玉盈盈鴉盤翠髻流雲濕瘦影寒依夜月明題回文脩竹美人圖寒生翠袖迎風晚黛抹蛾眉妬月彎鸞影舞回秋水逺問人何處九嶷山初春江南正月一尺雪南郭門前春水生栁條快染黄金色待我放船溪上行今年臘前不見雪開嵗兩度白紛紛平明推户㸔庭樹一色梨花都是雲急霰打窓鳴不止坐剪紅燭到三更莫笑煑茶無小妾也知掃雪小童清燈花巧綴蜻蜓眼定有何人明日來便借仙翁東郭履谿南谿北㸔花開輓知事陳仲信妻無人不道孟光賢結髪相従十九年風雨梨花寒食夜緑窓彈折鳳凰絃芙蓉幕府在錢塘一曲哀歌欲斷腸白髪老姑堂上坐何人洗手作羮湯何尹宅牡丹一闌千葉牡丹花移在能詩水部家候吏不來公館靜未知春色屬誰家牡丹花開蝴蝶飛牡丹花落蝴蝶稀河陽無數舊桃李可恨㸔花人不歸映水曲江水澄澄照玉容恰如明鏡拭青銅今朝試抹雙眉黛不覺銀釵落水中過嘉興南湖湖樹青青湖水流鴛鴦飛過木蘭舟最憐今夜初三月照見行人過秀州題雪峰詩卷阿母一雙金剪刀為兒裁作上官袍春夢恰如湘水濶春愁更比雪峰髙秋江送友之京天清江樹碧毿毿千里秋風送去㠶飲散廣文官舎酒到京應是月初三春曉聞鶯春寒虛幌曙光低睍睆流鶯隔樹啼睡起捲簾尋不見一聲却在杏花西春日東園漫興竹裏開門稍向東隔簾吹過杏花風青苔一徑無人迹時有山禽啄晚紅銅瓶汲水灌花根幽事關心懶出門檢㸃棠梨明日放呼兒先擬具山尊社雨晴時燕燕歸牡丹池館故巢非憐渠也愛吾廬好日日銜泥下上飛洛陽二月百花紅金谷春閒步障空何似詩家真富貴薔薇花列錦屏風長日南窓一卷書更慿何物稱閒居睡魔也自相欺得茶鼎熏爐儘破除得弟書一度書來一寄衣千迴書到不如歸湖南蘆鴈知兄弟水逺山長作隊飛失鶴鍊得丹砂頂漸紅養來馴狎不須籠桐隂立轉三更月尚想聲回碧落風題扇示俞生荷葉圓時初見汝木犀落後便相踈秋聲只在庭前樹分寸隂中好㸔書贈道士一曲瑤笙鶴背風仙衣初剪絳霞紅碧桃花落春如海歸到天壇月正中荷露池上風荷碧玉盤朝來承得露華寒也知此物同欹器早把明珠著眼㸔竹風一夜金聲與玉聲鈞天九奏本分明何當截作昭華琯吹作虞廷彩鳳鳴過甫里祠秋水初生射鴨闌寺前紅葉樹斑斑洞庭吹散朝來雨放出船頭一半山過太湖鴟夷湖上水如空十幅蒲帆得順風七十二鬟㸔不盡捧心人在館娃宫月夜聞角送友人别月出城頭海氣涼角聲愁思兩茫茫故人又向明朝别鐡鑄梅花亦斷腸畫鷹八月沙平海宇髙角鷹新解緑絨絛曾従太華峰頭見萬仞青雲刷羽毛題太真鸚䳇圖愛渠言語太分明放出金籠更好聽立在阿環羅袖上自彈圓舌念心經題鴈雲暗蒼梧月影孤一行歸鴈落寒蘆十年四海懷兄弟忍向燈前㸔畫圖題望湖亭鷗外清波鴈外山望湖亭下繫歸船夜深起坐占風信龍在珠宫月在天題梅竹姑射仙人冰雪姿天寒翠袖立多時分明一片黄昏月照見貞心只自知我愛娟娟玉一枝嵗寒不改雪霜姿如何也學春風面定是今年醉日移紅竹蓬萊石上珊瑚樹曾見扶桑海水乾相逐葛陂龍化去何年服得九還丹荷花鸂鶒圖西子湖頭荷葉圓一雙鸂鶒傍花眠寄語采花湖上女花邊莫放木蘭船桃花畫眉圖人面花紅照水時春愁不遣别人知山禽也學張京兆試畫朝來八字眉仙人醉歸圖金碧重重倚翠微玉笙吹徹綵雲飛醉來不借瑤池鶴却跨青鸞月下歸題栁塘野艇圖楊栁絲絲拂釣磯野航一箇倚斜暉分明西塞山前見只欠雙雙白鷺飛雨後青山抹黛蛾漁舟渾不怕風波夕陽盪槳不歸去為愛溪南栁色多題海棠白頭公十二紅一枝斜倚短牆東上有翩翩十二紅莫怪無情花裏鳥白頭端的愛春風太乙蓮舟玉井芙蓉一葉秋絳河清淺向西流夜深自載青天月不用吹燈閣上頭題芙蓉圖越王谿上秋風寒浣花女兒渡江干采得花中第一朶恰似仙人掌上㸔洛妃圖美人贈我雙明璫何以報之雲錦裳望斷綵雲招不得臨池為冩十三行羅浮美人圖翠禽啼處玉娟娟夢入梨雲别有天一夜清寒誰是伴忽隨明月到窓前桃花雙鳬沙嘴春明刷羽衣水流花落澹忘機安知萬里河梁别一箇南飛一北飛紅梅西湖湖頭第一花不隨凡卉媚韶華自憐玉骨清如許服得朝來一片霞日觀葡萄上人愛書懷素草人言畫好書亦好臨池呼得墨龍歸萬顆明珠落秋昊題黄子久畫黄公學畫如學仙老兎夜浴箕筲泉直欲移山超北海不勞鍊石補青天子美醉歸圖萬里橋西一徑斜白頭亂後得還家經旬出飲向何處黄四娘家㸔好花劉伶荷鍤先生自是醉鄉侯傲睨乾坤隘九州萬古青山埋不得生前只合葬糟丘吕望釣魚白髪蕭蕭老渭川非熊夢入九重天安知一片溪邊石釣得周家八百年次詠軒雨夕見寄巷北巷南纔咫尺一日不可廢言詩柴門誰道無供給雪色荼縻半破時清閟閣中倪處士硬黄繭紙舊題詩恰似仙人掌中露消得文園病渴時秫莊許酒不至辛夷開遍又櫻桃不見山缾寄濁醪昨夜好風吹夢去一谿春綠漲葡萄得酒奉謝靈鵲聲中午夢回長鬚分送大缾來棠梨花畔呼鸚䳇誰道閒愁洗不開寄何尹越人不識燕山雪接得瑤花掌上㸔不是燒丹句漏令如何禁得許多寒薊門六月寄書回少女燈前信手開料得書中無别事離懷只是想歸來秋風吹鴈過灤河槖載行車索價多聖徳如天無逺近江南江北思如何年過富貴鬢斑斑千里戎衣幾日還只有海門西畔月秋風吹過鴈門關織得回文錦字書臨流寄與北溟魚平安定有明年信楝子花開四月初公館蕭條早放衙牡丹今在别人家子期去後知音少猶有離絃寄伯牙十月蘆溝雪正深白狐一腋比千金地椒野韭沙羊軟大甕葡萄取次斟塞北悠悠望斾旌南冠還識曼胡纓題詩定作揚州夢消受梅花一味清中郎有女奏胡笳北度單于萬里沙十八拍中無限思定傳新譜到天涯受降城外雨蕭蕭聞説羌人欵聖朝李牧守邉今第一鐃歌湏製漢家謠次詠軒雨夕見寄古銅鳩杖能扶醉小錦奚囊解貯詩雨館蕭條形共影一鐙相待暮鐘時種種愁來都是幻堂堂春去可無詩客中花事都狼籍只有青松似舊時聞潮孤城鼔角夕陽紅十日江南起颶風倒挾潮聲天上響只疑牀下是蛟宫桃源圖聞道仙源有路通桃花萬樹自春風楚人一炬咸陽火不到金堂石室中題明皇吹笛圖天寶年中日正遲沈香亭上㸔花時梨園一曲新翻譜白髪宫中摠不知題葡萄畫扇越中老僧禪定餘手撚百八摩尼珠撒向虛空供明月夜半驚落銀蟾蜍自遣紅顔養得㸔㸔老白髪梳來種種多却喜算來無酒債最難遣去是詩魔二麥黄時氣似秋冬青花落雨纔收北窓暫假須臾睡又聽鵓鳩啼樹頭落盡飛花滿地紅無端三月雨聲中天心也與人心别纔見東風又北風即事不短不長蓮漏㸃乍寒乍暖麥秋時病中正爾無消遣閒㸔柴桑五字詩枇杷一樹是誰栽多謝鄰翁送得來不是王孫金彈子山禽偷眼莫相猜花艷妖嬈偏怕雨栁腰纎弱不禁寒少年慣見無情思何况如今病後㸔餘寒猶殢越羅袍一夜門前春水髙扶病強行庭樹下笑㸔山鳥啄櫻桃落梅風二十四畨花信風此風先到夀陽宫若教吹入羅浮洞笑殺江南白髪翁惜花一片花辭舊日枝隨風飛去竟何之莫教狼籍凝蛛網願託餘甘在蜜脾感興嵗晚還家已暮春㸔花少却二三人城西宋老城南董都作三生夢裏身題東家牡丹晴風煗日地無埃最大花頭最晚開留得舊時池館在也應花待我歸來寒食七十四年歸老日一百五夜禁煙天却笑山厨無熱火頻將冷酒醉花前一百五日花候至阿母墳前多白雲蓋棺小弟猶未葬淚灑松間斜日曛辛夷花望春一樹春前放花様渾如紫毫肯借題詩三百管洛陽紙價又增髙題白蓮天然容色粉為腮挿向君家玉鏡臺淡掃蛾眉㸔不厭是誰收拾畫中來宋徽宗雙鵲圖一雙靈鵲語楂楂飛繞東闌一樹花朔雪南雲天萬里不知傳喜到誰家紙鳶只慿一線上青天中有天機合自然莫待風髙收不得宫商别調不如前暮春病裏不知春去速纔逢寒食又清明何人作伴共閒話無酒無花慰此生月下聞鐘二千餘里故鄉月一百八聲今夜鐘今夜故鄉鐘與月天將聲色付詩翁晚涼偶成餘霞淡淡夕陽西碧樹隂中一鳥啼坐愛微涼無事惱手持紈扇向人題寄友楝花風落夏云初日日臨流望逺途三十六鱗江上鯉如何不寄一行書新鑿池聞道宫中新鑿池多種芙蓉楊栁枝近水芙蓉藏白鳥當窓楊栁著黄鸝忘憂花人言萱草可忘憂憂不能忘已白頭若説此花能却老不教慈母葬松楸東園紫薇花舊時曾種紫薇花五載歸來感物華石徑升堂苔色滿曳裾坊口第三家不出多時斷酒不開尊竟日㸔花懶出門每有良朋來問訊熏爐茶鼎略温存病起清晨病起怕臨池池水分明見鬢絲水不照心空照影瘦容勿遣外人知今晨試裹小烏巾束帯圍寛略稱身東舎西鄰走相慰皆言林下一閒人晏眠金壺玉漏平分夜絳蠟銅盤欲曙天日出東方髙丈五更添丈五足髙眠勸飲有客相過問所須經年不飲竟何如天生佳味扶衰老陸有黄雞海有魚答従來好飲桮中物醒即髙歌醉即眠寄謝多情天上月病中辜負二三年祝鵲靈鵲簷前聲唼唼報喜當窓驚睡妾明日官家有赦書暗起梳頭出門接題慈谿永安寺春來多是為詩忙老去懷山興味長見説寶峰東畔寺鬢絲禪榻落花香石洞龍歸雨氣涼階前立鶴過人長老僧定起日卓午風散滿林薝蔔香象外禪師坐月航迢迢東去水雲長秋髙有約㸔山去爛煑茯苓如雪香白雲為衣山作牀足力苦短情偏長㑹須繡佛鐙前去寒夜同燒清淨香題張真人畫仙人手潑金壺汁三十六峰嵐翠濕回香谷口白雲飛歸鳥不知人意急題行春圖手挽青絲跨玉驄繡羅衣颺落花風應知田野經行處盡在咨詢一念中題孤山昔年買櫂過西湖湖上青螺一㸃孤為問此山誰作伴只留香影付林逋書事平生不書乞米帖今日不謝草堂貲寄語故人王錄事癡兒索飯已多時題昭君妾無黄金買詞客妾無明珠賂畫師妾有一身能報主六宫不用妬蛾眉題太真嵗嵗牡丹庭上開君王不為子孫栽只知解語花長好不悟漁陽結禍胎訪僧不遇三月青桐已著花我來欲喫趙州茶應門童子長三尺說道闍黎不在家過太湖逆風吹船船不開青山數㸃如煤炲小龍女兒隨母過第四橋邊風雨來宫詞次韻五月南風水殿涼紫鸞聲度月中央珠簾碧簟清無夢消受荷花一夜香道士歸茅山句曲仙人雙眼碧放浪江湖人不識乗雲歸謁大茅君月滿空山夜吹笛短短踈衣剪鶴翎日長唯誦蘂珠經山中别去須相憶不寄黄精寄茯苓題山水為潘簿作落日樓臺紫翠間道人采藥不知還使君莫動歸田興山上於今更有山題石圖一片春雲出岫飛長松猶挂女蘿衣蒼苔好䕶山中石留待嚴陵坐釣磯題孫奏差墓銘蒼藤古木雨斑斑一鶴東飛去不還樵牧至今能指㸃奏差墳在石帆山題董文贈陳道士廬山董奉千株杏太乙真人一葉蓮不有青藜杖頭火人間那得白雲篇題扇青天月滿黄金餅碧海風生白雪翎紈扇晚涼清似水秋聲却在兩松聽贈莫山人髙人讀書下簾坐門外好山青一朶酌酒不知風雨來滿林紅落楊家果題竹我家種竹南窓下慈母朝朝對此君今日臨風倍惆悵題詩况在孟宗墳訪戴圖下篷聽雪不見山推篷見雪山更好此時興盡便回舟何必相逢戴安道伐木忍聽慈烏返哺兒結巢飛在最髙枝夜來不在髙枝宿啼到西山月落時舟過臨平柁樓移月過臨平此是朝天第一程急起推篷與山别可憐夜半不分明别友人臨别上船歌竹枝莫忘今朝相㑹時春蠶作繭繅不盡無限長絲與短絲昨夜雨聲昨夜送秋來萬里明河匹練開擬借仙人雙玉琯月涼吹上鳳凰臺送何山人還金華白下門前歌雨晴䕶龍河畔買車行一雙車輪千萬轉恰似思家千里情越谿女兒能浣紗蕩舟自采白荷花采得荷花休待月滿江風露早回家官河水鳥鳴關關少婦與郎同日還車上綳兒方解語到家不識婺州山題宋髙宗畫魚玉殿春明樂有餘萬幾多暇畫神魚白溝池上無消息好與君王寄尺書題子美遊春圖歸到成都萬里橋尋春問酒不須招揚鞭指㸃谿南路黄四娘家花正嬌戲贈徐博士汲井洗魚魚尾鮮家童吹火突無煙木犀風落半窗雨博士醉來方晝眠索茯苓戲贈詩骨従來似鶴形空廊無迹雨苔青人間别有長生術不是黄精與茯苓題馬圖萬里西來白玉驄奚官牽浴浪花中傍人莫笑鋒稜骨曾向沙場立戰功龍駒新解紫游韁牽向金溝浴晚涼好用蓋鞍黄帕子平明立仗待明光桃花馬曾聞八駿上崑崙越影超光世罕聞留得當時第一匹滿身花影散春雲見新燕東家昨夜杏花開茅舎今朝燕子來但使結巢棲得穏何須更覔好樓臺寄陳大用小雨疎疎夜放舟朝來白苧不勝秋出門却怪青泥滑定是元龍不下樓題雲林畫竹第二泉頭玉一枝淡煙疎雨碧參差葛陂龍去無消息惆悵雲林七字詩題髙士鼓琴松下流泉石上琴泉聲松籟是知音世間箏笛非無耳誰識先生太古心題𤣥宗按樂圖梨園小隊鬭娉婷一曲霓裳正好聽誰料開元太平曲秋風吹入雨淋鈴題明皇遊月宫圖碧天萬丈綵虹秋羽隊傞傞舞未休玉宇髙寒留不得回光却照望京樓漁樂圖風漪水荇晚生涼魚我相忘逸興長為愛白鷗眠得穏扣舷不敢和滄浪桃花流水一樹春紅倚釣磯水流花落鱖魚肥恰如西塞山前見只欠雙雙白鷺飛題梅花水仙夢入羅浮小洞天翠禽啼處月娟娟何人能解明珠贈只有凌波洛浦仙題梅雪後曾㸔半樹春素衣渾不染緇塵玉堂故舊無消息惆悵寒煙野水濱姑射仙人玉雪姿天寒瘦影立多時春風半靣曾相識一夜梨雲入夢思題扇繞屋黄金杏子肥仙家雞犬隔林扉潮頭推起龍宫月拾得明珠徑寸歸題三笑虎谿原只在東林笑入長松落照隂誰信偶然同一笑直教貽笑到如今題二馬圖前騎踏花春雨晴後騎渡水春波明此中不是鹽車坂草軟沙乾自在行題梅月圖維摩室裏散花人冩得江南第一春本是一株無影樹只教明月伴清真曾向維摩帳底㸔散花天女不知寒黄昏瘦影誰同伴只有青天白玉盤題秋江送别黄㡌唱歌江水生逺山相送近山迎晚涼坐待船頭月風順潮平正好行天馬辭萬里宛駒入漢家春雲團出五文花武皇空把黄金鑄不見河圖出渥洼題碧桃海上仙人萼綠華玉顔不肯服丹砂春風一笑三千嵗長在瑤池阿母家題碧桃青鳥圖蓬萊鳥使羽衣青立向花梢側耳聽應是雙成吹笛罷隔花晝誦蘂珠經題梨花雙鵲圖一株白雪東闌外正值清明暮雨時靈鵲定知家信到向人傳喜立花枝夢種徳翁寄詩秋前别去長相憶三夜分明夢見之手撚白鬚長一尺不談老事只論詩題蕉窓夜雨碧窓數葉雨蕭蕭繡佛鐙前伴寂寥我亦靜中聽得慣聲塵都向耳根消題半窓梧影本是一株無影樹尚留此影半窓前夜來定起無㝷處水在缾中月在天題三香圖明珠翠羽滿芳洲􅈨弟梅兄不可求江海風流今見畫露花涼葉思悠悠題睡貓圖虎質斑斑臥石苔翻盆黠䑕亦驚猜日髙花影渾如醉應喫東家薄荷來詠菊去年地旱菊苗荒今年養得過人長珍重花神不愛寳鑄就金錢萬箇黄一株兩株紫綺袍十朶五朶勝緋桃太真睡起酒㾗淺西子舞回山月髙東家分送玉玲瓏西家邀㸔狀元紅非關白髮被花惱自是詩人興味同九日年年不見花今年秋色在誰家山童踏雨走相報分得仙人鶴頂砂題紅桃白頭翁鳥淺紅花片間深紅老眼㸔花似霧中我亦前身花裏鳥頭顱如雪愛春風一灣流水入天台曾有劉郎采藥來山鳥白頭緣底事千年一度見花開題盆池白石號崑崙積雪盆池秋水碧涓涓中有崑崙雪一拳若待三年生玉子便呼此地作藍田石甃空明一鏡開直疑鼇首戴蓬萊此中不著任公釣江海風波那得來題萬玉圖為姚氏作天妃夜剪銀河水散作江南萬玉花若向洛陽城裏賣牡丹應不讓姚家又為徐山人作記得雪晴湖上見三花兩蘂半含春祗今滿樹紛如雪總道徐卿冩得真約友東園㸔花故人近有㸔花約説道晴來雨也來昨夜藥闌東側畔海棠一樹向陽開角端玉門關外靖邊塵此獸能言即諫臣不向水經圖㒺象好従髙閣畫麒麟得雨礮車雲起大風作一雨洗天三日秋江上晚隂吹不散平明遮斷樹梢頭題梅花山鳥圖誰冩春風淡墨㾗羅浮石上舊精魂山禽也學三生夢飛繞梨花一片雲題山水廬山千仞碧重重日暮何人訪逺公疑是柴桑陶處士扶藜到寺莫聞鐘夏夜有作鶴背髙寒露氣清明河斜轉月三更紫薇花畔題詩處笑㸔癡兒拾亂螢早朝桃都夜半雞三唱六龍飛出青天上閶闔鐘聲報五更千官齊簇蓬萊仗寄峽川僧紫薇山下白雲邊雨過南湖好放船滿壑松聲涼似水我來同坐月中禪題折枝桃花劉郎去後綵雲空誰冩深紅間淺紅老我㸔花渾似霧任他人面笑春風題采芝圖天上金雞放赦時未央前殿定朝儀不知此老緣何事猶向山中采紫芝夏夕綘河清淺露華涼銀箭無聲漏㸃長明月却臨南斗過紫薇分影上東廊紫薇花上月纎纎一㸃流螢過畫檐織女渡河秋已到夜涼不上水精簾夏日書事嫋嫋涼風度竹枝卷荷翻雨落盆池疎簾小簟清如水正是南窓夢覺時露坐庭中待月明翛然白苧晚涼生好風吹散西南雨洗出天河萬㸃星碧盌調氷飲蔗漿水仙借我一軒涼魚波小簟清無夢風度荷花作藕香秋夕井梧一葉報秋風㸔到三更月正中星宿盡隨天左轉河流直與海相通題太乙張騫圖太乙真人坐蓮葉大宛使者泛靈槎偶向天河一相見直到牽牛織女家題江山小景何人手把并州剪剪得吳江萬頃秋蓴菜可羮魚可鱠興來也欲上扁舟題樸軒祗園雙樹不可見臨濟一株今在兹昨夜青天指明月玉盤挂在最髙枝題釣魚圖并刀誰剪半江秋中有𤣥真一葉舟魚我相忘千載下釣絲何事不曾收扁舟放浪五湖間雨笠風蓑忘却還賴有吳興顔太守浮家泛宅稱髙閒題杜子美遊春圖拾遺歸隠浣花村日醉田家老瓦盆滿眼好山驢背穏也勝朝扣富兒門湖山秋霽南山北山秋氣髙碧天萬里總纎毫湧金門外㸔明月風露涼生紫綺袍江天暮景羅刹江頭快雪晴好山多在鳳凰城繡衣行部歸來晚不遣沙邊白鷺驚題山翁對奕長夏幽居隠翠巒兩翁對奕坐盤桓靜中黒白分明見肯許傍人局外㸔東園對竹去年移竹比兒長今嵗抽梢已過牆不待伶倫裁律管自有天聲諧鳳凰東海拾得青琅玕移向山窓生翠寒手把玉笙待明月吹下青天雙白鸞東園夜涼歌竹枝人影月色兩參差天髙鶴背露花落恰似玉郎清笑時金聲玉聲相和鳴白月皎皎風泠泠軒皇張樂洞庭野記得夢中曾一聽玉立亭亭好弟昆清隂不礙月當門晚涼移席西池上空翠霏霏落酒尊即事東方鴉鳴海日紅晨起灌花呼小童開門不省夜來雨吹落滿地薔薇風詠子規富貴花深誰肯歸癡心啼到月華西秋風黄落千山葉正好啼時却不啼見螢火擬閨怨不見郎歸照六經年年誤妾拾流螢何由飛上天河去化作牽牛織女星望夫石山頭日日望郎歸江水悠悠信息稀若使一年能一見便従天上作支機山頭日日望郎來山下長江萬里開郎去不如潮有信朝朝暮暮兩畨回雲作衣裳月作梳化為白石望征夫石頭有轉心無轉不省郎歸得見無閨怨繡得鴛鴦錦一雙停針不語倚南窓良人昨夜開船去恨殺門前有大江浣紗女苧蘿山下白蘋花西家女兒來浣紗清江白石深見底不省何宫是館娃織婦詞聞郎前月過淮河妾在空閨夜織羅腸似亂絲千萬結恨郎來往不如梭漁鐙一㸃疎鐙一葉舟夜深移過荻花洲如何不作金蓮炬却向煙波照白頭寄柴野愚野愚釣者近如何占得溪山雨一蓑茶竈筆牀天上坐往來渾不怕風波野愚釣者近何如不寄雲中錦字書誰信兩潮東海上老夫日日候雙魚題王仲序筠窓詩卷我識山隂王子猷平生好與竹交游夜來醉臥西窓雨一枕涼生葉葉秋幾箇琅玕石上生當窓宜雨復宜晴何當截作昭華琯吹出虞廷綵鳳聲到家巷中犬吠樹鳴雞桑柘隂隂繞舎低恰似一雙新燕子舊巢銜補落花泥長至太史朝書雲五色野人晝臥日三竿東家分送黄精酒消受梅花一夜寒除夕五年為客在洪都紅燭花前酒滿壺今日還家筋力倦笑㸔兒女進屠蘇斗南老人集卷五
